function getDefaultHouseInputs(prop){
  const sq=parseInt(prop.sqft)||900,st=1;
  return{sqft:sq,stories:st,ceilH:8,perim:Math.round(4*Math.sqrt(sq/st)),intWallLf:Math.round(sq/2),numBed:parseInt(prop.futBed)||parseInt(prop.curBed)||3,numBath:parseInt(prop.futBath)||parseInt(prop.curBath)||1,numExtDoors:2,numIntDoors:4,numWindows:Math.round(sq/112),cabinetLf:14,trimLf:Math.round(sq/1.33),deckSqft:48,additionSqft:0,garageSqft:400};
}

function computeDerived(i){
  const roofSq=i.sqft/i.stories/100*1.15;
  const wallSf=i.perim*(i.ceilH+1)*i.stories*0.85;
  const insulSf=i.perim*i.ceilH*i.stories;
  const drywallSh=i.sqft*0.135;
  const paintGal=i.sqft*0.02; // 4×5gal buckets per 1000 sqft
  const framingLf=i.intWallLf*2.75;
  return{roofSq,wallSf,insulSf,drywallSh,paintGal,framingLf};
}

function DetailedBudgetPage({prop,data}){
  const propId=prop.id;
  const[hInp,setHInp]=React.useState(()=>getDefaultHouseInputs(prop));
  const[ov,setOv]=React.useState({pct:{},qty:{},cost:{},off:{},unit:{}});
  const[globalCosts,setGlobalCosts]=React.useState({});

  const[globalCustomItems,setGlobalCustomItems]=React.useState([]);
  React.useEffect(()=>{
    const u1=dbListen('config/priceList',v=>setGlobalCosts(v||{}));
    const u2=dbListen('config/priceListCustom',v=>setGlobalCustomItems(v?Object.values(v).map(ci=>({...ci,qty:()=>1,waste:0})):[]));
    return()=>{u1();u2();};
  },[]);
  const[custom,setCustom]=React.useState([]);
  const[collapsed,setCollapsed]=React.useState({Exterior:true,Garage:true,Kitchen:true,Bathroom:true,Mechanical:true,Electrical:true,Plumbing:true,Interior:true,'Below Grade':true,Decking:true,Addition:true});
  const[collapsedGroups,setCollapsedGroups]=React.useState({'Bathroom|Tub / Shower':true});
  const[editCell,setEditCell]=React.useState(null); // {sku,field}
  const[editCellVal,setEditCellVal]=React.useState('');
  const[addingTo,setAddingTo]=React.useState(null); // section name
  const[newItem,setNewItem]=React.useState({label:'',unit:'each',cost:'',qty:''});
  const[showInputs,setShowInputs]=React.useState(false);

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/detailBudget`,v=>{
      if(!v)return;
      if(v.hInp)setHInp(h=>({...getDefaultHouseInputs(prop),...v.hInp}));
      if(v.ov)setOv(o=>({pct:{},qty:{},cost:{},off:{},unit:{},...v.ov}));
      if(v.custom)setCustom(v.custom||[]);
    });
  },[propId]);

  async function saveHInp(updated){
    setHInp(updated);
    await dbUpdate(`projects/${propId}/detailBudget`,{hInp:updated});
  }
  async function saveOv(field,sku,val){
    setOv(prev=>({...prev,[field]:{...prev[field],[sku]:val}}));
    await dbUpdate(`projects/${propId}/detailBudget/ov/${field}`,{[sku]:val});
  }
  async function removeOv(field,sku){
    setOv(prev=>{const n={...prev,[field]:{...prev[field]}};delete n[field][sku];return n;});
    await dbRemove(`projects/${propId}/detailBudget/ov/${field}/${sku}`);
  }
  async function saveCustom(items){
    setCustom(items);
    await dbSet(`projects/${propId}/detailBudget/custom`,items);
  }

  const d=computeDerived(hInp);
  const fmt=n=>'$'+(Math.round(n)||0).toLocaleString();
  const fmtN=n=>{if(!isFinite(n)||isNaN(n))return 0;return Number(n.toFixed(2));};

  function getStatus(scopeKey){
    if(!scopeKey)return null;
    const[cat,item]=scopeKey.split('.');
    return(data[cat]||{})[item]?.status||null;
  }

  function getGroupPct(grpKey,scopeKey){
    if(ov.pct[grpKey]!=null)return ov.pct[grpKey];
    const st=getStatus(scopeKey);
    if(st==='replace')return 100;
    if(st==='keep')return 0;
    if(st==='partial')return 50;
    return 0; // not set → default off, user activates
  }

  function getLineCost(item,pct){
    const baseQty=ov.qty[item.sku]!=null?Number(ov.qty[item.sku]):(globalCosts[item.sku]?.qty!=null?Number(globalCosts[item.sku].qty):Math.ceil(item.qty(hInp,d)));
    const globalCost=globalCosts[item.sku]?.cost;
    const unitCost=ov.cost[item.sku]!=null?Number(ov.cost[item.sku]):(globalCost!=null?globalCost:item.cost);
    const qtyNeeded=baseQty*(pct/100);
    const total=qtyNeeded*(1+item.waste)*unitCost;
    return{baseQty,unitCost,qtyNeeded,total};
  }

  // Build sections → groups → items
  const sections=[];
  const seenSec={},seenGrp={};
  [...DETAIL_ITEMS,...globalCustomItems].forEach(it=>{
    if(!seenSec[it.sec]){seenSec[it.sec]=true;sections.push({sec:it.sec,groups:[]});}
    const sec=sections.find(s=>s.sec===it.sec);
    if(!seenGrp[it.sec+'|'+it.grp]){
      seenGrp[it.sec+'|'+it.grp]=true;
      sec.groups.push({grp:it.grp,scopeKey:it.scopeKey,items:[]});
    }
    sec.groups.find(g=>g.grp===it.grp).items.push(it);
  });
  // inject custom items into their section
  custom.forEach(ci=>{
    let sec=sections.find(s=>s.sec===ci.sec);
    if(!sec){sec={sec:ci.sec,groups:[]};sections.push(sec);}
    let grp=sec.groups.find(g=>g.grp==='Custom');
    if(!grp){grp={grp:'Custom',scopeKey:null,items:[]};sec.groups.push(grp);}
    grp.items.push({...ci,qty:()=>Number(ci.qty)||1,waste:0,isCustom:true});
  });

  let grandTotal=0;
  const secTotals={};
  sections.forEach(({sec,groups})=>{
    let st=0;
    groups.forEach(({grp,scopeKey,items})=>{
      const grpKey=sec+'|'+grp;
      const pct=getGroupPct(grpKey,scopeKey);
      items.forEach(it=>{
        if(ov.off[it.sku])return;
        const{total}=getLineCost(it,pct);
        if(!isNaN(total)&&total>0)st+=total;
      });
    });
    secTotals[sec]=st;
    grandTotal+=st;
  });

  const INP_FIELDS=[
    {key:'sqft',label:'Sq Ft',type:'number'},{key:'stories',label:'Stories',type:'number'},
    {key:'ceilH',label:'Ceil Ht (ft)',type:'number'},{key:'perim',label:'Perim (LF)',type:'number'},
    {key:'intWallLf',label:'Int Walls (LF)',type:'number'},{key:'numBed',label:'Bedrooms',type:'number'},
    {key:'numBath',label:'Bathrooms',type:'number'},{key:'numExtDoors',label:'Ext Doors',type:'number'},
    {key:'numIntDoors',label:'Int Doors',type:'number'},{key:'numWindows',label:'Windows',type:'number'},
    {key:'cabinetLf',label:'Cabinet Run (LF)',type:'number'},{key:'trimLf',label:'Trim Run (LF)',type:'number'},
    {key:'deckSqft',label:'Deck Size (SF)',type:'number'},
    {key:'additionSqft',label:'Addition Size (SF)',type:'number'},
    {key:'garageSqft',label:'Garage Size (SF)',type:'number'},
  ];

  const STATUS_COLOR={replace:'#ef4444',partial:'#3b82f6',keep:'#22c55e',maybe:'#f59e0b'};

  return(
    <div style={{paddingBottom:100}}>

      {/* House Inputs Toggle */}
      <div style={{padding:'8px 12px 0'}}>
        <button onClick={()=>setShowInputs(p=>!p)}
          style={{width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'10px 14px',color:'white',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>🏠 House Inputs</span>
          <span style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>{hInp.sqft} sqft · {hInp.numBath} bath · {hInp.numWindows} windows {showInputs?'▲':'▼'}</span>
        </button>
        {showInputs&&(
          <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'0 0 10px 10px',padding:'12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
            {INP_FIELDS.map(f=>(
              <div key={f.key}>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:2}}>{f.label}</div>
                <input type={f.type} value={hInp[f.key]||''} style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:14,fontWeight:600,padding:'6px 8px',boxSizing:'border-box'}}
                  onChange={e=>setHInp(h=>({...h,[f.key]:e.target.value===''?'':Number(e.target.value)}))}
                  onBlur={e=>{const v=e.target.value===''?'':Number(e.target.value);setHInp(h=>{const u={...h,[f.key]:v};saveHInp(u);return u;});}}/>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Sections */}
      {sections.map(({sec,groups})=>{
        const isCollapsed=collapsed[sec];
        const secTotal=secTotals[sec]||0;
        return(
          <div key={sec} style={{margin:'10px 12px 0'}}>
            <button onClick={()=>setCollapsed(p=>({...p,[sec]:!p[sec]}))}
              style={{width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:isCollapsed?10:'10px 10px 0 0',padding:'10px 14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'white',fontSize:13,fontWeight:700}}>{sec}</span>
              <span style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{color:'#e2b04a',fontSize:13,fontWeight:700}}>{fmt(secTotal)}</span>
                <span style={{color:'rgba(255,255,255,.4)',fontSize:12}}>{isCollapsed?'▼':'▲'}</span>
              </span>
            </button>
            {!isCollapsed&&(
              <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.08)',borderTop:'none',borderRadius:'0 0 10px 10px',overflow:'hidden'}}>
                {groups.map(({grp,scopeKey,items})=>{
                  const grpKey=sec+'|'+grp;
                  const pct=getGroupPct(grpKey,scopeKey);
                  const status=getStatus(scopeKey);
                  const grpTotal=items.reduce((s,it)=>{
                    if(ov.off[it.sku])return s;
                    const{total}=getLineCost(it,pct);
                    return s+(isNaN(total)?0:total);
                  },0);

                  const isGrpCollapsed=!!collapsedGroups[grpKey];
                  return(
                    <div key={grp} style={{borderTop:'1px solid rgba(255,255,255,.06)'}}>
                      {/* Group Header */}
                      <div style={{padding:'8px 12px',background:'rgba(255,255,255,.03)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',cursor:'pointer'}} onClick={()=>setCollapsedGroups(prev=>({...prev,[grpKey]:!prev[grpKey]}))}>
                        <span style={{fontSize:11,color:'rgba(255,255,255,.4)',marginRight:2}}>{isGrpCollapsed?'▶':'▼'}</span>
                        <span style={{fontSize:12,fontWeight:700,color:'white',flex:1}}>{grp}</span>
                        {status&&<span style={{fontSize:10,background:STATUS_COLOR[status]||'#666',color:'white',borderRadius:4,padding:'2px 6px',fontWeight:700}}>{status}</span>}
                        {!status&&scopeKey&&<span style={{fontSize:10,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>not set in walkthrough</span>}
                        <span style={{fontSize:12,fontWeight:700,color:grpTotal>0?'#e2b04a':'rgba(255,255,255,.3)'}}>{fmt(grpTotal)}</span>
                        {/* % controls */}
                        <div style={{width:'100%',display:'flex',alignItems:'center',gap:6}}>
                          {[0,25,50,75,100].map(p=>(
                            <button key={p} onClick={async()=>await saveOv('pct',grpKey,p)}
                              style={{flex:1,padding:'4px 2px',fontSize:10,fontWeight:700,borderRadius:6,border:'none',cursor:'pointer',background:pct===p?'#e2b04a':'rgba(255,255,255,.08)',color:pct===p?'#1a1a2e':'rgba(255,255,255,.6)'}}>
                              {p}%
                            </button>
                          ))}
                          <input type="number" min="0" max="100" value={pct} style={{width:44,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:11,padding:'4px 4px',textAlign:'center'}}
                            onChange={e=>saveOv('pct',grpKey,Math.min(100,Math.max(0,Number(e.target.value))))}/>
                        </div>
                      </div>

                      {/* Line Items */}
                      {!isGrpCollapsed&&items.map((it,ri)=>{
                        const isOff=!!ov.off[it.sku];
                        const{baseQty,unitCost,qtyNeeded,total}=getLineCost(it,pct);
                        const isSub=it.label.startsWith('↳');
                        const isEditingQty=editCell?.sku===it.sku&&editCell?.field==='qty';
                        const isEditingCost=editCell?.sku===it.sku&&editCell?.field==='cost';
                        const isEditingUnit=editCell?.sku===it.sku&&editCell?.field==='unit';
                        const displayUnit=ov.unit?.[it.sku]??globalCosts[it.sku]?.unit??it.unit;
                        return(
                          <div key={it.sku} style={{padding:'7px 12px 7px '+(isSub?'24px':'12px'),borderTop:'1px solid rgba(255,255,255,.04)',opacity:isOff||pct===0?0.35:1,background:isSub?'rgba(0,0,0,.1)':undefined}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <span style={{flex:1,fontSize:isSub?11:12,color:isSub?'rgba(255,255,255,.7)':'white',fontWeight:isSub?400:500}}>{it.label}</span>
                              <span style={{fontSize:13,fontWeight:700,color:total>0&&!isOff&&pct>0?'#e2b04a':'rgba(255,255,255,.25)',minWidth:52,textAlign:'right'}}>{isOff||pct===0?'—':fmt(total)}</span>
                              <button onClick={async()=>await saveOv('off',it.sku,!isOff)}
                                style={{background:'none',border:'none',cursor:'pointer',color:isOff?'#ef4444':'rgba(255,255,255,.2)',fontSize:13,padding:'0 2px'}} title="Toggle">
                                {isOff?'⊕':'⊖'}
                              </button>
                            </div>
                            {!isOff&&(
                              <div style={{display:'flex',gap:4,marginTop:3,alignItems:'center',flexWrap:'wrap'}}>
                                {/* Qty */}
                                {isEditingQty?(
                                  <input autoFocus type="number" min="0" step="0.1" defaultValue={fmtN(baseQty)}
                                    style={{width:60,background:'rgba(255,255,255,.12)',border:'1px solid #e2b04a',borderRadius:5,color:'white',fontSize:11,padding:'3px 5px'}}
                                    onBlur={async e=>{await saveOv('qty',it.sku,Number(e.target.value));setEditCell(null);}}
                                    onKeyDown={e=>e.key==='Enter'&&e.target.blur()}/>
                                ):(
                                  <button onClick={()=>setEditCell({sku:it.sku,field:'qty'})}
                                    style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:5,color:ov.qty[it.sku]!=null?'#e2b04a':'rgba(255,255,255,.6)',fontSize:11,padding:'3px 7px',cursor:'pointer'}}>
                                    {fmtN(baseQty)}
                                  </button>
                                )}
                                {isEditingUnit?(
                                  <input autoFocus type="text" defaultValue={displayUnit}
                                    style={{width:52,background:'rgba(255,255,255,.12)',border:'1px solid #e2b04a',borderRadius:5,color:'white',fontSize:11,padding:'3px 5px'}}
                                    onBlur={async e=>{const v=e.target.value.trim();if(v)await saveOv('unit',it.sku,v);setEditCell(null);}}
                                    onKeyDown={e=>e.key==='Enter'&&e.target.blur()}/>
                                ):(
                                  <button onClick={()=>setEditCell({sku:it.sku,field:'unit'})}
                                    style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:5,color:ov.unit?.[it.sku]!=null?'#e2b04a':'rgba(255,255,255,.6)',fontSize:11,padding:'3px 7px',cursor:'pointer'}}>
                                    {displayUnit}
                                  </button>
                                )}
                                {pct<100&&<span style={{fontSize:10,color:'rgba(255,255,255,.35)'}}>×{pct}%={fmtN(qtyNeeded)}</span>}
                                <span style={{fontSize:10,color:'rgba(255,255,255,.25)'}}>×</span>
                                {/* Unit Cost */}
                                {isEditingCost?(
                                  <input autoFocus type="number" min="0" step="0.01" value={editCellVal}
                                    style={{width:70,background:'rgba(255,255,255,.12)',border:'1px solid #e2b04a',borderRadius:5,color:'white',fontSize:11,padding:'3px 5px'}}
                                    onChange={e=>setEditCellVal(e.target.value)}
                                    onBlur={async()=>{const v=Number(editCellVal);setEditCell(null);setEditCellVal('');await saveOv('cost',it.sku,v);}}
                                    onKeyDown={e=>e.key==='Enter'&&e.target.blur()}/>
                                ):(
                                  <button onClick={()=>{setEditCell({sku:it.sku,field:'cost'});setEditCellVal(String(unitCost));}}
                                    style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:5,color:ov.cost[it.sku]!=null?'#e2b04a':globalCosts[it.sku]?.cost!=null?'#a78bfa':'rgba(255,255,255,.6)',fontSize:11,padding:'3px 7px',cursor:'pointer'}}>
                                    ${unitCost}/{displayUnit}
                                  </button>
                                )}
                                {it.waste>0&&<span style={{fontSize:10,color:'rgba(255,255,255,.25)'}}>+{it.waste*100}% waste</span>}
                                {(ov.qty[it.sku]!=null||ov.cost[it.sku]!=null||ov.unit?.[it.sku]!=null)&&(
                                  <button onClick={async()=>{await removeOv('qty',it.sku);await removeOv('cost',it.sku);await removeOv('unit',it.sku);}}
                                    style={{background:'none',border:'none',color:'rgba(239,68,68,.6)',fontSize:10,cursor:'pointer',padding:'0 2px'}}>reset</button>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}

                {/* Add custom item to this section */}
                {addingTo===sec?(
                  <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.06)',background:'rgba(255,255,255,.03)'}}>
                    <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginBottom:6}}>Add custom item to {sec}</div>
                    <input placeholder="Item name" value={newItem.label} onChange={e=>setNewItem(p=>({...p,label:e.target.value}))}
                      style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:13,padding:'7px 10px',marginBottom:6,boxSizing:'border-box'}}/>
                    <div style={{display:'flex',gap:6,marginBottom:6}}>
                      <input placeholder="Unit" value={newItem.unit} onChange={e=>setNewItem(p=>({...p,unit:e.target.value}))}
                        style={{flex:1,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:13,padding:'7px 8px'}}/>
                      <input placeholder="$/unit" type="number" value={newItem.cost} onChange={e=>setNewItem(p=>({...p,cost:e.target.value}))}
                        style={{flex:1,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:13,padding:'7px 8px'}}/>
                      <input placeholder="Qty" type="number" value={newItem.qty} onChange={e=>setNewItem(p=>({...p,qty:e.target.value}))}
                        style={{flex:1,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:6,color:'white',fontSize:13,padding:'7px 8px'}}/>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={async()=>{
                        if(!newItem.label.trim())return;
                        const id='c'+Date.now();
                        const updated=[...custom,{id,sec,label:newItem.label.trim(),unit:newItem.unit||'each',cost:Number(newItem.cost)||0,qty:Number(newItem.qty)||1}];
                        await saveCustom(updated);
                        setNewItem({label:'',unit:'each',cost:'',qty:''});setAddingTo(null);
                      }} style={{flex:1,background:'#e2b04a',color:'#1a1a2e',border:'none',borderRadius:8,padding:'9px',fontWeight:700,fontSize:13,cursor:'pointer'}}>Add Item</button>
                      <button onClick={()=>{setAddingTo(null);setNewItem({label:'',unit:'each',cost:'',qty:''}); }}
                        style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:8,padding:'9px 14px',color:'white',fontSize:13,cursor:'pointer'}}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <button onClick={()=>{setAddingTo(sec);setNewItem({label:'',unit:'each',cost:'',qty:''}); }}
                    style={{width:'100%',background:'none',border:'none',borderTop:'1px solid rgba(255,255,255,.06)',padding:'10px',color:'rgba(255,255,255,.35)',fontSize:12,cursor:'pointer'}}>
                    + Add custom item to {sec}
                  </button>
                )}

                {/* Remove custom items */}
                {custom.filter(c=>c.sec===sec).map(c=>(
                  <div key={c.id} style={{display:'none'}}>
                    <button onClick={async()=>await saveCustom(custom.filter(x=>x.id!==c.id))}>remove {c.label}</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      {/* Grand Total */}
      <div style={{margin:'16px 12px 0',background:'linear-gradient(135deg,rgba(226,176,74,.18),rgba(226,176,74,.06))',border:'1px solid rgba(226,176,74,.5)',borderRadius:14,padding:'18px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>Subtotal</div>
          <div style={{fontSize:16,fontWeight:700,color:'rgba(255,255,255,.7)'}}>{fmt(grandTotal)}</div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:12,borderBottom:'1px solid rgba(255,255,255,.1)'}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>10% Contingency</div>
          <div style={{fontSize:16,fontWeight:700,color:'rgba(255,255,255,.7)'}}>{fmt(grandTotal*0.1)}</div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.5px'}}>Total (with contingency)</div>
            <div style={{fontSize:32,fontWeight:800,color:'#e2b04a',lineHeight:1.1}}>{fmt(grandTotal*1.1)}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.5px'}}>Per Sq Ft</div>
            <div style={{fontSize:22,fontWeight:700,color:'#e2b04a'}}>{hInp.sqft?fmt(grandTotal*1.1/hInp.sqft)+'/sf':'—'}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.35)'}}>Materials only · Does not include labor · Tap any qty or price to edit · Yellow = overridden</div>
      </div>
    </div>
  );
}

function buildScheduleHTML(prop,sched){
  const addr=prop.address||'[Property Address]';
  const total=sched.totalPrice||'[TOTAL]';
  const finalPay=sched.finalPayment||'[FINAL PAYMENT]';
  function getItems(week){
    const wData=sched.weeks?.[week.id]||{};
    const off=wData.off||{};
    const edits=wData.edits||{};
    const custom=wData.custom||[];
    const rows=week.items
      .filter(it=>!off[it.id])
      .map(it=>`<li>${edits[it.id]||it.text}</li>`)
      .join('');
    const customRows=custom.map(t=>`<li>${t}</li>`).join('');
    return rows+customRows;
  }
  const weeks=SCHED_WEEKS.map(w=>{
    const wData=sched.weeks?.[w.id]||{};
    const draw=wData.draw;
    const drawLine=w.payLabel?(draw?`<p class="draw">${w.payLabel}: <strong>$${Number(draw).toLocaleString()}</strong></p>`:`<p class="draw">${w.payLabel}: <strong>${w.id==='w6'?finalPay:'[AMOUNT]'}</strong></p>`):'';
    const inspection=w.inspection?`<p class="inspection">⚠ City Inspection Required: Framing, Plumbing, and Electrical — must pass before proceeding to the next week</p>`:'';
    return`<div class="week"><h2>${w.title}</h2><ul>${getItems(w)}</ul>${drawLine}${inspection}</div>`;
  }).join('');
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Schedule — ${addr}</title>

<div class="no-print" style="margin-bottom:20px;display:flex;gap:10px">
<button onclick="window.print()" style="background:#111;color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">🖨 Print / Save as PDF</button>
<button onclick="window.close()" style="background:none;border:1px solid #ccc;padding:9px 14px;border-radius:6px;font-size:13px;cursor:pointer">Close</button>
</div>
<h1>${addr} — Renovation Schedule</h1>
<div class="meta">Total Labor Price: <strong>${total}</strong></div>
<div class="meta">Total Length of Project: 6 Weeks</div>
<div class="meta bold">Final ${finalPay} paid upon project completion and owner sign-off</div>
<hr/>
${weeks}
<hr/>
<div class="sig">
<div class="sig-line"><p>Owner / Authorized Representative</p><div class="line"></div><div class="sig-label">Signature &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div></div>
<div class="sig-line"><p>General Contractor</p><div class="line"></div><div class="sig-label">Signature &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div></div>
</div>
</div></body></html>`;
}

// Maps each schedule week → CATEGORIES items that belong in that week
const SCHED_WEEK_MAP={
  w1:[['interior','demo'],['interior','framing'],['interior','layout_change'],['interior','subfloor'],
      ['below_grade','crawlspace_general'],['below_grade','foundation_general']],
  w2:[['plumbing','plumbing_bathroom'],['plumbing','plumbing_kitchen'],['plumbing','laundry'],
      ['electrical','wiring'],['mechanic','water_heater']],
  w3:[['interior','drywall'],['bathroom','tub'],['bathroom','bathroom_floor']],
  w4:[['interior','flooring'],['interior','paint'],['kitchen','cabinets'],['interior','interior_doors']],
  w5:[['interior','trim_quarterround'],['interior','electric_trim'],['kitchen','countertop'],
      ['kitchen','backsplash'],['kitchen','appliances'],['bathroom','vanity'],['bathroom','mirror'],
      ['bathroom','toilet'],['bathroom','vents'],['exterior','exterior_doors'],['exterior','window_door_trim']],
  w6:[['exterior','roof'],['exterior','siding'],['exterior','gutters'],['exterior','soffit_fascia'],
      ['interior','garbage_removal']],
};

function RenovationSchedulePage({prop}){
  const propId=prop.id;
  const [sched,setSched]=React.useState({totalPrice:'',finalPayment:'',weeks:{},extraWeeks:[]});
  const [editingItem,setEditingItem]=React.useState(null); // {wid,iid}
  const [editText,setEditText]=React.useState('');
  const [addingTo,setAddingTo]=React.useState(null); // wid
  const [newItemText,setNewItemText]=React.useState('');
  const [showOptional,setShowOptional]=React.useState({});
  const [dragOverWid,setDragOverWid]=React.useState(null);
  const [dragOverIdx,setDragOverIdx]=React.useState(null); // {wid,idx}
  const dragRef=React.useRef(null);
  const dragOverRef=React.useRef(null);
  const dragOverIdxRef=React.useRef(null);
  const ghostRef=React.useRef(null);
  const pdfInputRef=React.useRef(null);
  const [pdfImporting,setPdfImporting]=React.useState(false);
  const [pdfStatus,setPdfStatus]=React.useState('');

  function getDisplayItems(week,wData,showOpt){
    const off=wData.off||{},edits=wData.edits||{},custom=wData.custom||[],stored=wData.order;
    if(stored&&stored.length>0){
      return stored
        .filter(it=>it.type==='standard'?!off[it.iid]:true)
        .map(it=>({...it,text:it.type==='standard'?(edits[it.iid]||it.text):it.text,
          optional:it.type==='standard'?(week.items.find(i=>i.id===it.iid)?.optional||false):false}));
    }
    const std=week.items.filter(it=>(!it.optional||showOpt)&&!off[it.id])
      .map(it=>({type:'standard',iid:it.id,text:edits[it.id]||it.text,optional:it.optional||false}));
    return [...std,...custom.map(text=>({type:'custom',text}))];
  }

  async function reorderItems(wid,newOrder){
    const w={...(sched.weeks?.[wid]||{})};
    w.order=newOrder;
    w.custom=newOrder.filter(i=>i.type==='custom').map(i=>i.text);
    await save({...sched,weeks:{...sched.weeks,[wid]:w}});
  }

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/renovSchedule`,v=>{
      if(v)setSched(s=>({totalPrice:'',finalPayment:'',...v,weeks:{...v.weeks}}));
    });
  },[propId]);

  async function save(updated){
    setSched(updated);
    await dbUpdate(`projects/${propId}/renovSchedule`,updated);
  }
  async function setField(field,val){await save({...sched,[field]:val});}
  async function setWeekDraw(wid,val){await save({...sched,weeks:{...sched.weeks,[wid]:{...sched.weeks?.[wid],draw:val}}});}
  async function addExtraWeek(){
    const existing=sched.extraWeeks||[];
    const n=SCHED_WEEKS.length+existing.length+1;
    const id='w'+n+'_'+Date.now().toString(36);
    await save({...sched,extraWeeks:[...existing,{id,title:`Week ${n}`}]});
  }
  async function removeExtraWeek(wid){
    const extra=(sched.extraWeeks||[]).filter(w=>w.id!==wid);
    const newWeeks={...sched.weeks};delete newWeeks[wid];
    await save({...sched,extraWeeks:extra,weeks:newWeeks});
  }
  async function setExtraWeekTitle(wid,title){
    const extra=(sched.extraWeeks||[]).map(w=>w.id===wid?{...w,title}:w);
    await save({...sched,extraWeeks:extra});
  }
  async function setExtraWeekPayLabel(wid,payLabel){
    const extra=(sched.extraWeeks||[]).map(w=>w.id===wid?{...w,payLabel}:w);
    await save({...sched,extraWeeks:extra});
  }
  async function toggleItem(wid,iid,currentOff){
    const w=sched.weeks?.[wid]||{};
    const off={...w.off,[iid]:!currentOff};
    if(!off[iid])delete off[iid];
    await save({...sched,weeks:{...sched.weeks,[wid]:{...w,off}}});
  }
  async function saveItemEdit(wid,iid,text){
    const w=sched.weeks?.[wid]||{};
    const edits={...w.edits,[iid]:text};
    await save({...sched,weeks:{...sched.weeks,[wid]:{...w,edits}}});
    setEditingItem(null);
  }
  async function addCustom(wid){
    if(!newItemText.trim())return;
    const w=sched.weeks?.[wid]||{};
    const custom=[...(w.custom||[]),newItemText.trim()];
    await save({...sched,weeks:{...sched.weeks,[wid]:{...w,custom}}});
    setNewItemText('');setAddingTo(null);
  }
  async function removeCustom(wid,idx){
    const w=sched.weeks?.[wid]||{};
    const custom=(w.custom||[]).filter((_,i)=>i!==idx);
    await save({...sched,weeks:{...sched.weeks,[wid]:{...w,custom}}});
  }

  async function dropOnItem(destWid,destIdx){
    const src=dragRef.current;
    dragRef.current=null;dragOverRef.current=null;dragOverIdxRef.current=null;
    setDragOverWid(null);setDragOverIdx(null);
    if(!src)return;
    if(src.srcWid===destWid){
      // reorder within same week
      const week=SCHED_WEEKS.find(w=>w.id===destWid);
      const wData=sched.weeks?.[destWid]||{};
      const items=getDisplayItems(week,wData,showOptional[destWid]);
      if(src.listIdx===destIdx||src.listIdx===destIdx-1)return;
      const newOrder=[...items];
      const [moved]=newOrder.splice(src.listIdx,1);
      const insertAt=destIdx>src.listIdx?destIdx-1:destIdx;
      newOrder.splice(insertAt,0,moved);
      await reorderItems(destWid,newOrder);
    }else{
      await moveItem(src.srcWid,destWid,src);
    }
  }

  async function moveItem(srcWid,destWid,item){
    if(!destWid||srcWid===destWid)return;
    const srcW={...(sched.weeks?.[srcWid]||{})};
    const destW={...(sched.weeks?.[destWid]||{})};
    if(item.type==='standard'){
      srcW.off={...(srcW.off||{}),[item.iid]:true};
    }else{
      const c=[...(srcW.custom||[])];c.splice(item.idx,1);srcW.custom=c;
    }
    destW.custom=[...(destW.custom||[]),item.text];
    await save({...sched,weeks:{...sched.weeks,[srcWid]:srcW,[destWid]:destW}});
  }

  function startSchedDrag(e,srcWid,item){
    dragRef.current={srcWid,...item};
    e.dataTransfer.effectAllowed='move';
  }

  function startSchedTouchDrag(e,srcWid,item){
    e.stopPropagation();
    dragRef.current={srcWid,...item};
    const touch=e.touches[0];
    const ghost=document.createElement('div');
    ghost.textContent=item.text;
    ghost.style.cssText='position:fixed;z-index:9999;background:#e2b04a;color:#1a1a2e;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;pointer-events:none;opacity:.92;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;left:'+(touch.clientX+12)+'px;top:'+(touch.clientY-36)+'px;';
    document.body.appendChild(ghost);ghostRef.current=ghost;
    function onMove(e){
      e.preventDefault();
      const t=e.touches[0];
      if(!ghostRef.current)return;
      ghostRef.current.style.left=(t.clientX+12)+'px';
      ghostRef.current.style.top=(t.clientY-36)+'px';
      ghostRef.current.style.display='none';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      ghostRef.current.style.display='';
      const wid=el?.closest('[data-wid]')?.dataset.wid||null;
      const widxEl=el?.closest('[data-widx]');
      const widx=widxEl?{wid:widxEl.dataset.wid,idx:parseInt(widxEl.dataset.widx)}:null;
      dragOverRef.current=wid;setDragOverWid(wid);
      dragOverIdxRef.current=widx;setDragOverIdx(widx);
    }
    function onEnd(){
      if(ghostRef.current){ghostRef.current.remove();ghostRef.current=null;}
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onEnd);
      const dest=dragOverRef.current,destIdx=dragOverIdxRef.current;
      const idx=destIdx?.wid===dest?destIdx.idx:999;
      dragRef.current=null;dragOverRef.current=null;dragOverIdxRef.current=null;
      setDragOverWid(null);setDragOverIdx(null);
      if(dest)dropOnItem(dest,idx);
    }
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
  }

  function openPrint(){
    const h=buildScheduleHTML(prop,sched);
    const b=new Blob([h],{type:'text/html'});
    window.open(URL.createObjectURL(b),'_blank');
  }

  async function transferToTimeline(){
    if(!window.confirm('This will overwrite the current Timeline with the 6-week schedule. Continue?'))return;
    const assignments={};
    const payments={};
    SCHED_WEEKS.forEach((week,idx)=>{
      const weekNum=idx+1;
      const catItems=SCHED_WEEK_MAP[week.id]||[];
      const wData=sched.weeks?.[week.id]||{};
      const drawStr=String(wData.draw||'').replace(/[^0-9.]/g,'');
      const draw=parseFloat(drawStr)||0;
      const perItem=catItems.length>0&&draw>0?Math.round(draw/catItems.length*100)/100:0;
      catItems.forEach(([catId,itemId])=>{
        if(!assignments[catId])assignments[catId]={};
        assignments[catId][itemId]={[weekNum]:true};
        if(perItem>0){
          if(!payments[catId])payments[catId]={};
          payments[catId][itemId]=perItem;
        }
      });
    });
    await dbUpdate(`projects/${prop.id}/weekplan`,{numWeeks:6,assignments,payments,inspection:2});
    alert('Timeline updated! Open the 📅 Timeline tab to see it.');
  }

  async function importFromPDF(file){
    if(!file)return;
    setPdfImporting(true);setPdfStatus('Reading PDF…');
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      setPdfStatus('AI is reading the document…');
      const apiKey=await dbGet('config/geminiKey');
      const prompt=`You are reading a contractor bid, scope of work, or renovation schedule PDF.

Your job:
1. Detect how many weeks or phases the document contains. Use the document's own structure — if it says 8 weeks, use 8. If it has phases (Phase 1, Phase 2…), treat each as a week.
2. Extract every task/line item and put it in the correct week.
3. Extract the total price and any per-phase/per-week payment amounts.
4. Give each week a short title based on what work happens that week (e.g. "Demo & Framing", "Rough Plumbing", "Drywall & Tile").

Return ONLY valid JSON — no markdown, no explanation — in exactly this format:
{
  "totalPrice": "",
  "finalPayment": "",
  "weeks": [
    {"id": "w1", "title": "Demo & Framing", "payLabel": "Payment after demo complete", "draw": "$5,000", "items": ["task 1", "task 2"]},
    {"id": "w2", "title": "Rough Plumbing & Electrical", "payLabel": "", "draw": "", "items": ["task 3"]}
  ]
}

The "weeks" array should have one entry per week/phase found in the document. Use as many weeks as the document actually has. Keep items concise (one line each). Include payLabel only if a payment is tied to that phase.`;
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:'application/pdf',data:base64}},
            {text:prompt}
          ]}],
          generationConfig:{responseMimeType:'application/json'}
        })
      });
      const data=await resp.json();
      if(data.error)throw new Error('Gemini: '+data.error.message);
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text;
      if(!text)throw new Error('No AI response — check Gemini key in Firebase');
      let parsed;
      try{parsed=JSON.parse(text);}catch(pe){throw new Error('Bad JSON from AI: '+text.slice(0,120));}
      if(!Array.isArray(parsed.weeks)||parsed.weeks.length===0)throw new Error('AI returned no weeks — try a clearer PDF');
      setPdfStatus(`Building schedule (${parsed.weeks.length} weeks found)…`);

      // parsed.weeks is an array; first 6 map to SCHED_WEEKS (w1-w6), rest become extraWeeks
      const aiWeeks=parsed.weeks||[];
      const stdIds=['w1','w2','w3','w4','w5','w6'];
      const newWeeks={...(sched.weeks||{})};
      const newExtra=[];

      aiWeeks.forEach((aw,idx)=>{
        const items=(aw.items||[]).filter(t=>t&&t.trim());
        if(idx<stdIds.length){
          // populate into standard week as custom items (replaces previous custom)
          const wid=stdIds[idx];
          newWeeks[wid]={
            ...(newWeeks[wid]||{}),
            ...(aw.draw?{draw:aw.draw}:{}),
            custom:items,
          };
        }else{
          // create extra week
          const wid='wpdf_'+(idx+1)+'_'+Date.now().toString(36);
          newExtra.push({id:wid,title:aw.title||`Week ${idx+1}`,payLabel:aw.payLabel||''});
          newWeeks[wid]={
            ...(aw.draw?{draw:aw.draw}:{}),
            custom:items,
          };
        }
      });

      const updated={
        ...sched,
        ...(parsed.totalPrice?{totalPrice:parsed.totalPrice}:{}),
        ...(parsed.finalPayment?{finalPayment:parsed.finalPayment}:{}),
        weeks:newWeeks,
        extraWeeks:[...(sched.extraWeeks||[]),...newExtra],
      };
      await save(updated);
      setPdfStatus(`✓ Imported ${aiWeeks.length} weeks`);
      setTimeout(()=>setPdfStatus(''),4000);
    }catch(e){
      console.error(e);
      setPdfStatus('⚠ '+e.message);
    }
    setPdfImporting(false);
  }

  const inputStyle={background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,color:'white',fontSize:13,padding:'9px 12px',width:'100%',boxSizing:'border-box'};
  const chipStyle=(active)=>({background:active?'rgba(226,176,74,.15)':'rgba(255,255,255,.06)',border:'1px solid '+(active?'rgba(226,176,74,.4)':'rgba(255,255,255,.1)'),borderRadius:6,color:active?'#e2b04a':'rgba(255,255,255,.5)',fontSize:11,padding:'4px 9px',cursor:'pointer'});

  return(
    <div style={{paddingBottom:100}}>
      {/* Top bar */}
      <div style={{padding:'14px 14px 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div style={{fontSize:13,fontWeight:700,color:'white'}}>Renovation Schedule</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input ref={pdfInputRef} type="file" accept=".pdf" style={{display:'none'}} onChange={e=>{if(e.target.files[0])importFromPDF(e.target.files[0]);e.target.value='';}}/>
          <button onClick={()=>pdfInputRef.current?.click()} disabled={pdfImporting} style={{background:'rgba(99,102,241,.2)',color:'#a5b4fc',border:'1px solid rgba(99,102,241,.4)',borderRadius:8,padding:'9px 14px',fontWeight:700,fontSize:13,cursor:pdfImporting?'default':'pointer',opacity:pdfImporting?.7:1}}>
            {pdfImporting?'Importing…':'📄 Import PDF'}
          </button>
          <button onClick={transferToTimeline} style={{background:'rgba(255,255,255,.1)',color:'white',border:'1px solid rgba(255,255,255,.2)',borderRadius:8,padding:'9px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>📅 → Timeline</button>
          <button onClick={openPrint} style={{background:'#e2b04a',color:'#1a1a2e',border:'none',borderRadius:8,padding:'9px 16px',fontWeight:700,fontSize:13,cursor:'pointer'}}>🖨 Print / PDF</button>
        </div>
      </div>
      {pdfStatus&&<div style={{padding:'6px 14px',fontSize:12,color:pdfStatus.startsWith('⚠')?'#f87171':pdfStatus.startsWith('✓')?'#4ade80':'rgba(255,255,255,.6)'}}>{pdfStatus}</div>}
      {/* Contract info */}
      <div style={{padding:'12px 14px',display:'flex',gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>Total Contract Price</div>
          <input placeholder="e.g. $18,000" value={sched.totalPrice} onChange={e=>setField('totalPrice',e.target.value)} style={inputStyle}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>Final Payment</div>
          <input placeholder="e.g. $3,000" value={sched.finalPayment} onChange={e=>setField('finalPayment',e.target.value)} style={inputStyle}/>
        </div>
      </div>

      {/* Weeks */}
      {[...SCHED_WEEKS,...(sched.extraWeeks||[]).map(ew=>({...ew,items:[],isExtra:true}))].map(week=>{
        const wData=sched.weeks?.[week.id]||{};
        const off=wData.off||{};
        const edits=wData.edits||{};
        const custom=wData.custom||[];
        const hasOptional=week.items.some(it=>it.optional);
        const showOpt=showOptional[week.id];

        const isDropTarget=dragOverWid===week.id&&dragRef.current?.srcWid!==week.id;
        return(
          <div key={week.id} data-wid={week.id}
            onDragOver={e=>{e.preventDefault();if(dragRef.current?.srcWid!==week.id){dragOverRef.current=week.id;setDragOverWid(week.id);}}}
            onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)){dragOverRef.current=null;dragOverIdxRef.current=null;setDragOverWid(null);setDragOverIdx(null);}}}
            onDrop={e=>{e.preventDefault();const idx=dragOverIdxRef.current?.wid===week.id?dragOverIdxRef.current.idx:999;dropOnItem(week.id,idx);}}
            style={{margin:'0 14px 16px',background:isDropTarget?'rgba(226,176,74,.08)':'rgba(255,255,255,.04)',border:'1px solid '+(isDropTarget?'#e2b04a':'rgba(255,255,255,.09)'),borderRadius:12,overflow:'hidden',transition:'border-color .15s,background .15s'}}>
            {/* Week header */}
            <div style={{padding:'10px 14px',background:'rgba(255,255,255,.06)',borderBottom:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:8}}>
              {week.isExtra?(
                <>
                  <input
                    defaultValue={week.title}
                    onBlur={e=>setExtraWeekTitle(week.id,e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                    style={{flex:1,background:'transparent',border:'none',outline:'none',fontSize:13,fontWeight:700,color:'white'}}
                  />
                  <button onClick={()=>removeExtraWeek(week.id)} style={{background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,color:'#ef4444',fontSize:11,fontWeight:700,padding:'3px 8px',cursor:'pointer',flexShrink:0}}>✕ Remove</button>
                </>
              ):(
                <>
                  <span style={{flex:1,fontSize:13,fontWeight:700,color:'white'}}>{week.title}</span>
                  {hasOptional&&(
                    <button onClick={()=>setShowOptional(p=>({...p,[week.id]:!p[week.id]}))} style={{...chipStyle(showOpt),fontSize:10}}>
                      {showOpt?'Hide':'+ Optional'}
                    </button>
                  )}
                </>
              )}
            </div>
            {/* Items — unified ordered list */}
            <div style={{padding:'6px 0'}}>
              {(()=>{
                const displayItems=getDisplayItems(week,wData,showOpt);
                const isSrcWeek=dragRef.current?.srcWid===week.id;
                return displayItems.map((item,idx)=>{
                  const isStd=item.type==='standard';
                  const isOff=isStd?!!off[item.iid]:false;
                  const isEditing=isStd&&editingItem?.wid===week.id&&editingItem?.iid===item.iid;
                  const showInsertBefore=dragOverIdx?.wid===week.id&&dragOverIdx?.idx===idx;
                  return(
                    <React.Fragment key={idx}>
                      {showInsertBefore&&<div style={{height:3,background:'#e2b04a',borderRadius:2,margin:'0 14px'}}/>}
                      <div
                        draggable={!isEditing}
                        onDragStart={e=>{e.dataTransfer.effectAllowed='move';startSchedDrag(e,week.id,{...item,listIdx:idx});}}
                        onDragOver={e=>{
                          e.preventDefault();e.stopPropagation();
                          if(isSrcWeek){dragOverIdxRef.current={wid:week.id,idx};setDragOverIdx({wid:week.id,idx});}
                          else{dragOverRef.current=week.id;setDragOverWid(week.id);}
                        }}
                        onDrop={e=>{e.preventDefault();e.stopPropagation();dropOnItem(week.id,idx);}}
                        onTouchStart={e=>startSchedTouchDrag(e,week.id,{...item,listIdx:idx})}
                        data-wid={week.id} data-widx={idx}
                        style={{padding:'7px 14px',borderBottom:'1px solid rgba(255,255,255,.04)',display:'flex',alignItems:'flex-start',gap:10,opacity:isOff?.4:1,cursor:isEditing?'default':'grab'}}>
                        {isStd?(
                          <button onClick={()=>toggleItem(week.id,item.iid,isOff)}
                            style={{background:'none',border:'none',color:isOff?'rgba(255,255,255,.25)':'#22c55e',fontSize:15,cursor:'pointer',padding:'0',marginTop:1,flexShrink:0}}>
                            {isOff?'○':'●'}
                          </button>
                        ):(
                          <span style={{color:'#22c55e',fontSize:15,marginTop:1,flexShrink:0}}>●</span>
                        )}
                        {isEditing?(
                          <div style={{flex:1,display:'flex',gap:6}}>
                            <input autoFocus value={editText} onChange={e=>setEditText(e.target.value)}
                              onKeyDown={e=>{if(e.key==='Enter')saveItemEdit(week.id,item.iid,editText);if(e.key==='Escape')setEditingItem(null);}}
                              style={{...inputStyle,padding:'5px 9px',fontSize:12,flex:1}}/>
                            <button onClick={()=>saveItemEdit(week.id,item.iid,editText)} style={{background:'#22c55e',border:'none',borderRadius:6,color:'white',padding:'5px 10px',cursor:'pointer',fontWeight:700,flexShrink:0}}>✓</button>
                            <button onClick={()=>setEditingItem(null)} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:6,color:'rgba(255,255,255,.5)',padding:'5px 8px',cursor:'pointer',flexShrink:0}}>✕</button>
                          </div>
                        ):(
                          <span
                            onClick={()=>{if(isStd&&!isOff){setEditingItem({wid:week.id,iid:item.iid});setEditText(item.text);}}}
                            style={{flex:1,fontSize:12,color:isOff?'rgba(255,255,255,.3)':item.optional?'rgba(255,255,255,.65)':'rgba(255,255,255,.9)',cursor:isStd&&!isOff?'text':'default',lineHeight:1.5,textDecoration:isOff?'line-through':'none'}}>
                            {item.text}
                            {item.optional&&!isOff&&<span style={{fontSize:10,color:'rgba(226,176,74,.6)',marginLeft:6}}>optional</span>}
                            {!isStd&&<span style={{fontSize:10,color:'rgba(226,176,74,.5)',marginLeft:6}}>custom</span>}
                          </span>
                        )}
                        {!isStd&&(
                          <button onClick={()=>removeCustom(week.id,custom.indexOf(item.text))} style={{background:'none',border:'none',color:'rgba(239,68,68,.5)',fontSize:13,cursor:'pointer',padding:'0',flexShrink:0}}>✕</button>
                        )}
                      </div>
                    </React.Fragment>
                  );
                });
              })()}
              {/* Insert line at end of list */}
              {dragOverIdx?.wid===week.id&&dragOverIdx?.idx===999&&<div style={{height:3,background:'#e2b04a',borderRadius:2,margin:'0 14px'}}/>}
              {/* Add item */}
              {addingTo===week.id?(
                <div style={{padding:'8px 14px',display:'flex',gap:6}}>
                  <input autoFocus placeholder="Add item..." value={newItemText} onChange={e=>setNewItemText(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')addCustom(week.id);if(e.key==='Escape'){setAddingTo(null);setNewItemText('');}}}
                    style={{...inputStyle,padding:'6px 10px',fontSize:12,flex:1}}/>
                  <button onClick={()=>addCustom(week.id)} style={{background:'#e2b04a',border:'none',borderRadius:6,color:'#1a1a2e',padding:'6px 12px',cursor:'pointer',fontWeight:700,flexShrink:0}}>Add</button>
                  <button onClick={()=>{setAddingTo(null);setNewItemText('');}} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:6,color:'rgba(255,255,255,.5)',padding:'6px 10px',cursor:'pointer',flexShrink:0}}>✕</button>
                </div>
              ):(
                <button onClick={()=>setAddingTo(week.id)} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',fontSize:12,cursor:'pointer',padding:'8px 14px',width:'100%',textAlign:'left'}}>
                  + Add item
                </button>
              )}
            </div>
            {/* Draw / city inspection */}
            {week.inspection&&(
              <div style={{padding:'8px 14px',background:'rgba(245,158,11,.08)',borderTop:'1px solid rgba(245,158,11,.2)'}}>
                <span style={{fontSize:11,fontWeight:700,color:'#f59e0b'}}>⚠ City Inspection Required: Framing, Plumbing, and Electrical</span>
              </div>
            )}
            {(week.payLabel||week.isExtra)&&(
              <div style={{padding:'10px 14px',borderTop:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.03)',display:'flex',alignItems:'center',gap:10}}>
                {week.isExtra?(
                  <input
                    defaultValue={week.payLabel||''}
                    placeholder="Payment label (optional)…"
                    onBlur={e=>setExtraWeekPayLabel(week.id,e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                    style={{...inputStyle,flex:1,padding:'6px 10px',fontSize:11,color:'rgba(255,255,255,.5)'}}
                  />
                ):(
                  <span style={{fontSize:11,color:'rgba(255,255,255,.5)',flex:1}}>{week.payLabel}</span>
                )}
                <input type="text" placeholder="$0" value={wData.draw||''} onChange={e=>setWeekDraw(week.id,e.target.value)}
                  style={{...inputStyle,width:90,textAlign:'right',padding:'6px 10px',fontWeight:700,color:'#e2b04a',borderColor:'rgba(226,176,74,.3)'}}/>
              </div>
            )}
          </div>
        );
      })}

      {/* Add Week */}
      <div style={{margin:'0 14px 24px'}}>
        <button onClick={addExtraWeek} style={{width:'100%',padding:'14px',background:'rgba(255,255,255,.04)',border:'1px dashed rgba(255,255,255,.18)',borderRadius:12,color:'rgba(255,255,255,.45)',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span style={{fontSize:20,lineHeight:1,color:'rgba(255,255,255,.3)'}}>+</span> Add Week
        </button>
      </div>
    </div>
  );
}

function WalkthroughView({prop,currentUser,onBack,onPropUpdate}){
  const TAB_TASKS=-1,TAB_SCOPE=-2,TAB_INFO=-3,TAB_TEAM=-4,TAB_PICS=-5,TAB_TIMELINE=-6,TAB_BUDGET=-7,TAB_SCHEDULE=-8,TAB_PLAN=-9;
  const initStage=prop.stage||'walkthrough';
  const[activeTab,setActiveTab]=React.useState(TAB_TASKS);
  const[planView,setPlanView]=React.useState('timeline');
  const[showPropMore,setShowPropMore]=React.useState(false);
  const[data,setData]=React.useState({});
  const[members,setMembers]=React.useState({});
  const[stage,setStage]=React.useState(prop.stage||'walkthrough');
  const[sqft,setSqft]=React.useState(prop.sqft||'');
  const[curBed,setCurBed]=React.useState(prop.curBed||'');
  const[curBath,setCurBath]=React.useState(prop.curBath||'');
  const[futBed,setFutBed]=React.useState(prop.futBed||'');
  const[futBath,setFutBath]=React.useState(prop.futBath||'');
  const[showShare,setShowShare]=React.useState(false);
  const[lightbox,setLightbox]=React.useState(null);
  const[syncStatus,setSyncStatus]=React.useState('syncing');
  const isOwner=prop.ownerId===currentUser.uid;
  const username=currentUser.displayName||currentUser.email;
  const canSeeOwner=isOwner||members[currentUser.uid]?.role==='Member';

  // Merge remote data+photos into a single state object
  const photosRef=React.useRef({});
  const dataRef=React.useRef({});
  const mergedRef=React.useRef({});

  function buildMerged(d,p){
    const merged={...d};
    CATEGORIES.forEach(cat=>{
      if(!merged[cat.id])merged[cat.id]={};
      cat.items.forEach(item=>{
        const slot=(p[cat.id]||{})[item.id]||{};
        if(slot.before?.length||slot.vision?.length){
          merged[cat.id][item.id]={...(merged[cat.id][item.id]||{}),photosBefore:slot.before||[],photosVision:slot.vision||[]};
        }
      });
    });
    const sp=p._summary||{};
    if(sp.photos?.length||sp.aiVision?.length||sp.floorPlan?.length||sp.videos?.length){
      merged._summary={...(merged._summary||{}),photos:sp.photos||[],aiVision:sp.aiVision||[],floorPlan:sp.floorPlan||[],videos:sp.videos||[]};
    }
    return merged;
  }

  React.useEffect(()=>{
    const unsubData=dbListen(`projects/${prop.id}/data`,remote=>{
      dataRef.current=remote||{};
      mergedRef.current=buildMerged(dataRef.current,photosRef.current);
      setData(mergedRef.current);
      setSyncStatus('synced');
    });
    const unsubPhotos=dbListen(`projects/${prop.id}/photos`,remote=>{
      photosRef.current=remote||{};
      mergedRef.current=buildMerged(dataRef.current,photosRef.current);
      setData(mergedRef.current);
    });
    const unsubMembers=dbListen(`projects/${prop.id}/members`,remote=>setMembers(remote||{}));
    return ()=>{unsubData();unsubPhotos();unsubMembers();};
  },[prop.id]);

  async function updateItem(catId,itemId,value){
    setSyncStatus('syncing');
    const stamped={...value,updatedAt:Date.now(),updatedBy:username};
    // Update mergedRef synchronously so rapid successive calls see the latest state
    mergedRef.current={...mergedRef.current,[catId]:{...(mergedRef.current[catId]||{}),[itemId]:stamped}};
    setData(mergedRef.current);
    // Split: lightweight fields to /data, photos to /photos
    const{photosBefore,photosVision,...noPhotos}=stamped;
    const writes=[dbUpdate(`projects/${prop.id}/data/${catId}`,{[itemId]:noPhotos})];
    if(photosBefore!==undefined||photosVision!==undefined){
      writes.push(dbUpdate(`projects/${prop.id}/photos/${catId}/${itemId}`,{
        before:photosBefore||[],vision:photosVision||[]
      }));
    }
    await Promise.all(writes);
    setSyncStatus('synced');
  }

  async function applyAIScope(ai){
    setSyncStatus('syncing');
    const batch={};
    const now=Date.now();
    CATEGORIES.forEach(cat=>{
      const catData=ai[cat.id]||{};
      cat.items.forEach(item=>{
        const note=catData[item.id];
        if(note) batch[`${cat.id}/${item.id}`]={notes:note,status:'replace',updatedAt:now,updatedBy:username};
      });
    });
    const summaryUpdate={
      ...data._summary,
      overview:ai.summary?.overview||data._summary?.overview||'',
      priorities:ai.summary?.priorities||data._summary?.priorities||[]
    };
    const merged={...data};
    Object.entries(batch).forEach(([path,val])=>{
      const[cat,item]=path.split('/');
      merged[cat]={...(merged[cat]||{}),[item]:val};
    });
    merged._summary=summaryUpdate;
    setData(merged);
    await Promise.all([
      Object.keys(batch).length&&dbUpdate(`projects/${prop.id}/data`,batch),
      dbUpdate(`projects/${prop.id}/data`,{_summary:{overview:summaryUpdate.overview,priorities:summaryUpdate.priorities,budget:summaryUpdate.budget,timeline:summaryUpdate.timeline}}),
    ].filter(Boolean));
    setSyncStatus('synced');
  }

  async function updateSummary(value){
    const next={...data,_summary:value};
    setData(next);
    const{photos,aiVision,floorPlan,videos,...noPhotos}=value;
    await Promise.all([
      dbUpdate(`projects/${prop.id}/data`,{_summary:{...noPhotos,updatedAt:Date.now()}}),
      dbUpdate(`projects/${prop.id}/photos/_summary`,{
        photos:photos||[],
        aiVision:aiVision||[],
        floorPlan:floorPlan||[],
        videos:videos||[],
      }),
    ]);
  }

  async function saveStage(s){
    const labels={walkthrough:'Walkthrough',contract:'Under Contract',renovation:'Renovation'};
    const current=labels[stage]||stage;
    const next=labels[s]||s;
    if(!confirm(`Move "${prop.address}" from ${current} to ${next}?`)) return;
    setStage(s);
    await dbUpdate(`projects/${prop.id}/meta`,{stage:s});
    onPropUpdate({...prop,stage:s});
  }

  async function savePropFields(){
    const updated={...prop,sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()};
    await dbUpdate(`projects/${prop.id}/meta`,{sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()});
    onPropUpdate(updated);
  }

  mergedRef.current=data;
  const cat=activeTab>=0?CATEGORIES[activeTab]:null;
  const{done,total,pct}=totalProgress(data);
  const sumFilled=!!(data._summary?.overview||data._summary?.priorities?.filter(Boolean).length||data._summary?.budget);

  function catUnread(catId){
    return CATEGORIES.find(c=>c.id===catId)?.items.filter(item=>{
      const d=(data[catId]||{})[item.id];
      return d?.updatedAt&&d?.updatedBy&&d.updatedBy!==username&&d.updatedAt>getViewed(prop.id,catId,item.id);
    }).length||0;
  }
  const totalUnread=CATEGORIES.reduce((s,c)=>s+catUnread(c.id),0);

  return(
    <div className="app">
      <div className="header">
        <div className="header-top">
          <button className="btn-back" onClick={onBack}>← Back</button>
          <div className="header-title">
            <h1>{prop.address}</h1>
            <p>{sqft?sqft+' sq ft  ·  ':''}{prop.date?new Date(prop.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</p>
          </div>
          <button className="btn-share" onClick={()=>setShowShare(true)}>Share</button>
        </div>
        <div className="sqft-bar">
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M2 20h20M4 20V4m0 0h16v16"/></svg>
              <label>SQ FT</label>
            </div>
            <input placeholder="1,800" value={sqft} onChange={e=>setSqft(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 12V7a2 2 0 012-2h14a2 2 0 012 2v5M3 12v5a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M7 12V9"/></svg>
              <label>CURRENT BED</label>
            </div>
            <input type="number" min="0" placeholder="3" value={curBed} onChange={e=>setCurBed(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M4 12h16M4 12v6a1 1 0 001 1h14a1 1 0 001-1v-6M4 12V8a2 2 0 012-2h1a2 2 0 012 2v4"/><circle cx="7" cy="6" r="1" fill="white"/></svg>
              <label>BATH</label>
            </div>
            <input type="number" min="0" placeholder="1" value={curBath} onChange={e=>setCurBath(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 12V7a2 2 0 012-2h14a2 2 0 012 2v5M3 12v5a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M7 12V9"/></svg>
              <label>FUTURE BED</label>
            </div>
            <input type="number" min="0" placeholder="4" value={futBed} onChange={e=>setFutBed(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M4 12h16M4 12v6a1 1 0 001 1h14a1 1 0 001-1v-6M4 12V8a2 2 0 012-2h1a2 2 0 012 2v4"/><circle cx="7" cy="6" r="1" fill="white"/></svg>
              <label>FUTURE BATH</label>
            </div>
            <input type="number" min="0" placeholder="2" value={futBath} onChange={e=>setFutBath(e.target.value)} onBlur={savePropFields}/>
          </div>
        </div>
        <div className="stage-bar">
          {[{id:'walkthrough',icon:'🔍',label:'Walkthrough',short:'Walk'},{id:'contract',icon:'📝',label:'Under Contract',short:'Contract'},{id:'renovation',icon:'🔨',label:'Renovation',short:'Reno'}].map(s=>(
            <button key={s.id} className={`stage-pill${stage===s.id?' active-'+s.id:''}`} onClick={()=>saveStage(s.id)}>{s.icon} {s.short}</button>
          ))}
        </div>
        <div className="sync-bar">
          <div className={`sync-dot${syncStatus==='syncing'?' syncing':''}`}/>
          {syncStatus==='syncing'?'Syncing…':'All changes saved · Live sync on'}
        </div>
        <div className="tabs">
          <div className={`tab${activeTab===TAB_TASKS?' active':''}`} onClick={()=>setActiveTab(TAB_TASKS)}>
            ✅ Tasks
          </div>
          <div className={`tab${activeTab===TAB_SCOPE||activeTab>=0?' active':''}`} onClick={()=>setActiveTab(TAB_SCOPE)}>
            📐 Scope
          </div>
          <div className={`tab${activeTab===TAB_PLAN?' active':''}`} onClick={()=>setActiveTab(TAB_PLAN)}>
            📅 Plan
          </div>
          <div className={`tab${activeTab===TAB_PICS?' active':''}`} onClick={()=>setActiveTab(TAB_PICS)}>
            🖼 Photos
          </div>
          <div className={`tab${activeTab===TAB_BUDGET?' active':''}`} onClick={()=>setActiveTab(TAB_BUDGET)}>
            💰 Budget
          </div>
          <div className={`tab${showPropMore||activeTab===TAB_INFO||activeTab===TAB_TEAM?' active':''}`} onClick={()=>setShowPropMore(true)}>
            ··· More{totalUnread>0&&<span className="notif-badge">{totalUnread}</span>}
          </div>
        </div>
      </div>

      {activeTab===TAB_TASKS&&(
        <div>
          <PropEventsBar propId={prop.id}/>
          <TasksPage propId={prop.id} address={prop.address} currentUser={currentUser} members={members}/>
          {stage==='renovation'&&(
            <div style={{margin:'0 12px 12px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10,marginTop:4}}>✔️ Handoff Checklist</div>
              <HandoffPage propId={prop.id} currentUser={currentUser}/>
            </div>
          )}
        </div>
      )}

      {(activeTab===TAB_SCOPE||activeTab>=0)&&(
        activeTab>=0&&cat?(
          <div className="content" style={{padding:0,display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            <ItemCardView
              key={cat.id}
              propId={prop.id} cat={cat} data={data} mergedRef={mergedRef}
              username={username} updateItem={updateItem} setLightbox={setLightbox}
              onPrevCat={()=>setActiveTab(t=>t>0?t-1:TAB_SCOPE)}
              onNextCat={()=>setActiveTab(t=>Math.min(t+1,CATEGORIES.length-1))}/>
          </div>
        ):(
          <>
            <div style={{padding:'12px 12px 0'}}>
              <div className="progress-bar-wrap">
                <div className="progress-label"><span>Walkthrough progress</span><span>{done} of {total} items · {pct}%</span></div>
                <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
              </div>
            </div>
            <ScopeOverviewPage data={data} onOpenCat={i=>setActiveTab(i)}/>
          </>
        )
      )}

      {activeTab===TAB_INFO&&(
        <div>
          <SummaryPage summary={data._summary} onChange={updateSummary} onView={src=>setLightbox(src)} propId={prop.id} address={prop.address} currentUser={currentUser} onApplyAI={applyAIScope} isOwner={isOwner} members={members}/>
          {(stage==='contract'||stage==='renovation')&&(
            <div className="content" style={{paddingTop:0}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10}}>💰 Budget</div>
              <BudgetSection propId={prop.id}/>
            </div>
          )}
        </div>
      )}
      {activeTab===TAB_PICS&&<AIPicturesPage propId={prop.id} currentUser={currentUser}/>}
      {activeTab===TAB_BUDGET&&<DetailedBudgetPage prop={prop} data={data}/>}

      {activeTab===TAB_PLAN&&(
        <div>
          <div style={{display:'flex',gap:8,padding:'12px 14px 0'}}>
            <button onClick={()=>setPlanView('timeline')} style={{flex:1,padding:'7px 0',borderRadius:20,border:'none',fontWeight:600,fontSize:12,cursor:'pointer',background:planView==='timeline'?'#e2b04a':'rgba(255,255,255,.07)',color:planView==='timeline'?'#1a1a2e':'rgba(255,255,255,.5)'}}>📅 Timeline</button>
            <button onClick={()=>setPlanView('schedule')} style={{flex:1,padding:'7px 0',borderRadius:20,border:'none',fontWeight:600,fontSize:12,cursor:'pointer',background:planView==='schedule'?'#e2b04a':'rgba(255,255,255,.07)',color:planView==='schedule'?'#1a1a2e':'rgba(255,255,255,.5)'}}>🗓 Schedule</button>
          </div>
          {planView==='timeline'&&<ProjectSchedulePage propId={prop.id}/>}
          {planView==='schedule'&&<RenovationSchedulePage prop={prop}/>}
        </div>
      )}

      {activeTab===TAB_TEAM&&(
        <div>
          <ParticipantsPage prop={prop} data={data} currentUser={currentUser} isOwner={isOwner}/>
          {canSeeOwner&&(
            <div style={{margin:'0 12px 20px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10}}>🔒 Owner Notes</div>
              <OwnerSection propId={prop.id} currentUser={currentUser} members={members}/>
            </div>
          )}
        </div>
      )}

      {showPropMore&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:900,display:'flex',alignItems:'flex-end'}} onClick={()=>setShowPropMore(false)}>
          <div style={{background:'#0d1829',borderRadius:'20px 20px 0 0',width:'100%',paddingBottom:'env(safe-area-inset-bottom,16px)'}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,.2)',margin:'12px auto 20px'}}/>
            {[
              {icon:'📋',label:'Info',badge:sumFilled?'✓':null,tab:TAB_INFO},
              {icon:'🖼',label:'AI Photos',tab:TAB_PICS},
              {icon:'👥',label:'Team',badge:totalUnread>0?totalUnread:null,tab:TAB_TEAM},
            ].map(item=>(
              <button key={item.label} onClick={()=>{setActiveTab(item.tab);setShowPropMore(false);}} style={{display:'flex',alignItems:'center',gap:14,width:'100%',padding:'16px 24px',background:'none',border:'none',color:'white',fontSize:16,cursor:'pointer',textAlign:'left',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
                <span style={{fontSize:20,width:28}}>{item.icon}</span>
                <span style={{flex:1}}>{item.label}</span>
                {item.badge&&<span style={{background:'#e2b04a',color:'#1a1a2e',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700}}>{item.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      )}

      {showShare&&<ShareModal prop={{...prop,sqft}} data={data} onClose={()=>setShowShare(false)}/>}
      {lightbox&&(
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <button className="lightbox-close">×</button>
          <img src={lightbox} alt="" onClick={e=>e.stopPropagation()}/>
        </div>
      )}
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=React.useState(undefined); // undefined=loading
  const[currentProp,setCurrentProp]=React.useState(null);
  const[showSignup,setShowSignup]=React.useState(false);
  const[inviteInfo,setInviteInfo]=React.useState(null);
  const[firebaseReady,setFirebaseReady]=React.useState(true);

  // Check for invite token in URL
  const inviteToken=React.useMemo(()=>{
    const p=new URLSearchParams(window.location.search);return p.get('join');
  },[]);

  // Load invite info if token present
  React.useEffect(()=>{
    if(!inviteToken||!firebaseReady)return;
    dbGet(`invites/${inviteToken}`).then(info=>{if(info)setInviteInfo(info);});
  },[inviteToken,firebaseReady]);

  // Auth state listener
  React.useEffect(()=>{
    if(!firebaseReady){setAuthUser(null);return;}
    const auth=getAuth();
    if(!auth){setAuthUser(null);return;}
    let settled=false;
    const settle=u=>{if(!settled){settled=true;setAuthUser(u||null);}};
    // Timeout fallback: if Firebase auth doesn't respond in 12s, show login page
    const timer=setTimeout(()=>settle(null),12000);
    const unsub=auth.onAuthStateChanged(async user=>{
      try{
        if(user&&inviteToken&&inviteInfo){
          const memberName=user.displayName||user.email;
          const memberRole=inviteInfo.role||'Member';
          await dbSet(`projects/${inviteInfo.projectId}/members/${user.uid}`,{
            name:memberName,email:user.email,role:memberRole,addedAt:Date.now()
          });
          await dbSet(`userProjects/${user.uid}/${inviteInfo.projectId}`,true);
          await dbSet(`roster/${inviteInfo.createdBy}/${user.uid}`,{
            id:user.uid,name:memberName,email:user.email,role:memberRole,addedAt:Date.now()
          });
          const url=new URL(window.location);url.searchParams.delete('join');window.history.replaceState({},'',url);
          setInviteInfo(null);
        }
      }catch(e){console.error('Invite processing error:',e);}
      clearTimeout(timer);
      settle(user);
    });
    return ()=>{unsub();clearTimeout(timer);};
  },[firebaseReady,inviteToken,inviteInfo]);

  if(authUser===undefined)return<div className="spinner-page"><div className="spinner"/><div style={{marginTop:20,color:'rgba(255,255,255,.4)',fontSize:12,textAlign:'center'}}>v2.1 loading…</div></div>;
  if(!authUser){
    return showSignup
      ?<SignupPage onSwitch={()=>setShowSignup(false)} inviteInfo={inviteInfo}/>
      :<LoginPage onSwitch={()=>setShowSignup(true)} inviteInfo={inviteInfo}/>;
  }
  if(currentProp)return<WalkthroughView prop={currentProp} currentUser={authUser} onBack={()=>setCurrentProp(null)} onPropUpdate={p=>{setCurrentProp(p);}}/>;
  return<PropertyList currentUser={authUser} onOpen={setCurrentProp}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
