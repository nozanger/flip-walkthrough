// ── WalkthroughView ──────────────────────────────────────────────────
function AIPicturesPage({propId, currentUser}){
  const [items, setItems] = React.useState([]);
  const [adding, setAdding] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [uploading, setUploading] = React.useState({}); // itemId → true
  const [lightbox, setLightbox] = React.useState(null);

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/aiPictures`, val=>{
      if(!val) return setItems([]);
      setItems(Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt)));
    });
  },[propId]);

  async function reorderItems(newItems){
    setItems(newItems);
    const updates={};
    newItems.forEach((item,i)=>{ updates[`${item.id}/order`]=i; });
    await dbUpdate(`projects/${propId}/aiPictures`,updates);
  }

  async function addItem(){
    const title=newTitle.trim();
    if(!title) return;
    const id=uid();
    await dbSet(`projects/${propId}/aiPictures/${id}`,{title,photos:[],createdAt:Date.now(),createdBy:currentUser.uid});
    setNewTitle('');setAdding(false);
  }

  async function deleteItem(itemId){
    if(!confirm('Delete this item and all its photos?')) return;
    await dbRemove(`projects/${propId}/aiPictures/${itemId}`);
  }

  async function addPhotos(itemId, files, existing){
    existing=toArr(existing);
    const remaining=5-existing.length;
    if(remaining<=0) return;
    const toUpload=Array.from(files).slice(0,remaining);
    setUploading(u=>({...u,[itemId]:true}));
    try{
      const newPhotos=[];
      for(const file of toUpload){
        const url=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=async ev=>{try{res(await compressImage(ev.target.result));}catch(err){rej(err);}};
          r.onerror=rej;
          r.readAsDataURL(file);
        });
        newPhotos.push({url,name:file.name,uploadedAt:Date.now()});
      }
      await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{photos:[...existing,...newPhotos]});
    }catch(e){
      alert('Upload failed: '+e.message);
    }finally{
      setUploading(u=>({...u,[itemId]:false}));
    }
  }

  async function deletePhoto(itemId, photoIdx, existing){
    const updated=existing.filter((_,i)=>i!==photoIdx);
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{photos:updated});
  }

  async function updateTitle(itemId, title){
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{title});
  }

  async function updateLinks(itemId, materialLinks){
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{materialLinks});
  }

  return(
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0 12px'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#888'}}>🖼 AI Pictures</div>
        <button onClick={()=>setAdding(true)} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'7px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ Add Item</button>
      </div>

      {adding&&(
        <div style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'#f59e0b',marginBottom:10}}>New Item</div>
          <input
            autoFocus
            value={newTitle} onChange={e=>setNewTitle(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')addItem();if(e.key==='Escape'){setAdding(false);setNewTitle('');}}}
            placeholder="e.g. Downstairs Bathroom, Master Bedroom…"
            style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'9px 12px',color:'white',fontSize:14,boxSizing:'border-box',marginBottom:10}}
          />
          <div style={{display:'flex',gap:8}}>
            <button onClick={addItem} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'7px 16px',fontWeight:700,fontSize:13,cursor:'pointer'}}>Add</button>
            <button onClick={()=>{setAdding(false);setNewTitle('');}} style={{background:'rgba(255,255,255,.1)',color:'white',border:'none',borderRadius:8,padding:'7px 16px',fontSize:13,cursor:'pointer'}}>Cancel</button>
          </div>
        </div>
      )}

      {items.length===0&&!adding&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'rgba(255,255,255,.35)',fontSize:14}}>
          No pictures yet.<br/>Tap <strong style={{color:'#f59e0b'}}>+ Add Item</strong> to create your first one.
        </div>
      )}

      <SortableList
        items={items}
        keyFn={item=>item.id}
        onReorder={reorderItems}
        gap={14}
        renderItem={item=>(
          <AIPictureItem
            item={item}
            uploading={!!uploading[item.id]}
            onAddPhotos={files=>addPhotos(item.id,files,item.photos)}
            onDeletePhoto={(idx)=>deletePhoto(item.id,idx,item.photos)}
            onDeleteItem={()=>deleteItem(item.id)}
            onUpdateTitle={t=>updateTitle(item.id,t)}
            onUpdateLinks={links=>updateLinks(item.id,links)}
            onLightbox={setLightbox}
          />
        )}
      />

      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <img src={lightbox} style={{maxWidth:'100%',maxHeight:'100%',borderRadius:10,objectFit:'contain'}} onClick={e=>e.stopPropagation()}/>
          <button onClick={()=>setLightbox(null)} style={{position:'fixed',top:20,right:20,background:'rgba(255,255,255,.15)',border:'none',borderRadius:'50%',width:40,height:40,color:'white',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
      )}
    </div>
  );
}

function AIPictureItem({item, uploading, onAddPhotos, onDeletePhoto, onDeleteItem, onUpdateTitle, onUpdateLinks, onLightbox}){
  const [open, setOpen] = React.useState(false);
  const [editingTitle, setEditingTitle] = React.useState(false);
  const [titleVal, setTitleVal] = React.useState(item.title);
  const [links, setLinks] = React.useState(toArr(item.materialLinks));
  const [editingLinks, setEditingLinks] = React.useState(false);
  const fileRef = React.useRef();
  const photos = toArr(item.photos);
  const canAdd = photos.length < 5;

  React.useEffect(()=>{ setLinks(toArr(item.materialLinks)); },[JSON.stringify(item.materialLinks)]);

  function saveTitle(){
    const t=titleVal.trim();
    if(t&&t!==item.title) onUpdateTitle(t);
    setEditingTitle(false);
  }

  function updateLinkField(idx, field, val){
    const next=links.map((l,i)=>i===idx?{...l,[field]:val}:l);
    setLinks(next);
    onUpdateLinks(next);
  }

  function addLink(){
    if(links.length>=6) return;
    const next=[...links,{title:'',url:''}];
    setLinks(next);
    onUpdateLinks(next);
  }

  function removeLink(idx){
    const next=links.filter((_,i)=>i!==idx);
    setLinks(next);
    onUpdateLinks(next);
  }

  const validLinks = links.filter(l=>l.url);

  return(
    <div style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,overflow:'hidden'}}>

      {/* Header row — always visible */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'13px 14px',cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span onClick={e=>e.stopPropagation()} style={{color:'rgba(255,255,255,.25)',fontSize:18,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>

        {editingTitle?(
          <input
            autoFocus value={titleVal} onChange={e=>setTitleVal(e.target.value)}
            onBlur={saveTitle}
            onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape'){setTitleVal(item.title);setEditingTitle(false);}}}
            onClick={e=>e.stopPropagation()}
            style={{flex:1,background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.25)',borderRadius:7,padding:'5px 10px',color:'white',fontSize:15,fontWeight:600}}
          />
        ):(
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
            <span style={{fontSize:15,fontWeight:700,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</span>
            <span onClick={e=>{e.stopPropagation();setTitleVal(item.title);setEditingTitle(true);}} style={{fontSize:11,color:'rgba(255,255,255,.3)',cursor:'pointer',flexShrink:0}}>✏️</span>
          </div>
        )}

        {/* Badges */}
        <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
          {photos.length>0&&(
            <span style={{background:'rgba(255,255,255,.1)',borderRadius:20,padding:'2px 8px',fontSize:11,color:'rgba(255,255,255,.6)',fontWeight:600}}>📷 {photos.length}</span>
          )}
          {validLinks.length>0&&(
            <span style={{background:'rgba(245,158,11,.15)',borderRadius:20,padding:'2px 8px',fontSize:11,color:'#f59e0b',fontWeight:600}}>🔗 {validLinks.length}</span>
          )}
          <span style={{color:'rgba(255,255,255,.3)',fontSize:13,marginLeft:2}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {/* Expanded body */}
      {open&&(
        <div style={{borderTop:'1px solid rgba(255,255,255,.07)'}}>

          {/* Photos strip */}
          <div style={{padding:'14px 14px 0'}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#666',marginBottom:10}}>Photos</div>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:10}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:'relative',borderRadius:10,overflow:'hidden',flexShrink:0,width:110,height:110,background:'rgba(255,255,255,.07)'}}>
                  <img src={p.url} onClick={()=>onLightbox(p.url)} style={{width:'100%',height:'100%',objectFit:'cover',cursor:'pointer',display:'block'}}/>
                  <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',justifyContent:'space-between',padding:'4px 5px',background:'linear-gradient(transparent,rgba(0,0,0,.7))'}}>
                    <a href={p.url} download={p.name||`photo-${i+1}.jpg`} onClick={e=>e.stopPropagation()} style={{background:'rgba(0,0,0,.5)',borderRadius:5,padding:'3px 6px',color:'white',fontSize:10,textDecoration:'none'}} title="Download">⬇</a>
                    <button onClick={()=>onDeletePhoto(i)} style={{background:'rgba(220,53,69,.7)',border:'none',borderRadius:5,padding:'3px 7px',color:'white',fontSize:10,cursor:'pointer'}}>✕</button>
                  </div>
                </div>
              ))}
              {uploading&&(
                <div style={{flexShrink:0,width:110,height:110,borderRadius:10,background:'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⏳</div>
              )}
              {canAdd&&!uploading&&(
                <>
                  <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{onAddPhotos(e.target.files);e.target.value='';}}/>
                  <div onClick={()=>fileRef.current.click()} style={{flexShrink:0,width:110,height:110,borderRadius:10,border:'2px dashed rgba(255,255,255,.18)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:11,fontWeight:600}}>
                    <span style={{fontSize:22}}>📷</span>
                    <span>{photos.length}/5</span>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Material Links */}
          <div style={{padding:'4px 14px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#666'}}>Material Links</div>
              <button onClick={()=>setEditingLinks(e=>!e)} style={{background:'none',border:'none',color:'#f59e0b',fontSize:12,cursor:'pointer',fontWeight:600,padding:0}}>
                {editingLinks?'Done':'Edit'}
              </button>
            </div>

            {!editingLinks?(
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {validLinks.length===0&&(
                  <div style={{fontSize:12,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>No links yet — tap Edit to add</div>
                )}
                {links.map((link,i)=>link.url?(
                  <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.09)',borderRadius:9,padding:'9px 12px',textDecoration:'none'}}>
                    <span style={{fontSize:16,flexShrink:0}}>🔗</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{link.title||'Untitled Link'}</div>
                      <div style={{fontSize:11,color:'rgba(255,255,255,.35)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{link.url}</div>
                    </div>
                    <span style={{color:'#f59e0b',fontSize:14,flexShrink:0}}>↗</span>
                  </a>
                ):null)}
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <SortableList
                  items={links}
                  onReorder={next=>{setLinks(next);onUpdateLinks(next);}}
                  gap={7}
                  renderItem={(link,i)=>(
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span style={{color:'rgba(255,255,255,.25)',fontSize:14,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                      <input
                        value={link.title} onChange={e=>updateLinkField(i,'title',e.target.value)}
                        placeholder="Label (e.g. Tiles)"
                        style={{width:90,flexShrink:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:7,padding:'7px 8px',color:'white',fontSize:12}}
                      />
                      <input
                        value={link.url} onChange={e=>updateLinkField(i,'url',e.target.value)}
                        placeholder="Paste URL"
                        style={{flex:1,minWidth:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:7,padding:'7px 8px',color:'white',fontSize:12}}
                      />
                      <button onClick={()=>removeLink(i)} style={{flexShrink:0,background:'rgba(220,53,69,.15)',border:'none',borderRadius:6,padding:'6px 9px',color:'#dc3545',fontSize:13,cursor:'pointer'}}>✕</button>
                    </div>
                  )}
                />
                {links.length<6&&(
                  <button onClick={addLink} style={{background:'rgba(255,255,255,.06)',border:'1px dashed rgba(255,255,255,.15)',borderRadius:8,padding:'8px 12px',color:'rgba(255,255,255,.5)',fontSize:12,cursor:'pointer',textAlign:'left'}}>+ Add Link</button>
                )}
              </div>
            )}
          </div>

          {/* Footer actions */}
          <div style={{borderTop:'1px solid rgba(255,255,255,.06)',padding:'10px 14px',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={onDeleteItem} style={{background:'rgba(220,53,69,.12)',border:'1px solid rgba(220,53,69,.2)',borderRadius:8,padding:'6px 14px',color:'#dc3545',fontSize:12,fontWeight:600,cursor:'pointer'}}>🗑 Delete Item</button>
          </div>
        </div>
      )}
    </div>
  );
}

const HANDOFF_DEFAULTS = [
  {text:'Turn on water heater and verify hot water', order:0},
  {text:'Run all faucets and shower for 30 minutes', order:1},
  {text:'Test HVAC — heat and AC', order:2},
  {text:'Test all electrical outlets', order:3},
  {text:'Test all light switches', order:4},
  {text:'Test smoke and CO detectors', order:5},
  {text:'Check all windows open, close, and lock', order:6},
  {text:'Check all exterior doors lock properly', order:7},
  {text:'Test garage door opener', order:8},
  {text:'Run dishwasher full cycle', order:9},
  {text:'Test range/oven burners', order:10},
  {text:'Check under sinks for leaks', order:11},
  {text:'Walk every room — no debris, patch, or paint missed', order:12},
  {text:'Take final walkthrough photos', order:13},
  {text:'Duplicate key and deliver to new owner', order:14},
  {text:'Remove all lockboxes from property', order:15},
  {text:'Check all laundry hookups and outlet are connected', order:16},
];

function HandoffPage({propId, currentUser}){
  const [items, setItems] = React.useState(null);
  const [newText, setNewText] = React.useState('');
  const [expandedId, setExpandedId] = React.useState(null);
  const [saving, setSaving] = React.useState(false);

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/handoff`, val=>{
      if(!val){
        // seed defaults on first load
        const defaults = {};
        HANDOFF_DEFAULTS.forEach((d,i)=>{
          const id = 'h'+i;
          defaults[id] = {id, text:d.text, checked:false, notes:'', isCustom:false, order:d.order};
        });
        dbSet(`projects/${propId}/handoff`, defaults);
        setItems(Object.values(defaults));
      } else {
        const arr = Object.values(val).sort((a,b)=>(a.order??0)-(b.order??0));
        setItems(arr);
      }
    });
  },[propId]);

  async function toggle(item){
    await dbUpdate(`projects/${propId}/handoff/${item.id}`,{checked:!item.checked});
  }

  async function saveNotes(item, notes){
    await dbUpdate(`projects/${propId}/handoff/${item.id}`,{notes});
  }

  async function addItem(){
    if(!newText.trim()) return;
    setSaving(true);
    const id = 'hc'+Date.now();
    const order = items ? items.length : 100;
    await dbSet(`projects/${propId}/handoff/${id}`,{id, text:newText.trim(), checked:false, notes:'', isCustom:true, order});
    setNewText('');
    setSaving(false);
  }

  async function removeItem(item){
    if(!item.isCustom) return;
    if(!confirm('Remove this item?')) return;
    await dbRemove(`projects/${propId}/handoff/${item.id}`);
  }

  if(!items) return <div style={{textAlign:'center',padding:40,color:'#888'}}>Loading…</div>;

  const checked = items.filter(i=>i.checked).length;
  const total = items.length;
  const pct = total ? Math.round(checked/total*100) : 0;
  const done = pct===100;

  return(
    <div className="content" style={{paddingBottom:80}}>
      {done&&(
        <div style={{background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:14,padding:'20px 24px',textAlign:'center',marginBottom:20,boxShadow:'0 4px 20px rgba(22,163,74,.4)'}}>
          <div style={{fontSize:36,marginBottom:6}}>🎉</div>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>Project Complete!</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginTop:4}}>All handoff items are done. Great work!</div>
        </div>
      )}

      <div style={{background:'rgba(255,255,255,.06)',borderRadius:14,padding:'16px 18px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:14,color:'#fff'}}>Completion</div>
          <div style={{fontWeight:700,fontSize:14,color:done?'#4ade80':'#f59e0b'}}>{checked}/{total} · {pct}%</div>
        </div>
        <div style={{background:'rgba(255,255,255,.1)',borderRadius:99,height:8,overflow:'hidden'}}>
          <div style={{width:pct+'%',height:'100%',background:done?'#22c55e':'#f59e0b',borderRadius:99,transition:'width .4s'}}/>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
        {items.map(item=>(
          <div key={item.id} style={{background:'rgba(255,255,255,.06)',borderRadius:12,overflow:'hidden',border:item.checked?'1px solid rgba(34,197,94,.3)':'1px solid rgba(255,255,255,.08)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',cursor:'pointer'}} onClick={()=>setExpandedId(expandedId===item.id?null:item.id)}>
              <div onClick={e=>{e.stopPropagation();toggle(item);}} style={{width:22,height:22,borderRadius:6,border:item.checked?'2px solid #22c55e':'2px solid rgba(255,255,255,.3)',background:item.checked?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all .2s'}}>
                {item.checked&&<span style={{color:'#fff',fontSize:13,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1,fontSize:14,color:item.checked?'rgba(255,255,255,.5)':'#fff',textDecoration:item.checked?'line-through':'none',lineHeight:1.3}}>{item.text}</div>

                  placeholder="Add notes…"

                />
              </div>
            )}

      </div>

      <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:'14px 14px'}}>
        <div style={{fontSize:12,fontWeight:600,color:'#888',marginBottom:8}}>Add Custom Item</div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={newText}
            onChange={e=>setNewText(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addItem()}
            placeholder="e.g. Return keys to property manager"
            style={{flex:1,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:13}}
          />
          <button onClick={addItem} disabled={saving||!newText.trim()} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'9px 16px',fontWeight:700,fontSize:13,cursor:'pointer',opacity:saving||!newText.trim()?0.5:1}}>
            {saving?'…':'Add'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PropEventsBar({propId}){
  const [events, setEvents] = React.useState([]);
  React.useEffect(()=>{
    return dbListen(`projects/${propId}/events`, val=>{
      if(!val){setEvents([]);return;}
      const now=new Date();
      function pad(n){return String(n).padStart(2,'0');}
      const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      const list=Object.values(val)
        .filter(e=>e.date>=todayKey)
        .sort((a,b)=>a.date.localeCompare(b.date));
      setEvents(list);
    });
  },[propId]);

  if(events.length===0) return null;

  const MONTH=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return(
    <div style={{margin:'12px 12px 0',background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.25)',borderRadius:14,overflow:'hidden'}}>
      <div style={{padding:'10px 14px 6px',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#60a5fa'}}>📅 Upcoming Events</div>
      {events.map(ev=>{
        const d=new Date(ev.date+'T12:00');
        const now=new Date();
        function pad(n){return String(n).padStart(2,'0');}
        const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
        const isToday=ev.date===todayKey;
        return(
          <div key={ev.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 14px',borderTop:'1px solid rgba(59,130,246,.12)'}}>
            <div style={{textAlign:'center',minWidth:32,flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:isToday?'#f59e0b':'#60a5fa',lineHeight:1}}>{d.getDate()}</div>
              <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.4)',textTransform:'uppercase'}}>{MONTH[d.getMonth()]}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</div>
              {ev.notes&&<div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.notes}</div>}
            </div>
            {isToday&&<span style={{background:'#f59e0b',color:'#000',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:20,flexShrink:0,textTransform:'uppercase'}}>Today</span>}
          </div>
        );
      })}
    </div>
  );
}

function ProjectSchedulePage({propId}){
  const[plan,setPlan]=React.useState({startDate:'',assignments:{},numWeeks:6,payments:{},calendarDone:false,inspection:null});
  const[weekTitles,setWeekTitles]=React.useState({});
  const[tlDragOver,setTlDragOver]=React.useState(null);
  const[tlDragOverIdx,setTlDragOverIdx]=React.useState(null); // {week,idx}
  const tlDragRef=React.useRef(null);
  const tlDragOverRef=React.useRef(null);
  const tlDragOverIdxRef=React.useRef(null);
  const tlGhostRef=React.useRef(null);
  const[itemOrder,setItemOrder]=React.useState({});
  const[tlInspections,setTlInspections]=React.useState({}); // {id:{week,label}}
  const[itemLabels,setItemLabels]=React.useState({}); // {catId|itemId: label}
  const[editLabelKey,setEditLabelKey]=React.useState(null); // key being edited
  const[editLabelText,setEditLabelText]=React.useState('');

  React.useEffect(()=>dbListen(`projects/${propId}/weekplan/itemOrder`,v=>setItemOrder(v||{})),[propId]);
  React.useEffect(()=>dbListen(`projects/${propId}/weekplan/inspections`,v=>setTlInspections(v||{})),[propId]);
  React.useEffect(()=>dbListen(`projects/${propId}/weekplan/itemLabels`,v=>setItemLabels(v||{})),[propId]);
  React.useEffect(()=>dbListen(`projects/${propId}/weekplan/weekTitles`,v=>setWeekTitles(v||{})),[propId]);

  function itemsForWeekOrdered(n){
    const regular=itemsForWeek(n).map(it=>({...it,key:it.catId+'|'+it.itemId,label:itemLabels[it.catId+'|'+it.itemId]||it.label}));
    const inspItems=Object.entries(tlInspections).filter(([id,v])=>v&&v.week===n)
      .map(([id,v])=>({key:'insp|'+id,isInsp:true,inspId:id,catId:'insp',itemId:id,label:v.label||'City Inspection'}));
    const all=[...regular,...inspItems];
    const order=itemOrder[n];
    if(!order||!order.length)return all;
    const map=Object.fromEntries(all.map(it=>[it.key,it]));
    const ordered=order.map(k=>map[k]).filter(Boolean);
    const extra=all.filter(it=>!order.includes(it.key));
    return[...ordered,...extra];
  }

  async function reorderTlWeek(n,newOrder){
    await dbSet(`projects/${propId}/weekplan/itemOrder/${n}`,newOrder.map(it=>it.key));
  }

  async function dropOnTlItem(destWeek,destIdx){
    const src=tlDragRef.current;
    tlDragRef.current=null;tlDragOverRef.current=null;tlDragOverIdxRef.current=null;
    setTlDragOver(null);setTlDragOverIdx(null);
    if(!src)return;
    if(src.srcWeek===destWeek){
      const items=itemsForWeekOrdered(destWeek);
      if(src.listIdx===destIdx||src.listIdx===destIdx-1)return;
      const newOrder=[...items];
      const[moved]=newOrder.splice(src.listIdx,1);
      newOrder.splice(destIdx>src.listIdx?destIdx-1:destIdx,0,moved);
      await reorderTlWeek(destWeek,newOrder);
    }else{
      if(src.isInsp){
        await dbSet(`projects/${propId}/weekplan/inspections/${src.inspId}/week`,destWeek);
      }else{
        await moveTimelineItem(src.catId,src.itemId,src.srcWeek,destWeek);
      }
    }
  }

  async function addTlInspection(week){
    const id=Date.now().toString(36);
    await dbSet(`projects/${propId}/weekplan/inspections/${id}`,{week,label:'City Inspection'});
  }

  async function deleteTlInspection(id){
    await dbRemove(`projects/${propId}/weekplan/inspections/${id}`);
  }

  async function saveTlLabel(key,label){
    if(key.startsWith('insp|')){
      const id=key.replace('insp|','');
      await dbSet(`projects/${propId}/weekplan/inspections/${id}/label`,label);
    }else{
      await dbSet(`projects/${propId}/weekplan/itemLabels/${key}`,label);
    }
    setEditLabelKey(null);
  }

  async function moveTimelineItem(catId,itemId,srcWeek,destWeek){
    if(srcWeek===destWeek||!destWeek)return;
    await dbRemove(`projects/${propId}/weekplan/assignments/${catId}/${itemId}/${srcWeek}`);
    await dbSet(`projects/${propId}/weekplan/assignments/${catId}/${itemId}/${destWeek}`,true);
  }

  function startTlTouchDrag(e,item){
    e.stopPropagation();
    tlDragRef.current=item;
    const touch=e.touches[0];
    const ghost=document.createElement('div');
    ghost.textContent=item.label;
    ghost.style.cssText='position:fixed;z-index:9999;background:#e2b04a;color:#1a1a2e;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;pointer-events:none;opacity:.92;left:'+(touch.clientX+12)+'px;top:'+(touch.clientY-30)+'px;';
    document.body.appendChild(ghost);tlGhostRef.current=ghost;
    function onMove(e){
      e.preventDefault();
      const t=e.touches[0];
      if(!tlGhostRef.current)return;
      tlGhostRef.current.style.left=(t.clientX+12)+'px';
      tlGhostRef.current.style.top=(t.clientY-30)+'px';
      tlGhostRef.current.style.display='none';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      tlGhostRef.current.style.display='';
      const wn=parseInt(el?.closest('[data-week]')?.dataset.week);
      const w=isNaN(wn)?null:wn;
      tlDragOverRef.current=w;setTlDragOver(w);
    }
    function onEnd(){
      if(tlGhostRef.current){tlGhostRef.current.remove();tlGhostRef.current=null;}
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onEnd);
      const src=tlDragRef.current,dest=tlDragOverRef.current;
      tlDragRef.current=null;tlDragOverRef.current=null;setTlDragOver(null);
      if(src&&dest!=null&&src.srcWeek!==dest)moveTimelineItem(src.catId,src.itemId,src.srcWeek,dest);
    }
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
  }
  const[activeWeek,setActiveWeek]=React.useState(1);
  const[dateInput,setDateInput]=React.useState('');
  const[calMode,setCalMode]=React.useState(false);
  const[editingItem,setEditingItem]=React.useState(null); // {catId,itemId,label}
  const[payInputs,setPayInputs]=React.useState({}); // {catId_itemId: string}

  React.useEffect(()=>dbListen(`projects/${propId}/weekplan`,d=>{
    const p=d&&d.assignments?d:{startDate:d&&d.startDate||'',assignments:{},numWeeks:d&&d.numWeeks||8,payments:d&&d.payments||{},calendarDone:d&&d.calendarDone||false,inspection:d&&d.inspection!=null?d.inspection:null};
    if(!p.numWeeks)p.numWeeks=8;
    if(!p.payments)p.payments={};
    if(p.inspection===undefined)p.inspection=null;
    setPlan(p);
    setDateInput(prev=>prev===''?p.startDate||'':prev);
    // restore calendar mode if user previously pressed Done
    setCalMode(!!p.calendarDone);
  }),[propId]);

  const numWeeks=plan.numWeeks||8;

  async function addWeek(){
    await dbSet(`projects/${propId}/weekplan/numWeeks`,numWeeks+1);
    setActiveWeek(numWeeks+1);
  }
  async function setNumWeeks(n){
    if(n<1||n>24)return;
    await dbSet(`projects/${propId}/weekplan/numWeeks`,n);
  }
  async function saveWeekTitle(n,title){
    if(title.trim()){
      await dbSet(`projects/${propId}/weekplan/weekTitles/${n}`,title.trim());
    }else{
      await dbRemove(`projects/${propId}/weekplan/weekTitles/${n}`);
    }
  }
  function defaultTitle(n,total){
    const banks={
      4:['Demo & Rough-in','Drywall & Tile','Flooring & Paint','Finishes & Closeout'],
      5:['Demo & Framing','Plumbing & Electrical','Drywall & Tile','Flooring, Cabinets & Paint','Finishes & Closeout'],
      6:['Demo & Framing','Plumbing & Electrical','Drywall & Tile','Flooring & Paint','Cabinets & Finishes','Punch List & Closeout'],
      8:['Demo & Framing','Rough Plumbing','Rough Electrical','Drywall','Tile & Paint','Flooring','Cabinets & Finishes','Punch List & Closeout'],
      10:['Demo','Framing','Rough Plumbing','Rough Electrical','Drywall','Tile','Paint','Flooring','Cabinets & Finishes','Punch List & Closeout'],
      12:['Demo','Framing','Rough Plumbing','Rough Electrical','Insulation & Inspection','Drywall','Tile','Paint','Flooring','Cabinets & Countertops','Finishes & Fixtures','Punch List & Closeout'],
    };
    const keys=Object.keys(banks).map(Number).sort((a,b)=>a-b);
    const best=keys.reduce((p,c)=>Math.abs(c-total)<Math.abs(p-total)?c:p);
    const arr=banks[best];
    const idx=Math.min(Math.round((n-1)/(Math.max(total,2)-1)*(arr.length-1)),arr.length-1);
    return arr[idx];
  }
  function getWeekTitle(n){return weekTitles[n]||defaultTitle(n,numWeeks)||`Week ${n}`;}

  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function mondayOf(dateStr){
    const d=new Date(dateStr+'T12:00:00');
    const day=d.getDay(),diff=day===0?-6:1-day;
    d.setDate(d.getDate()+diff);return d;
  }
  function weekStartDate(n){
    if(!plan.startDate)return null;
    const d=mondayOf(plan.startDate);
    d.setDate(d.getDate()+(n-1)*7);return d;
  }
  function fmtD(d){if(!d)return'';return MONTHS[d.getMonth()]+' '+d.getDate();}

  async function setStartDate(val){
    if(!val)return;
    const mon=mondayOf(val);
    await dbSet(`projects/${propId}/weekplan/startDate`,mon.toISOString().split('T')[0]);
  }

  // assignments[catId][itemId] = { 1: true, 3: true } — set of weeks
  function getWeeks(catId,itemId){
    const val=((plan.assignments||{})[catId]||{})[itemId];
    if(!val)return{};
    // migrate legacy: if stored as plain number, convert
    if(typeof val==='number')return{[val]:true};
    return val;
  }

  function inWeek(catId,itemId,n){return!!getWeeks(catId,itemId)[n];}

  async function toggleItem(catId,itemId){
    const already=inWeek(catId,itemId,activeWeek);
    if(already){
      await dbRemove(`projects/${propId}/weekplan/assignments/${catId}/${itemId}/${activeWeek}`);
    }else{
      await dbSet(`projects/${propId}/weekplan/assignments/${catId}/${itemId}/${activeWeek}`,true);
    }
  }

  function getPayment(catId,itemId){
    return parseFloat(((plan.payments||{})[catId]||{})[itemId]||0)||0;
  }
  async function savePayment(catId,itemId,val){
    const num=parseFloat(val);
    if(isNaN(num)||num<0)return;
    await dbSet(`projects/${propId}/weekplan/payments/${catId}/${itemId}`,num);
  }
  function weekPaymentTotal(n){
    let total=0;
    CATEGORIES.forEach(cat=>{
      const ca=(plan.assignments||{})[cat.id]||{};
      cat.items.forEach(item=>{
        const weeks=ca[item.id];
        const w=typeof weeks==='number'?{[weeks]:true}:(weeks||{});
        if(w[n]){
          const numAssigned=Object.keys(w).length||1;
          total+=getPayment(cat.id,item.id)/numAssigned;
        }
      });
    });
    return total;
  }
  function fmtMoney(n){return n>=1000?'$'+(n/1000).toFixed(n%1000===0?0:1)+'k':'$'+n.toLocaleString();}

  function weekCount(n){
    let c=0;
    Object.values(plan.assignments||{}).forEach(ca=>{
      Object.values(ca||{}).forEach(weeks=>{
        const w=typeof weeks==='number'?{[weeks]:true}:(weeks||{});
        if(w[n])c++;
      });
    });
    return c;
  }

  function itemsForWeek(n){
    const out=[];
    CATEGORIES.forEach(cat=>{
      const ca=(plan.assignments||{})[cat.id]||{};
      cat.items.forEach(item=>{
        const weeks=ca[item.id];
        const w=typeof weeks==='number'?{[weeks]:true}:(weeks||{});
        if(w[n])out.push({catId:cat.id,itemId:item.id,label:item.label});
      });
    });
    return out;
  }

  const ws=weekStartDate(activeWeek);
  const we=ws?new Date(ws.getTime()+6*864e5):null;
  const weekItems=itemsForWeek(activeWeek);

  const planView=(
    <div style={{paddingBottom:100}}>

      {/* Start date + week count */}
      <div style={{padding:'12px 12px 0',display:'flex',gap:10}}>
        <div style={{flex:1,background:'rgba(226,176,74,.08)',border:'1px solid rgba(226,176,74,.22)',borderRadius:12,padding:'12px 14px'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#e2b04a',marginBottom:8,textTransform:'uppercase',letterSpacing:'.5px'}}>Start Date</div>
          <input type="date" value={dateInput}
            onChange={e=>setDateInput(e.target.value)}
            onBlur={e=>{if(e.target.value)setStartDate(e.target.value);}}
            style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.18)',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:14,width:'100%',boxSizing:'border-box'}}/>
          {plan.startDate&&<div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:5}}>
            Ends {fmtD(weekStartDate(numWeeks)&&new Date(weekStartDate(numWeeks).getTime()+6*864e5))}
          </div>}
        </div>
        <div style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.12)',borderRadius:12,padding:'12px 14px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,minWidth:80}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.5px'}}>Weeks</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setNumWeeks(numWeeks-1)} disabled={numWeeks<=1} style={{width:28,height:28,borderRadius:'50%',border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.08)',color:'white',fontSize:18,lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:numWeeks<=1?.3:1}}>−</button>
            <span style={{fontSize:22,fontWeight:700,color:'white',minWidth:24,textAlign:'center'}}>{numWeeks}</span>
            <button onClick={()=>setNumWeeks(numWeeks+1)} disabled={numWeeks>=24} style={{width:28,height:28,borderRadius:'50%',border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.08)',color:'white',fontSize:18,lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:numWeeks>=24?.3:1}}>+</button>
          </div>
        </div>
      </div>


      {/* 8-week Gantt grid */}
      <div style={{padding:'10px 12px 0',overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <div style={{display:'flex',gap:5,minWidth:numWeeks*72+80}}>
          {Array.from({length:numWeeks},(_,i)=>i+1).map(n=>{
            const active=activeWeek===n;
            const wsd=weekStartDate(n);
            const cnt=weekCount(n);
            return(
              <div key={n} onClick={()=>setActiveWeek(n)} style={{flex:1,minWidth:68,background:active?'rgba(226,176,74,.18)':'rgba(255,255,255,.04)',border:active?'1.5px solid #e2b04a':'1px solid rgba(255,255,255,.08)',borderRadius:10,padding:'8px 5px',cursor:'pointer',textAlign:'center'}}>
                <div style={{fontSize:9,fontWeight:700,color:active?'#e2b04a':'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'.3px'}}>Wk {n}</div>
                {wsd&&<div style={{fontSize:8,color:'rgba(255,255,255,.2)',marginTop:1}}>{fmtD(wsd)}</div>}
                <div style={{fontSize:9,fontWeight:600,color:active?'#e2b04a':'rgba(255,255,255,.45)',marginTop:4,lineHeight:1.25,minHeight:22,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 2px'}}>
                  {getWeekTitle(n).split(' ').slice(0,3).join(' ')}
                </div>
                {cnt>0&&<div style={{marginTop:4,background:active?'#e2b04a':'rgba(255,255,255,.1)',borderRadius:20,padding:'1px 6px',fontSize:10,fontWeight:700,color:active?'#000':'rgba(255,255,255,.4)',display:'inline-block'}}>{cnt}</div>}
                {weekPaymentTotal(n)>0&&<div style={{marginTop:3,fontSize:8,fontWeight:700,color:active?'#e2b04a':'rgba(226,176,74,.45)'}}>{fmtMoney(weekPaymentTotal(n))}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Active week header */}
      <div style={{padding:'12px 12px 4px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.5px',flexShrink:0}}>Week {activeWeek}</span>
            {ws&&<span style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>{fmtD(ws)} – {fmtD(we)}</span>}
          </div>
          <input
            key={activeWeek}
            defaultValue={getWeekTitle(activeWeek)}
            onBlur={e=>saveWeekTitle(activeWeek,e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
            placeholder="Week title…"
            style={{width:'100%',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'7px 10px',color:'white',fontSize:14,fontWeight:600,outline:'none',boxSizing:'border-box'}}
          />
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={()=>setActiveWeek(w=>Math.max(1,w-1))} disabled={activeWeek===1}
            style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:8,color:'white',padding:'6px 12px',cursor:'pointer',opacity:activeWeek===1?0.3:1,fontSize:14}}>‹</button>
          <button onClick={()=>setActiveWeek(w=>Math.min(numWeeks,w+1))} disabled={activeWeek===numWeeks}
            style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:8,color:'white',padding:'6px 12px',cursor:'pointer',opacity:activeWeek===numWeeks?0.3:1,fontSize:14}}>›</button>
        </div>
      </div>

      {/* Assigned items chips for this week */}
      {weekItems.length>0&&(
        <div style={{padding:'0 12px 8px',display:'flex',flexWrap:'wrap',gap:5}}>
          {weekItems.map((it,i)=>(
            <div key={i} style={{background:'rgba(226,176,74,.14)',border:'1px solid rgba(226,176,74,.3)',borderRadius:20,padding:'4px 11px',fontSize:11,color:'#e2b04a',fontWeight:600}}>
              {it.label}
            </div>
          ))}
        </div>
      )}
      {weekItems.length===0&&(
        <div style={{padding:'0 12px 8px'}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,.2)',fontStyle:'italic'}}>Nothing assigned yet — tap items below</div>
        </div>
      )}

      {/* Scope items by category */}
      <div style={{padding:'0 12px'}}>
        {CATEGORIES.map(cat=>(
          <div key={cat.id} style={{marginBottom:4}}>
            <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'1px',padding:'10px 4px 5px',display:'flex',alignItems:'center',gap:6}}>
              <span>{cat.icon}</span><span>{cat.label}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}>
              {cat.items.map(item=>{
                const weeks=getWeeks(cat.id,item.id);
                const isHere=!!weeks[activeWeek];
                const otherWeeks=Object.keys(weeks).map(Number).filter(w=>w!==activeWeek).sort((a,b)=>a-b);
                const payKey=`${cat.id}_${item.id}`;
                const payVal=payInputs[payKey]!==undefined?payInputs[payKey]:String(getPayment(cat.id,item.id)||'');
                return(
                  <div key={item.id} style={{borderRadius:10,overflow:'hidden',
                    background:isHere?'rgba(226,176,74,.12)':'rgba(255,255,255,.04)',
                    border:isHere?'1px solid rgba(226,176,74,.3)':'1px solid rgba(255,255,255,.06)'}}>
                    <div onClick={()=>toggleItem(cat.id,item.id)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',cursor:'pointer'}}>
                      <div style={{width:20,height:20,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                        background:isHere?'#e2b04a':'transparent',
                        border:isHere?'none':'2px solid rgba(255,255,255,.2)'}}>
                        {isHere&&<span style={{fontSize:11,color:'#000',fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{flex:1,fontSize:13,color:isHere?'white':'rgba(255,255,255,.7)',fontWeight:isHere?600:400}}>
                        {item.label}
                      </span>
                      {otherWeeks.length>0&&(
                        <div style={{display:'flex',gap:3}}>
                          {otherWeeks.map(w=>(
                            <span key={w} style={{fontSize:10,fontWeight:700,background:'rgba(255,255,255,.1)',borderRadius:20,padding:'2px 7px',color:'rgba(255,255,255,.35)'}}>W{w}</span>
                          ))}
                        </div>
                      )}
                    </div>
                    {/* Payment input — always visible */}
                    <div onClick={e=>e.stopPropagation()} style={{padding:'0 12px 10px',display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>$</span>
                      <input
                        type="number" min="0" placeholder="Payment amount"
                        value={payVal}
                        onChange={e=>setPayInputs(p=>({...p,[payKey]:e.target.value}))}
                        onBlur={e=>{savePayment(cat.id,item.id,e.target.value);setPayInputs(p=>{const n={...p};delete n[payKey];return n;});}}
                        style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:7,padding:'6px 10px',color:'white',fontSize:13,outline:'none'}}
                      />
                      {getPayment(cat.id,item.id)>0&&<span style={{fontSize:11,color:'#e2b04a',fontWeight:700,whiteSpace:'nowrap'}}>{fmtMoney(getPayment(cat.id,item.id))}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* Done button */}
      <div style={{padding:'20px 12px 8px'}}>
        <button onClick={async()=>{await dbSet(`projects/${propId}/weekplan/calendarDone`,true);setCalMode(true);}}
          style={{width:'100%',padding:'15px',background:'#e2b04a',border:'none',borderRadius:14,fontSize:16,fontWeight:700,color:'#000',cursor:'pointer',letterSpacing:'.3px'}}>
          Done — View Calendar
        </button>
      </div>
    </div>
  );

  if(!calMode)return planView;

  // ── helpers for calendar grouping ──────────────────────────────
  // Group consecutive weeks that span the same calendar month so we
  // can render a month-header above each group.
  function buildMonthGroups(){
    const groups=[];
    let cur=null;
    Array.from({length:numWeeks},(_,i)=>i+1).forEach(n=>{
      const wsd=weekStartDate(n);
      const key=wsd?`${wsd.getFullYear()}-${wsd.getMonth()}`:null;
      if(!cur||cur.key!==key){
        cur={key,month:wsd?MONTHS[wsd.getMonth()]+' '+wsd.getFullYear():'Week '+n,weeks:[]};
        groups.push(cur);
      }
      cur.weeks.push(n);
    });
    return groups;
  }
  const DAY_LABELS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const ITEM_COLORS=['#e2b04a','#4a9fe2','#4ae2b0','#e24a7a','#b04ae2','#e27a4a','#7ae24a'];

  // assign a stable color index per catId
  const catColorIdx={};
  CATEGORIES.forEach((c,i)=>{catColorIdx[c.id]=i%ITEM_COLORS.length;});

  const monthGroups=buildMonthGroups();

  // ── Calendar view ──────────────────────────────────────────────
  return(
    <div style={{paddingBottom:100}}>

      {/* Item edit sheet */}
      {editingItem&&(()=>{
        const allWeeks=getWeeks(editingItem.catId,editingItem.itemId);
        return(
          <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'flex-end'}}
            onClick={e=>{if(e.target===e.currentTarget)setEditingItem(null);}}>
            <div style={{width:'100%',background:'#0d1829',borderRadius:'20px 20px 0 0',padding:'20px 16px 44px',maxHeight:'80vh',overflowY:'auto'}}>
              <div style={{width:36,height:4,background:'rgba(255,255,255,.2)',borderRadius:2,margin:'0 auto 18px'}}/>
              <div style={{fontSize:15,fontWeight:700,color:'white',marginBottom:3}}>{editingItem.label}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginBottom:18}}>Tap a week to add or remove this task</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {Array.from({length:numWeeks},(_,i)=>i+1).map(n=>{
                  const on=!!allWeeks[n];
                  const wsd=weekStartDate(n);
                  return(
                    <div key={n} onClick={async()=>{
                      if(on)await dbRemove(`projects/${propId}/weekplan/assignments/${editingItem.catId}/${editingItem.itemId}/${n}`);
                      else await dbSet(`projects/${propId}/weekplan/assignments/${editingItem.catId}/${editingItem.itemId}/${n}`,true);
                    }}
                    style={{borderRadius:12,padding:'11px 6px',textAlign:'center',cursor:'pointer',
                      background:on?'rgba(226,176,74,.18)':'rgba(255,255,255,.05)',
                      border:on?'1.5px solid #e2b04a':'1px solid rgba(255,255,255,.1)'}}>
                      <div style={{fontSize:12,fontWeight:700,color:on?'#e2b04a':'rgba(255,255,255,.4)'}}>Wk {n}</div>
                      {wsd&&<div style={{fontSize:9,color:'rgba(255,255,255,.28)',marginTop:2}}>{fmtD(wsd)}</div>}
                      {on&&<div style={{marginTop:5,fontSize:9,color:'#e2b04a',fontWeight:700}}>✓</div>}
                    </div>
                  );
                })}
              </div>
              <button onClick={()=>setEditingItem(null)}
                style={{marginTop:20,width:'100%',padding:'14px',background:'#e2b04a',border:'none',borderRadius:12,color:'#000',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                Done
              </button>
            </div>
          </div>
        );
      })()}

      {/* Header */}
      <div style={{padding:'14px 12px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:17,fontWeight:700,color:'white'}}>Renovation Schedule</div>
        <button onClick={async()=>{await dbSet(`projects/${propId}/weekplan/calendarDone`,false);setCalMode(false);}}
          style={{background:'rgba(226,176,74,.12)',border:'1px solid rgba(226,176,74,.3)',borderRadius:10,color:'#e2b04a',padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
          ✎ Edit Plan
        </button>
      </div>
      {!plan.startDate&&(
        <div style={{padding:'0 12px 10px',fontSize:12,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>
          Set a start date in Edit Plan to see real dates
        </div>
      )}

      {/* Day-of-week header row */}
      <div style={{padding:'0 12px'}}>
        <div style={{display:'grid',gridTemplateColumns:'44px repeat(7,1fr)',gap:0,marginBottom:0}}>
          <div/>
          {DAY_LABELS.map(d=>(
            <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'rgba(255,255,255,.3)',textTransform:'uppercase',padding:'6px 0',letterSpacing:'.5px'}}>
              {d}
            </div>
          ))}
        </div>

        {/* Month groups */}
        {monthGroups.map((mg,gi)=>(
          <div key={gi} style={{marginBottom:8}}>
            {/* Month label */}
            <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'1px',padding:'8px 2px 4px'}}>
              {mg.month}
            </div>

            {/* Week rows */}
            {mg.weeks.map(n=>{
              const wsd=weekStartDate(n);
              const items=itemsForWeekOrdered(n);
              const isTlSrcWeek=tlDragRef.current?.srcWeek===n;
              // build 7 day cells Mon–Sun
              const days=Array.from({length:7},(_,di)=>{
                if(!wsd)return{date:null,dayItems:[]};
                const d=new Date(wsd.getTime()+di*864e5);
                return{date:d,dayItems:[]};
              });
              return(
                <React.Fragment key={n}>
                <div data-week={n}
                  onDragOver={e=>{e.preventDefault();if(tlDragRef.current?.srcWeek!==n){tlDragOverRef.current=n;setTlDragOver(n);}}}
                  onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)){tlDragOverRef.current=null;tlDragOverIdxRef.current=null;setTlDragOver(null);setTlDragOverIdx(null);}}}
                  onDrop={e=>{e.preventDefault();const idx=tlDragOverIdxRef.current?.week===n?tlDragOverIdxRef.current.idx:999;dropOnTlItem(n,idx);}}
                  style={{display:'grid',gridTemplateColumns:'44px repeat(7,1fr)',gap:0,marginBottom:2,minHeight:items.length>0?undefined:52,outline:tlDragOver===n?'2px solid #e2b04a':'none',borderRadius:4}}>
                  {/* Week label */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',paddingTop:6,gap:2}}>
                    <div style={{fontSize:9,fontWeight:800,color:'rgba(226,176,74,.7)',textTransform:'uppercase'}}>W{n}</div>
                    <div style={{fontSize:8,fontWeight:600,color:'rgba(255,255,255,.35)',textAlign:'center',lineHeight:1.2,writingMode:'vertical-rl',transform:'rotate(180deg)',maxHeight:60,overflow:'hidden'}}>{getWeekTitle(n)}</div>
                    {weekPaymentTotal(n)>0&&<div style={{fontSize:8,fontWeight:700,color:'#e2b04a',textAlign:'center',lineHeight:1.2}}>{fmtMoney(weekPaymentTotal(n))}</div>}
                  </div>
                  {/* 7 day cells */}
                  {days.map((day,di)=>{
                    const isWeekend=di>=5;
                    return(
                      <div key={di} style={{
                        borderTop:'1px solid rgba(255,255,255,.07)',
                        borderLeft:di===0?'1px solid rgba(255,255,255,.07)':'none',
                        borderRight:'1px solid rgba(255,255,255,.07)',
                        borderBottom: n===mg.weeks[mg.weeks.length-1]?'1px solid rgba(255,255,255,.07)':'none',
                        background:isWeekend?'rgba(255,255,255,.015)':'transparent',
                        minHeight:items.length>0?Math.max(52,20+items.length*22):48,
                        padding:'5px 3px',
                        position:'relative',
                      }}>
                        {day.date&&(
                          <div style={{fontSize:10,fontWeight:600,color:isWeekend?'rgba(255,255,255,.2)':'rgba(255,255,255,.35)',textAlign:'center',marginBottom:3}}>
                            {day.date.getDate()}
                          </div>
                        )}
                        {/* Show items only in the Monday cell (di===0) spanning the row */}
                        {di===0&&items.length>0&&(
                          <div style={{position:'absolute',left:0,top:24,right:0,padding:'0 2px',display:'flex',flexDirection:'column',gap:2,zIndex:1,
                            // span all 7 columns by making width = 7 * cell width
                            width:'700%',
                          }}>
                            {items.map((it,ii)=>{
                              const isInsp=it.isInsp;
                              const color=isInsp?'#f59e0b':ITEM_COLORS[catColorIdx[it.catId]||0];
                              const showInsert=tlDragOverIdx?.week===n&&tlDragOverIdx?.idx===ii&&tlDragRef.current?.srcWeek===n;
                              const isEditing=editLabelKey===it.key;
                              return(
                                <React.Fragment key={it.key}>
                                  {showInsert&&<div style={{height:3,background:'#e2b04a',borderRadius:2,margin:'1px 0'}}/>}
                                  {isEditing?(
                                    <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 4px',borderRadius:5,background:color+'22',borderLeft:`3px solid ${color}`}}>
                                      <input autoFocus value={editLabelText}
                                        onChange={e=>setEditLabelText(e.target.value)}
                                        onKeyDown={e=>{if(e.key==='Enter')saveTlLabel(it.key,editLabelText);if(e.key==='Escape')setEditLabelKey(null);}}
                                        style={{flex:1,background:'transparent',border:'none',outline:'none',color:'white',fontSize:10,fontWeight:600,minWidth:0}}/>
                                      <span onClick={()=>saveTlLabel(it.key,editLabelText)} style={{cursor:'pointer',color:color,fontSize:11,fontWeight:700}}>✓</span>
                                      {isInsp&&<span onClick={async()=>{await deleteTlInspection(it.inspId);setEditLabelKey(null);}} style={{cursor:'pointer',color:'#ef4444',fontSize:11,fontWeight:700,marginLeft:2}}>✕</span>}
                                      <span onClick={()=>setEditLabelKey(null)} style={{cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:11}}>—</span>
                                    </div>
                                  ):(
                                    <div
                                      data-tlwidx={ii}
                                      draggable
                                      onDragStart={e=>{e.stopPropagation();e.dataTransfer.effectAllowed='move';tlDragRef.current={...it,srcWeek:n,listIdx:ii};}}
                                      onDragEnd={()=>{tlDragRef.current=null;setTlDragOver(null);setTlDragOverIdx(null);}}
                                      onDragOver={e=>{e.preventDefault();e.stopPropagation();if(tlDragRef.current?.srcWeek===n){const v={week:n,idx:ii};tlDragOverIdxRef.current=v;setTlDragOverIdx(v);}}}
                                      onDrop={e=>{e.preventDefault();e.stopPropagation();dropOnTlItem(n,ii);}}
                                      onTouchStart={e=>startTlTouchDrag(e,{...it,srcWeek:n,listIdx:ii})}
                                      onClick={()=>{setEditLabelKey(it.key);setEditLabelText(it.label);}}
                                      style={{display:'flex',alignItems:'center',gap:4,padding:'3px 7px',borderRadius:5,cursor:'grab',
                                        background:isInsp?'rgba(245,158,11,.15)':color+'22',
                                        borderLeft:`3px solid ${color}`,
                                      }}>
                                      {isInsp&&<span style={{fontSize:9}}>⚠</span>}
                                      <span style={{fontSize:10,fontWeight:600,color:color,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'90%'}}>{it.label}</span>
                                    </div>
                                  )}
                                </React.Fragment>
                              );
                            })}
                            {/* Insert line at end of week */}
                            {tlDragOverIdx?.week===n&&tlDragOverIdx?.idx>=items.length&&tlDragRef.current?.srcWeek===n&&<div style={{height:3,background:'#e2b04a',borderRadius:2,margin:'1px 0'}}/>}
                            {/* Add inspection button */}
                            <div onClick={()=>addTlInspection(n)}
                              style={{display:'flex',alignItems:'center',gap:3,padding:'2px 6px',borderRadius:5,cursor:'pointer',
                                border:'1px dashed rgba(245,158,11,.3)',color:'rgba(245,158,11,.5)',fontSize:9,fontWeight:600,marginTop:2,
                                userSelect:'none'}}>
                              <span>⚠</span><span>+ inspection</span>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                </React.Fragment>
              );
            })}
          </div>
        ))}
      </div>

      {/* Color legend */}
      <div style={{padding:'12px 12px 0'}}>
        <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.25)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:8}}>Categories</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {CATEGORIES.map(cat=>{
            const color=ITEM_COLORS[catColorIdx[cat.id]||0];
            return(
              <div key={cat.id} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 9px',borderRadius:20,background:color+'18',border:`1px solid ${color}44`}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:color,flexShrink:0}}/>
                <span style={{fontSize:11,color:color,fontWeight:600}}>{cat.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
