// ── WalkthroughView ──────────────────────────────────────────────────
function AIPicturesPage({propId, currentUser}){
  const [items, setItems] = React.useState([]);
  const [adding, setAdding] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [uploading, setUploading] = React.useState({}); // itemId → true
  const [lightbox, setLightbox] = React.useState(null);

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/aiPictures`, val=>{
      if(!val) return setItems([]);
      setItems(Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt)));
    });
  },[propId]);

  async function reorderItems(newItems){
    setItems(newItems);
    const updates={};
    newItems.forEach((item,i)=>{ updates[`${item.id}/order`]=i; });
    await dbUpdate(`projects/${propId}/aiPictures`,updates);
  }

  async function addItem(){
    const title=newTitle.trim();
    if(!title) return;
    const id=uid();
    await dbSet(`projects/${propId}/aiPictures/${id}`,{title,photos:[],createdAt:Date.now(),createdBy:currentUser.uid});
    setNewTitle('');setAdding(false);
  }

  async function deleteItem(itemId){
    if(!confirm('Delete this item and all its photos?')) return;
    await dbRemove(`projects/${propId}/aiPictures/${itemId}`);
  }

  async function addPhotos(itemId, files, existing){
    existing=toArr(existing);
    const remaining=5-existing.length;
    if(remaining<=0) return;
    const toUpload=Array.from(files).slice(0,remaining);
    setUploading(u=>({...u,[itemId]:true}));
    try{
      const newPhotos=[];
      for(const file of toUpload){
        const url=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=async ev=>{try{res(await compressImage(ev.target.result));}catch(err){rej(err);}};
          r.onerror=rej;
          r.readAsDataURL(file);
        });
        newPhotos.push({url,name:file.name,uploadedAt:Date.now()});
      }
      await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{photos:[...existing,...newPhotos]});
    }catch(e){
      alert('Upload failed: '+e.message);
    }finally{
      setUploading(u=>({...u,[itemId]:false}));
    }
  }

  async function deletePhoto(itemId, photoIdx, existing){
    const updated=existing.filter((_,i)=>i!==photoIdx);
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{photos:updated});
  }

  async function updateTitle(itemId, title){
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{title});
  }

  async function updateLinks(itemId, materialLinks){
    await dbUpdate(`projects/${propId}/aiPictures/${itemId}`,{materialLinks});
  }

  return(
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0 12px'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#888'}}>🖼 AI Pictures</div>
        <button onClick={()=>setAdding(true)} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'7px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ Add Item</button>
      </div>

      {adding&&(
        <div style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'#f59e0b',marginBottom:10}}>New Item</div>
          <input
            autoFocus
            value={newTitle} onChange={e=>setNewTitle(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')addItem();if(e.key==='Escape'){setAdding(false);setNewTitle('');}}}
            placeholder="e.g. Downstairs Bathroom, Master Bedroom…"
            style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'9px 12px',color:'white',fontSize:14,boxSizing:'border-box',marginBottom:10}}
          />
          <div style={{display:'flex',gap:8}}>
            <button onClick={addItem} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'7px 16px',fontWeight:700,fontSize:13,cursor:'pointer'}}>Add</button>
            <button onClick={()=>{setAdding(false);setNewTitle('');}} style={{background:'rgba(255,255,255,.1)',color:'white',border:'none',borderRadius:8,padding:'7px 16px',fontSize:13,cursor:'pointer'}}>Cancel</button>
          </div>
        </div>
      )}

      {items.length===0&&!adding&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'rgba(255,255,255,.35)',fontSize:14}}>
          No pictures yet.<br/>Tap <strong style={{color:'#f59e0b'}}>+ Add Item</strong> to create your first one.
        </div>
      )}

      <SortableList
        items={items}
        keyFn={item=>item.id}
        onReorder={reorderItems}
        gap={14}
        renderItem={item=>(
          <AIPictureItem
            item={item}
            uploading={!!uploading[item.id]}
            onAddPhotos={files=>addPhotos(item.id,files,item.photos)}
            onDeletePhoto={(idx)=>deletePhoto(item.id,idx,item.photos)}
            onDeleteItem={()=>deleteItem(item.id)}
            onUpdateTitle={t=>updateTitle(item.id,t)}
            onUpdateLinks={links=>updateLinks(item.id,links)}
            onLightbox={setLightbox}
          />
        )}
      />

      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <img src={lightbox} style={{maxWidth:'100%',maxHeight:'100%',borderRadius:10,objectFit:'contain'}} onClick={e=>e.stopPropagation()}/>
          <button onClick={()=>setLightbox(null)} style={{position:'fixed',top:20,right:20,background:'rgba(255,255,255,.15)',border:'none',borderRadius:'50%',width:40,height:40,color:'white',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
      )}
    </div>
  );
}

function AIPictureItem({item, uploading, onAddPhotos, onDeletePhoto, onDeleteItem, onUpdateTitle, onUpdateLinks, onLightbox}){
  const [open, setOpen] = React.useState(false);
  const [editingTitle, setEditingTitle] = React.useState(false);
  const [titleVal, setTitleVal] = React.useState(item.title);
  const [links, setLinks] = React.useState(toArr(item.materialLinks));
  const [editingLinks, setEditingLinks] = React.useState(false);
  const fileRef = React.useRef();
  const photos = toArr(item.photos);
  const canAdd = photos.length < 5;

  React.useEffect(()=>{ setLinks(toArr(item.materialLinks)); },[JSON.stringify(item.materialLinks)]);

  function saveTitle(){
    const t=titleVal.trim();
    if(t&&t!==item.title) onUpdateTitle(t);
    setEditingTitle(false);
  }

  function updateLinkField(idx, field, val){
    const next=links.map((l,i)=>i===idx?{...l,[field]:val}:l);
    setLinks(next);
    onUpdateLinks(next);
  }

  function addLink(){
    if(links.length>=6) return;
    const next=[...links,{title:'',url:''}];
    setLinks(next);
    onUpdateLinks(next);
  }

  function removeLink(idx){
    const next=links.filter((_,i)=>i!==idx);
    setLinks(next);
    onUpdateLinks(next);
  }

  const validLinks = links.filter(l=>l.url);

  return(
    <div style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,overflow:'hidden'}}>

      {/* Header row — always visible */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'13px 14px',cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span onClick={e=>e.stopPropagation()} style={{color:'rgba(255,255,255,.25)',fontSize:18,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>

        {editingTitle?(
          <input
            autoFocus value={titleVal} onChange={e=>setTitleVal(e.target.value)}
            onBlur={saveTitle}
            onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape'){setTitleVal(item.title);setEditingTitle(false);}}}
            onClick={e=>e.stopPropagation()}
            style={{flex:1,background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.25)',borderRadius:7,padding:'5px 10px',color:'white',fontSize:15,fontWeight:600}}
          />
        ):(
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
            <span style={{fontSize:15,fontWeight:700,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</span>
            <span onClick={e=>{e.stopPropagation();setTitleVal(item.title);setEditingTitle(true);}} style={{fontSize:11,color:'rgba(255,255,255,.3)',cursor:'pointer',flexShrink:0}}>✏️</span>
          </div>
        )}

        {/* Badges */}
        <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
          {photos.length>0&&(
            <span style={{background:'rgba(255,255,255,.1)',borderRadius:20,padding:'2px 8px',fontSize:11,color:'rgba(255,255,255,.6)',fontWeight:600}}>📷 {photos.length}</span>
          )}
          {validLinks.length>0&&(
            <span style={{background:'rgba(245,158,11,.15)',borderRadius:20,padding:'2px 8px',fontSize:11,color:'#f59e0b',fontWeight:600}}>🔗 {validLinks.length}</span>
          )}
          <span style={{color:'rgba(255,255,255,.3)',fontSize:13,marginLeft:2}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {/* Expanded body */}
      {open&&(
        <div style={{borderTop:'1px solid rgba(255,255,255,.07)'}}>

          {/* Photos strip */}
          <div style={{padding:'14px 14px 0'}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#666',marginBottom:10}}>Photos</div>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:10}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:'relative',borderRadius:10,overflow:'hidden',flexShrink:0,width:110,height:110,background:'rgba(255,255,255,.07)'}}>
                  <img src={p.url} onClick={()=>onLightbox(p.url)} style={{width:'100%',height:'100%',objectFit:'cover',cursor:'pointer',display:'block'}}/>
                  <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',justifyContent:'space-between',padding:'4px 5px',background:'linear-gradient(transparent,rgba(0,0,0,.7))'}}>
                    <a href={p.url} download={p.name||`photo-${i+1}.jpg`} onClick={e=>e.stopPropagation()} style={{background:'rgba(0,0,0,.5)',borderRadius:5,padding:'3px 6px',color:'white',fontSize:10,textDecoration:'none'}} title="Download">⬇</a>
                    <button onClick={()=>onDeletePhoto(i)} style={{background:'rgba(220,53,69,.7)',border:'none',borderRadius:5,padding:'3px 7px',color:'white',fontSize:10,cursor:'pointer'}}>✕</button>
                  </div>
                </div>
              ))}
              {uploading&&(
                <div style={{flexShrink:0,width:110,height:110,borderRadius:10,background:'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⏳</div>
              )}
              {canAdd&&!uploading&&(
                <>
                  <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{onAddPhotos(e.target.files);e.target.value='';}}/>
                  <div onClick={()=>fileRef.current.click()} style={{flexShrink:0,width:110,height:110,borderRadius:10,border:'2px dashed rgba(255,255,255,.18)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:11,fontWeight:600}}>
                    <span style={{fontSize:22}}>📷</span>
                    <span>{photos.length}/5</span>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Material Links */}
          <div style={{padding:'4px 14px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#666'}}>Material Links</div>
              <button onClick={()=>setEditingLinks(e=>!e)} style={{background:'none',border:'none',color:'#f59e0b',fontSize:12,cursor:'pointer',fontWeight:600,padding:0}}>
                {editingLinks?'Done':'Edit'}
              </button>
            </div>

            {!editingLinks?(
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {validLinks.length===0&&(
                  <div style={{fontSize:12,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>No links yet — tap Edit to add</div>
                )}
                {links.map((link,i)=>link.url?(
                  <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.09)',borderRadius:9,padding:'9px 12px',textDecoration:'none'}}>
                    <span style={{fontSize:16,flexShrink:0}}>🔗</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{link.title||'Untitled Link'}</div>
                      <div style={{fontSize:11,color:'rgba(255,255,255,.35)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{link.url}</div>
                    </div>
                    <span style={{color:'#f59e0b',fontSize:14,flexShrink:0}}>↗</span>
                  </a>
                ):null)}
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <SortableList
                  items={links}
                  onReorder={next=>{setLinks(next);onUpdateLinks(next);}}
                  gap={7}
                  renderItem={(link,i)=>(
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span style={{color:'rgba(255,255,255,.25)',fontSize:14,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                      <input
                        value={link.title} onChange={e=>updateLinkField(i,'title',e.target.value)}
                        placeholder="Label (e.g. Tiles)"
                        style={{width:90,flexShrink:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:7,padding:'7px 8px',color:'white',fontSize:12}}
                      />
                      <input
                        value={link.url} onChange={e=>updateLinkField(i,'url',e.target.value)}
                        placeholder="Paste URL"
                        style={{flex:1,minWidth:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:7,padding:'7px 8px',color:'white',fontSize:12}}
                      />
                      <button onClick={()=>removeLink(i)} style={{flexShrink:0,background:'rgba(220,53,69,.15)',border:'none',borderRadius:6,padding:'6px 9px',color:'#dc3545',fontSize:13,cursor:'pointer'}}>✕</button>
                    </div>
                  )}
                />
                {links.length<6&&(
                  <button onClick={addLink} style={{background:'rgba(255,255,255,.06)',border:'1px dashed rgba(255,255,255,.15)',borderRadius:8,padding:'8px 12px',color:'rgba(255,255,255,.5)',fontSize:12,cursor:'pointer',textAlign:'left'}}>+ Add Link</button>
                )}
              </div>
            )}
          </div>

          {/* Footer actions */}
          <div style={{borderTop:'1px solid rgba(255,255,255,.06)',padding:'10px 14px',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={onDeleteItem} style={{background:'rgba(220,53,69,.12)',border:'1px solid rgba(220,53,69,.2)',borderRadius:8,padding:'6px 14px',color:'#dc3545',fontSize:12,fontWeight:600,cursor:'pointer'}}>🗑 Delete Item</button>
          </div>
        </div>
      )}
    </div>
  );
}

  {text:'Test garage door opener', order:8},
  {text:'Run dishwasher full cycle', order:9},
  {text:'Test range/oven burners', order:10},
  {text:'Check under sinks for leaks', order:11},
  {text:'Walk every room — no debris, patch, or paint missed', order:12},

function HandoffPage({propId, currentUser}){
  const [items, setItems] = React.useState(null);
  const [newText, setNewText] = React.useState('');
  const [expandedId, setExpandedId] = React.useState(null);
  const [saving, setSaving] = React.useState(false);

  React.useEffect(()=>{
    return dbListen(`projects/${propId}/handoff`, val=>{
      if(!val){
        // seed defaults on first load
        const defaults = {};
        HANDOFF_DEFAULTS.forEach((d,i)=>{
          const id = 'h'+i;
          defaults[id] = {id, text:d.text, checked:false, notes:'', isCustom:false, order:d.order};
        });
        dbSet(`projects/${propId}/handoff`, defaults);
        setItems(Object.values(defaults));
      } else {
        const arr = Object.values(val).sort((a,b)=>(a.order??0)-(b.order??0));
        setItems(arr);
      }
    });
  },[propId]);

  async function toggle(item){
    await dbUpdate(`projects/${propId}/handoff/${item.id}`,{checked:!item.checked});
  }

  async function saveNotes(item, notes){
    await dbUpdate(`projects/${propId}/handoff/${item.id}`,{notes});
  }

  async function addItem(){
    if(!newText.trim()) return;
    setSaving(true);
    const id = 'hc'+Date.now();
    const order = items ? items.length : 100;
    await dbSet(`projects/${propId}/handoff/${id}`,{id, text:newText.trim(), checked:false, notes:'', isCustom:true, order});
    setNewText('');
    setSaving(false);
  }

  async function removeItem(item){
    if(!item.isCustom) return;
    if(!confirm('Remove this item?')) return;
    await dbRemove(`projects/${propId}/handoff/${item.id}`);
  }

  if(!items) return <div style={{textAlign:'center',padding:40,color:'#888'}}>Loading…</div>;

  const checked = items.filter(i=>i.checked).length;
  const total = items.length;
  const pct = total ? Math.round(checked/total*100) : 0;
  const done = pct===100;

  return(
    <div className="content" style={{paddingBottom:80}}>
      {done&&(
        <div style={{background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:14,padding:'20px 24px',textAlign:'center',marginBottom:20,boxShadow:'0 4px 20px rgba(22,163,74,.4)'}}>
          <div style={{fontSize:36,marginBottom:6}}>🎉</div>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>Project Complete!</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginTop:4}}>All handoff items are done. Great work!</div>
        </div>
      )}

      <div style={{background:'rgba(255,255,255,.06)',borderRadius:14,padding:'16px 18px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:14,color:'#fff'}}>Completion</div>
          <div style={{fontWeight:700,fontSize:14,color:done?'#4ade80':'#f59e0b'}}>{checked}/{total} · {pct}%</div>
        </div>
        <div style={{background:'rgba(255,255,255,.1)',borderRadius:99,height:8,overflow:'hidden'}}>
          <div style={{width:pct+'%',height:'100%',background:done?'#22c55e':'#f59e0b',borderRadius:99,transition:'width .4s'}}/>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
        {items.map(item=>(
          <div key={item.id} style={{background:'rgba(255,255,255,.06)',borderRadius:12,overflow:'hidden',border:item.checked?'1px solid rgba(34,197,94,.3)':'1px solid rgba(255,255,255,.08)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',cursor:'pointer'}} onClick={()=>setExpandedId(expandedId===item.id?null:item.id)}>
              <div onClick={e=>{e.stopPropagation();toggle(item);}} style={{width:22,height:22,borderRadius:6,border:item.checked?'2px solid #22c55e':'2px solid rgba(255,255,255,.3)',background:item.checked?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all .2s'}}>
                {item.checked&&<span style={{color:'#fff',fontSize:13,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1,fontSize:14,color:item.checked?'rgba(255,255,255,.5)':'#fff',textDecoration:item.checked?'line-through':'none',lineHeight:1.3}}>{item.text}</div>
              {item.notes&&<div style={{width:6,height:6,borderRadius:3,background:'#f59e0b',flexShrink:0}}/>}
              {item.isCustom&&<div onClick={e=>{e.stopPropagation();removeItem(item);}} style={{fontSize:16,color:'rgba(255,255,255,.3)',cursor:'pointer',padding:'0 2px'}}>✕</div>}
              <div style={{color:'rgba(255,255,255,.35)',fontSize:12}}>{expandedId===item.id?'▲':'▼'}</div>
            </div>
            {expandedId===item.id&&(
              <div style={{padding:'0 14px 12px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
                <div style={{fontSize:11,color:'#888',marginBottom:6,marginTop:8}}>Notes</div>
                <textarea
                  defaultValue={item.notes}
                  placeholder="Add notes…"
                  onBlur={e=>saveNotes(item,e.target.value)}
                  style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'8px 10px',color:'#fff',fontSize:13,resize:'vertical',minHeight:60,boxSizing:'border-box'}}
                />
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:'14px 14px'}}>
        <div style={{fontSize:12,fontWeight:600,color:'#888',marginBottom:8}}>Add Custom Item</div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={newText}
            onChange={e=>setNewText(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addItem()}
            placeholder="e.g. Return keys to property manager"
            style={{flex:1,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:13}}
          />
          <button onClick={addItem} disabled={saving||!newText.trim()} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:8,padding:'9px 16px',fontWeight:700,fontSize:13,cursor:'pointer',opacity:saving||!newText.trim()?0.5:1}}>
            {saving?'…':'Add'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PropEventsBar({propId}){
  const [events, setEvents] = React.useState([]);
  React.useEffect(()=>{
    return dbListen(`projects/${propId}/events`, val=>{
      if(!val){setEvents([]);return;}
      const now=new Date();
      function pad(n){return String(n).padStart(2,'0');}
      const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      const list=Object.values(val)
        .filter(e=>e.date>=todayKey)
        .sort((a,b)=>a.date.localeCompare(b.date));
      setEvents(list);
    });
  },[propId]);

  if(events.length===0) return null;

  const MONTH=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return(
    <div style={{margin:'12px 12px 0',background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.25)',borderRadius:14,overflow:'hidden'}}>
      <div style={{padding:'10px 14px 6px',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#60a5fa'}}>📅 Upcoming Events</div>
      {events.map(ev=>{
        const d=new Date(ev.date+'T12:00');
        const now=new Date();
        function pad(n){return String(n).padStart(2,'0');}
        const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
        const isToday=ev.date===todayKey;
        return(
          <div key={ev.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 14px',borderTop:'1px solid rgba(59,130,246,.12)'}}>
            <div style={{textAlign:'center',minWidth:32,flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:isToday?'#f59e0b':'#60a5fa',lineHeight:1}}>{d.getDate()}</div>
              <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.4)',textTransform:'uppercase'}}>{MONTH[d.getMonth()]}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>

function WalkthroughView({prop,currentUser,onBack,onPropUpdate}){
  const TAB_TASKS=-1,TAB_SCOPE=-2,TAB_INFO=-3,TAB_TEAM=-4,TAB_PICS=-5,TAB_TIMELINE=-6;
  const initStage=prop.stage||'walkthrough';
  const[activeTab,setActiveTab]=React.useState(TAB_TASKS);
  const[data,setData]=React.useState({});
  const[members,setMembers]=React.useState({});
  const[stage,setStage]=React.useState(prop.stage||'walkthrough');
  const[sqft,setSqft]=React.useState(prop.sqft||'');
  const[curBed,setCurBed]=React.useState(prop.curBed||'');
  const[curBath,setCurBath]=React.useState(prop.curBath||'');
  const[futBed,setFutBed]=React.useState(prop.futBed||'');
  const[futBath,setFutBath]=React.useState(prop.futBath||'');
  const[showShare,setShowShare]=React.useState(false);
  const[lightbox,setLightbox]=React.useState(null);
  const[syncStatus,setSyncStatus]=React.useState('syncing');
  const isOwner=prop.ownerId===currentUser.uid;
  const username=currentUser.displayName||currentUser.email;
  const canSeeOwner=isOwner||members[currentUser.uid]?.role==='Member';

  // Merge remote data+photos into a single state object
  const photosRef=React.useRef({});
  const dataRef=React.useRef({});
  const mergedRef=React.useRef({});

  function buildMerged(d,p){
    const merged={...d};
    CATEGORIES.forEach(cat=>{
      if(!merged[cat.id])merged[cat.id]={};
      cat.items.forEach(item=>{
        const slot=(p[cat.id]||{})[item.id]||{};
        if(slot.before?.length||slot.vision?.length){
          merged[cat.id][item.id]={...(merged[cat.id][item.id]||{}),photosBefore:slot.before||[],photosVision:slot.vision||[]};
        }
      });
    });
    const sp=p._summary||{};
    if(sp.photos?.length||sp.aiVision?.length||sp.floorPlan?.length||sp.videos?.length){
      merged._summary={...(merged._summary||{}),photos:sp.photos||[],aiVision:sp.aiVision||[],floorPlan:sp.floorPlan||[],videos:sp.videos||[]};
    }
    return merged;
  }

  React.useEffect(()=>{
    const unsubData=dbListen(`projects/${prop.id}/data`,remote=>{
      dataRef.current=remote||{};
      mergedRef.current=buildMerged(dataRef.current,photosRef.current);
      setData(mergedRef.current);
      setSyncStatus('synced');
    });
    const unsubPhotos=dbListen(`projects/${prop.id}/photos`,remote=>{
      photosRef.current=remote||{};
      mergedRef.current=buildMerged(dataRef.current,photosRef.current);
      setData(mergedRef.current);
    });
    const unsubMembers=dbListen(`projects/${prop.id}/members`,remote=>setMembers(remote||{}));
    return ()=>{unsubData();unsubPhotos();unsubMembers();};
  },[prop.id]);

  async function updateItem(catId,itemId,value){
    setSyncStatus('syncing');
    const stamped={...value,updatedAt:Date.now(),updatedBy:username};
    // Update mergedRef synchronously so rapid successive calls see the latest state
    mergedRef.current={...mergedRef.current,[catId]:{...(mergedRef.current[catId]||{}),[itemId]:stamped}};
    setData(mergedRef.current);
    // Split: lightweight fields to /data, photos to /photos
    const{photosBefore,photosVision,...noPhotos}=stamped;
    const writes=[dbUpdate(`projects/${prop.id}/data/${catId}`,{[itemId]:noPhotos})];
    if(photosBefore!==undefined||photosVision!==undefined){
      writes.push(dbUpdate(`projects/${prop.id}/photos/${catId}/${itemId}`,{
        before:photosBefore||[],vision:photosVision||[]
      }));
    }
    await Promise.all(writes);
    setSyncStatus('synced');
  }

  async function applyAIScope(ai){
    setSyncStatus('syncing');
    const batch={};
    const now=Date.now();
    CATEGORIES.forEach(cat=>{
      const catData=ai[cat.id]||{};
      cat.items.forEach(item=>{
        const note=catData[item.id];
        if(note) batch[`${cat.id}/${item.id}`]={notes:note,status:'replace',updatedAt:now,updatedBy:username};
      });
    });
    const summaryUpdate={
      ...data._summary,
      overview:ai.summary?.overview||data._summary?.overview||'',
      priorities:ai.summary?.priorities||data._summary?.priorities||[]
    };
    const merged={...data};
    Object.entries(batch).forEach(([path,val])=>{
      const[cat,item]=path.split('/');
      merged[cat]={...(merged[cat]||{}),[item]:val};
    });
    merged._summary=summaryUpdate;
    setData(merged);
    await Promise.all([
      Object.keys(batch).length&&dbUpdate(`projects/${prop.id}/data`,batch),
      dbUpdate(`projects/${prop.id}/data`,{_summary:{overview:summaryUpdate.overview,priorities:summaryUpdate.priorities,budget:summaryUpdate.budget,timeline:summaryUpdate.timeline}}),
    ].filter(Boolean));
    setSyncStatus('synced');
  }

  async function updateSummary(value){
    const next={...data,_summary:value};
    setData(next);
    const{photos,aiVision,floorPlan,videos,...noPhotos}=value;
    await Promise.all([
      dbUpdate(`projects/${prop.id}/data`,{_summary:{...noPhotos,updatedAt:Date.now()}}),
      dbUpdate(`projects/${prop.id}/photos/_summary`,{
        photos:photos||[],
        aiVision:aiVision||[],
        floorPlan:floorPlan||[],
        videos:videos||[],
      }),
    ]);
  }

  async function saveStage(s){
    const labels={walkthrough:'Walkthrough',contract:'Under Contract',renovation:'Renovation'};
    const current=labels[stage]||stage;
    const next=labels[s]||s;
    if(!confirm(`Move "${prop.address}" from ${current} to ${next}?`)) return;
    setStage(s);
    await dbUpdate(`projects/${prop.id}/meta`,{stage:s});
    onPropUpdate({...prop,stage:s});
  }

  async function savePropFields(){
    const updated={...prop,sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()};
    await dbUpdate(`projects/${prop.id}/meta`,{sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()});
    onPropUpdate(updated);
  }

  mergedRef.current=data;
  const cat=activeTab>=0?CATEGORIES[activeTab]:null;
  const{done,total,pct}=totalProgress(data);
  const sumFilled=!!(data._summary?.overview||data._summary?.priorities?.filter(Boolean).length||data._summary?.budget);

  function catUnread(catId){
    return CATEGORIES.find(c=>c.id===catId)?.items.filter(item=>{
      const d=(data[catId]||{})[item.id];
      return d?.updatedAt&&d?.updatedBy&&d.updatedBy!==username&&d.updatedAt>getViewed(prop.id,catId,item.id);
    }).length||0;
  }
  const totalUnread=CATEGORIES.reduce((s,c)=>s+catUnread(c.id),0);

  return(
    <div className="app">
      <div className="header">
        <div className="header-top">
          <button className="btn-back" onClick={onBack}>← Back</button>
          <div className="header-title">
            <h1>{prop.address}</h1>
            <p>{sqft?sqft+' sq ft  ·  ':''}{prop.date?new Date(prop.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</p>
          </div>
          <button className="btn-share" onClick={()=>setShowShare(true)}>Share</button>
        </div>
        <div className="sqft-bar">
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M2 20h20M4 20V4m0 0h16v16"/></svg>
              <label>SQ FT</label>
            </div>
            <input placeholder="1,800" value={sqft} onChange={e=>setSqft(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 12V7a2 2 0 012-2h14a2 2 0 012 2v5M3 12v5a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M7 12V9"/></svg>
              <label>CURRENT BED</label>
            </div>
            <input type="number" min="0" placeholder="3" value={curBed} onChange={e=>setCurBed(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M4 12h16M4 12v6a1 1 0 001 1h14a1 1 0 001-1v-6M4 12V8a2 2 0 012-2h1a2 2 0 012 2v4"/><circle cx="7" cy="6" r="1" fill="white"/></svg>
              <label>BATH</label>
            </div>
            <input type="number" min="0" placeholder="1" value={curBath} onChange={e=>setCurBath(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 12V7a2 2 0 012-2h14a2 2 0 012 2v5M3 12v5a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M7 12V9"/></svg>
              <label>FUTURE BED</label>
            </div>
            <input type="number" min="0" placeholder="4" value={futBed} onChange={e=>setFutBed(e.target.value)} onBlur={savePropFields}/>
          </div>
          <div className="sqft-field">
            <div className="sqft-field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M4 12h16M4 12v6a1 1 0 001 1h14a1 1 0 001-1v-6M4 12V8a2 2 0 012-2h1a2 2 0 012 2v4"/><circle cx="7" cy="6" r="1" fill="white"/></svg>
              <label>FUTURE BATH</label>
            </div>
            <input type="number" min="0" placeholder="2" value={futBath} onChange={e=>setFutBath(e.target.value)} onBlur={savePropFields}/>
          </div>
        </div>
        <div className="stage-bar">
          {[{id:'walkthrough',icon:'🔍',label:'Walkthrough'},{id:'contract',icon:'📝',label:'Under Contract'},{id:'renovation',icon:'🔨',label:'Renovation'}].map(s=>(
            <button key={s.id} className={`stage-pill${stage===s.id?' active-'+s.id:''}`} onClick={()=>saveStage(s.id)}>{s.icon} {s.label}</button>
          ))}
        </div>
        <div className="sync-bar">
          <div className={`sync-dot${syncStatus==='syncing'?' syncing':''}`}/>
          {syncStatus==='syncing'?'Syncing…':'All changes saved · Live sync on'}
        </div>
        <div className="tabs">
          <div className={`tab${activeTab===TAB_TASKS?' active':''}`} onClick={()=>setActiveTab(TAB_TASKS)}>
            ✅ Tasks
          </div>
          <div className={`tab${activeTab===TAB_SCOPE||activeTab>=0?' active':''}`} onClick={()=>setActiveTab(TAB_SCOPE)}>
            📐 Scope
          </div>
          <div className={`tab${activeTab===TAB_INFO?' active':''}`} onClick={()=>setActiveTab(TAB_INFO)}>
            📋 Info{sumFilled&&<span className="tab-count">✓</span>}
          </div>
          {(stage==='contract'||stage==='renovation')&&(
            <div className={`tab${activeTab===TAB_PICS?' active':''}`} onClick={()=>setActiveTab(TAB_PICS)}>
              🖼 AI Pictures
            </div>
          )}
          {(stage==='contract'||stage==='renovation')&&(
            <div className={`tab${activeTab===TAB_TIMELINE?' active':''}`} onClick={()=>setActiveTab(TAB_TIMELINE)}>
              📅 Timeline
            </div>
          )}
          <div className={`tab${activeTab===TAB_TEAM?' active':''}`} onClick={()=>setActiveTab(TAB_TEAM)}>
            👥 Team{totalUnread>0&&<span className="notif-badge">{totalUnread}</span>}
          </div>
        </div>
      </div>

      {activeTab===TAB_TASKS&&(
        <div>
          <PropEventsBar propId={prop.id}/>
          <TasksPage propId={prop.id} address={prop.address} currentUser={currentUser} members={members}/>
          {stage==='renovation'&&(
            <div style={{margin:'0 12px 12px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10,marginTop:4}}>✔️ Handoff Checklist</div>
              <HandoffPage propId={prop.id} currentUser={currentUser}/>
            </div>
          )}
        </div>
      )}

      {(activeTab===TAB_SCOPE||activeTab>=0)&&(
        activeTab>=0&&cat?(
          <div className="content" style={{padding:0,display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            <ItemCardView
              propId={prop.id} cat={cat} data={data} mergedRef={mergedRef}
              username={username} updateItem={updateItem} setLightbox={setLightbox}
              onPrevCat={()=>setActiveTab(t=>Math.max(t-1,0))}
              onNextCat={()=>setActiveTab(t=>Math.min(t+1,CATEGORIES.length-1))}/>
          </div>
        ):(
          <>
            <div style={{padding:'12px 12px 0'}}>
              <div className="progress-bar-wrap">
                <div className="progress-label"><span>Walkthrough progress</span><span>{done} of {total} items · {pct}%</span></div>
                <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
              </div>
            </div>
            <ScopeOverviewPage data={data} onOpenCat={i=>setActiveTab(i)}/>
          </>
        )
      )}

      {activeTab===TAB_INFO&&(
        <div>
          <SummaryPage summary={data._summary} onChange={updateSummary} onView={src=>setLightbox(src)} propId={prop.id} address={prop.address} currentUser={currentUser} onApplyAI={applyAIScope} isOwner={isOwner} members={members}/>
          {(stage==='contract'||stage==='renovation')&&(
            <div className="content" style={{paddingTop:0}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10}}>💰 Budget</div>
              <BudgetSection propId={prop.id}/>
            </div>
          )}
        </div>
      )}
      {activeTab===TAB_PICS&&<AIPicturesPage propId={prop.id} currentUser={currentUser}/>}
      {activeTab===TAB_TIMELINE&&<ProjectSchedulePage propId={prop.id}/>}

      {activeTab===TAB_TEAM&&(
        <div>
          <ParticipantsPage prop={prop} data={data} currentUser={currentUser} isOwner={isOwner}/>
          {canSeeOwner&&(
            <div style={{margin:'0 12px 20px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#666',letterSpacing:'.5px',marginBottom:10}}>🔒 Owner Notes</div>
              <OwnerSection propId={prop.id} currentUser={currentUser} members={members}/>
            </div>
          )}
        </div>
      )}

      {showShare&&<ShareModal prop={{...prop,sqft}} data={data} onClose={()=>setShowShare(false)}/>}
      {lightbox&&(
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <button className="lightbox-close">×</button>
          <img src={lightbox} alt="" onClick={e=>e.stopPropagation()}/>
        </div>
      )}
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=React.useState(undefined); // undefined=loading
  const[currentProp,setCurrentProp]=React.useState(null);
  const[showSignup,setShowSignup]=React.useState(false);
  const[inviteInfo,setInviteInfo]=React.useState(null);
  const[firebaseReady,setFirebaseReady]=React.useState(true);

  // Check for invite token in URL
  const inviteToken=React.useMemo(()=>{
    const p=new URLSearchParams(window.location.search);return p.get('join');
  },[]);

  // Load invite info if token present
  React.useEffect(()=>{
    if(!inviteToken||!firebaseReady)return;
    dbGet(`invites/${inviteToken}`).then(info=>{if(info)setInviteInfo(info);});
  },[inviteToken,firebaseReady]);

  // Auth state listener
  React.useEffect(()=>{
    if(!firebaseReady){setAuthUser(null);return;}
    const auth=getAuth();
    if(!auth){setAuthUser(null);return;}
    let settled=false;
    const settle=u=>{if(!settled){settled=true;setAuthUser(u||null);}};
    // Timeout fallback: if Firebase auth doesn't respond in 12s, show login page
    const timer=setTimeout(()=>settle(null),12000);
    const unsub=auth.onAuthStateChanged(async user=>{
      try{
        if(user&&inviteToken&&inviteInfo){
          const memberName=user.displayName||user.email;
          const memberRole=inviteInfo.role||'Member';
          await dbSet(`projects/${inviteInfo.projectId}/members/${user.uid}`,{
            name:memberName,email:user.email,role:memberRole,addedAt:Date.now()
          });
          await dbSet(`userProjects/${user.uid}/${inviteInfo.projectId}`,true);
          await dbSet(`roster/${inviteInfo.createdBy}/${user.uid}`,{
            id:user.uid,name:memberName,email:user.email,role:memberRole,addedAt:Date.now()
          });
          const url=new URL(window.location);url.searchParams.delete('join');window.history.replaceState({},'',url);
          setInviteInfo(null);
        }
      }catch(e){console.error('Invite processing error:',e);}
      clearTimeout(timer);
      settle(user);
    });
    return ()=>{unsub();clearTimeout(timer);};
  },[firebaseReady,inviteToken,inviteInfo]);

  if(authUser===undefined)return<div className="spinner-page"><div className="spinner"/><div style={{marginTop:20,color:'rgba(255,255,255,.4)',fontSize:12,textAlign:'center'}}>v2.1 loading…</div></div>;
  if(!authUser){
    return showSignup
      ?<SignupPage onSwitch={()=>setShowSignup(false)} inviteInfo={inviteInfo}/>
      :<LoginPage onSwitch={()=>setShowSignup(true)} inviteInfo={inviteInfo}/>;
  }
  if(currentProp)return<WalkthroughView prop={currentProp} currentUser={authUser} onBack={()=>setCurrentProp(null)} onPropUpdate={p=>{setCurrentProp(p);}}/>;
  return<PropertyList currentUser={authUser} onOpen={setCurrentProp}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
