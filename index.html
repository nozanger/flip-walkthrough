<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanco — Scope of Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #05080f; color: #1a1a2e; min-height: 100vh; }

/* ── Home screen ── */
.list-page { max-width: 700px; margin: 0 auto; padding: 0 0 90px; background: linear-gradient(160deg, #080f1e 0%, #05080f 60%, #0a1020 100%); min-height: 100vh; }
.list-header { background: transparent; color: white; padding: 56px 20px 20px; }
.list-header-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.list-header-logo svg { flex-shrink: 0; }
.list-header-logo h1 { font-size: 28px; font-weight: 900; color: white; letter-spacing: -.5px; }
.list-header p { font-size: 13px; color: rgba(255,255,255,.45); margin-left: 46px; }
.btn-signout { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.7); border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.btn-signout:hover { background: rgba(255,255,255,.14); }
.list-content { padding: 0 14px; }

/* Stage section cards */
/* ── Kanban ── */
.kanban-board { display:flex; gap:12px; overflow-x:auto; padding:14px 16px 100px; -webkit-overflow-scrolling:touch; min-height:70vh; }
.kanban-board::-webkit-scrollbar { height:4px; }
.kanban-board::-webkit-scrollbar-track { background:rgba(255,255,255,.05); border-radius:2px; }
.kanban-board::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:2px; }
.kanban-col { flex-shrink:0; width:252px; display:flex; flex-direction:column; }
.kanban-col-header { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; margin-bottom:8px; }
.kanban-col-title { font-size:13px; font-weight:800; color:white; letter-spacing:.3px; }
.kanban-col-count { margin-left:auto; font-size:11px; font-weight:700; background:rgba(255,255,255,.15); color:rgba(255,255,255,.7); border-radius:20px; padding:2px 8px; }
.kanban-card { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:14px 16px; margin-bottom:8px; cursor:pointer; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); transition:all .15s; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.kanban-card:active { transform:scale(.97); opacity:.9; }
.kanban-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.35); }
.kanban-card-address { font-size:14px; font-weight:800; color:white; line-height:1.3; margin-bottom:6px; }
.kanban-card-date { font-size:11px; color:rgba(255,255,255,.4); margin-bottom:10px; }
.kanban-card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.kanban-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; border-radius:20px; padding:3px 9px; }
.kanban-chip-tasks { background:rgba(245,158,11,.15); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
.kanban-chip-ok { background:rgba(40,167,69,.15); color:#5cb85c; border:1px solid rgba(40,167,69,.3); }
.kanban-chip-warn { background:rgba(212,160,23,.15); color:#d4a017; border:1px solid rgba(212,160,23,.3); }
.kanban-chip-over { background:rgba(220,53,69,.15); color:#dc3545; border:1px solid rgba(220,53,69,.3); }
.kanban-move-btn { margin-top:10px; width:100%; padding:6px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:rgba(255,255,255,.5); font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }
.kanban-move-btn:active { background:rgba(255,255,255,.12); }
.kanban-empty { text-align:center; padding:24px 12px; color:rgba(255,255,255,.2); font-size:13px; border:1.5px dashed rgba(255,255,255,.1); border-radius:14px; }
.view-toggle-btn { display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); cursor:pointer; flex-shrink:0; transition:all .15s; }
.view-toggle-btn.active { background:rgba(245,158,11,.2); border-color:rgba(245,158,11,.4); }

.stage-section { border-radius: 22px; margin-bottom: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,.09); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 4px 24px rgba(0,0,0,.2); }
.stage-section-walkthrough { background: rgba(30, 50, 90, 0.55); }
.stage-section-contract { background: rgba(15, 70, 65, 0.55); }
.stage-section-renovation { background: rgba(25, 60, 20, 0.55); }
.stage-section-header { display: flex; align-items: center; gap: 12px; padding: 18px 18px 14px; }
.stage-section-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stage-section-walkthrough .stage-section-icon { background: rgba(91,141,217,.25); }
.stage-section-contract .stage-section-icon { background: rgba(91,191,181,.25); }
.stage-section-renovation .stage-section-icon { background: rgba(122,172,94,.25); }
.stage-section-info { flex: 1; }
.stage-section-info h2 { font-size: 16px; font-weight: 800; color: white; margin: 0; }
.stage-section-info p { font-size: 11px; color: rgba(255,255,255,.45); margin: 2px 0 0; }
.stage-see-all { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.8); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* Property cards inside sections */
.prop-card { margin: 0 10px 10px; border-radius: 18px; overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid rgba(255,255,255,.08); }
.prop-card:last-child { margin-bottom: 14px; }
.prop-card:active { transform: scale(.98); }
.prop-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.5); }
.prop-card.stage-walkthrough { background: rgba(40, 65, 110, 0.5); }
.prop-card.stage-contract { background: rgba(20, 80, 75, 0.5); }
.prop-card.stage-renovation { background: rgba(35, 75, 25, 0.5); }
.prop-card-body { display: flex; align-items: center; gap: 12px; padding: 14px; }
.prop-thumb { width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; font-size: 24px; }
.prop-info { flex: 1; min-width: 0; }
.prop-address { font-size: 15px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prop-meta { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 3px; }
.prop-arrow { color: rgba(255,255,255,.3); font-size: 20px; flex-shrink: 0; }
.prop-budget-bar { padding: 0 14px 12px; }
.prop-budget-track { height: 5px; border-radius: 3px; background: rgba(255,255,255,.15); overflow: hidden; margin-bottom: 5px; }
.prop-budget-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.prop-budget-nums { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.55); }
.prop-budget-nums strong { color: rgba(255,255,255,.9); }
.prop-actions { display: flex; align-items: center; gap: 0; padding: 0 14px 12px; border-top: 1px solid rgba(255,255,255,.06); margin-top: 0; padding-top: 10px; }
.prop-stage-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-right: 6px; }
.prop-stage-label { font-size: 12px; color: rgba(255,255,255,.5); font-weight: 500; flex: 1; }
.prop-action-btn { background: none; border: none; padding: 6px 8px; font-size: 13px; cursor: pointer; color: rgba(255,255,255,.4); display: flex; align-items: center; gap: 4px; border-radius: 8px; font-weight: 500; }
.prop-action-btn:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }
.prop-action-btn.open { color: #5bbfb5; font-weight: 700; padding-left: 0; }
.prop-action-btn.open:hover { background: none; color: #7dd4ce; }
.prop-action-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); margin: 0 4px; }
.prop-action-btn.danger:hover { color: #ff6b6b; background: rgba(220,53,69,.1); }

.btn-add-prop { width: 100%; background: rgba(255,255,255,.04); border: 1.5px dashed rgba(255,255,255,.15); border-radius: 14px; padding: 16px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,.35); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; margin-bottom: 10px; }
.btn-add-prop:hover { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,.05); }
.empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,.3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h2 { font-size: 18px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
.notif-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff6b35; display: inline-block; flex-shrink: 0; }
.notif-badge { background: #ff5a36; color: white; border-radius: 8px; font-size: 10px; font-weight: 800; padding: 2px 6px; margin-left: 4px; display: inline-block; letter-spacing: .2px; }

/* ── Home nav (top tabs) ── */
.home-nav { display: flex; background: rgba(13,24,41,.95); padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,.07); backdrop-filter: blur(10px); gap: 4px; }
.home-nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 12px 0; border: none; background: none; cursor: pointer; color: rgba(255,255,255,.35); font-size: 14px; font-weight: 600; border-bottom: 2.5px solid transparent; transition: all .2s; }
.home-nav-btn.active { color: #f59e0b; border-bottom-color: #f59e0b; }
.home-nav-sep { width: 1px; background: rgba(255,255,255,.1); margin: 10px 0; }
.home-nav-count { background: #ff6b35; color: white; border-radius: 10px; font-size: 10px; font-weight: 800; padding: 1px 6px; margin-left: 2px; }

/* ── Bottom nav ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,18,35,0.85); border-top: 1px solid rgba(255,255,255,.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
.bottom-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 8px; gap: 4px; border: none; background: none; cursor: pointer; color: rgba(255,255,255,.35); font-size: 10px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; transition: color .15s; }
.bottom-nav-btn.active { color: #f59e0b; background: rgba(245,158,11,.1); border-radius: 10px; padding: 8px 16px; }

.app { max-width: 900px; margin: 0 auto; padding: 0 0 80px; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #0a1628 100%); color: white; padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.btn-back { background: rgba(255,255,255,.12); border: none; color: white; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-back:hover { background: rgba(255,255,255,.2); }
.header-title { flex: 1; min-width: 0; }
.header-title h1 { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-title p { font-size: 11px; opacity: .6; margin-top: 1px; }
.btn-share { background: #f59e0b; color: #1a1a2e; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.btn-share:hover { background: #d97706; }

.sqft-bar { background: #0a1628; padding: 6px 10px; margin: 0; display: flex; gap: 6px; flex-wrap: wrap; }
.sqft-field { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 7px; padding: 4px 8px; }
.sqft-field-icon { display: flex; align-items: center; gap: 4px; }
.sqft-field-icon svg { opacity: .4; flex-shrink: 0; }
.sqft-field label { font-size: 9px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; white-space: nowrap; }
.sqft-field input { background: transparent; border: none; color: white; font-size: 12px; font-weight: 700; padding: 0; width: 36px; }
.sqft-field input::placeholder { color: rgba(255,255,255,.2); }
.sqft-field input:focus { outline: none; }
.sqft-divider { display: none; }
.sqft-group-label { display: none; }

.tabs { display: flex; overflow-x: auto; padding: 6px 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; gap: 2px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 8px 12px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5); cursor: pointer; border-bottom: none; border-radius: 8px; margin: 4px 2px; transition: all .2s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.tab.active { color: #f59e0b; background: rgba(245,158,11,.15); border-bottom: none; }
.tab:hover:not(.active) { background: rgba(255,255,255,.06); color: rgba(255,255,255,.8); }
.tab-count { background: rgba(255,255,255,.15); border-radius: 10px; font-size: 10px; padding: 1px 5px; }
.tab.active .tab-count { background: rgba(245,158,11,.25); color: #f59e0b; }
.content { padding: 12px 12px 0; }

.section-card { background: white; border-radius: 16px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.section-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; }
.section-title { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
.quick-status { display: flex; gap: 5px; flex-shrink: 0; }
.qs-btn { border: none; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; opacity: .4; transition: opacity .15s, transform .1s; white-space: nowrap; }
.qs-btn.active { opacity: 1; }
.qs-btn:active { transform: scale(.93); }
.qs-keep { background: #d4edda; color: #155724; }
.qs-replace { background: #f8d7da; color: #721c24; }
.chevron { transition: transform .2s; font-size: 14px; color: #aaa; flex-shrink: 0; }
.chevron.open { transform: rotate(180deg); }
.section-body { border-top: 1px solid #f0f0f0; padding: 16px; }

.status-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.status-btn { padding: 5px 12px; border-radius: 20px; border: 2px solid #e0e0e0; font-size: 12px; font-weight: 600; cursor: pointer; background: white; transition: all .15s; }
.status-btn.sel-keep { border-color: #28a745; background: #d4edda; color: #155724; }
.status-btn.sel-replace { border-color: #dc3545; background: #f8d7da; color: #721c24; }
.status-btn.sel-maybe { border-color: #d4a017; background: #fff3cd; color: #856404; }

.notes-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.notes-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; color: #1a1a2e; transition: border-color .15s; }
.notes-input:focus { outline: none; border-color: #1d4ed8; }
.notes-input::placeholder { color: #bbb; }
.notes-row { display: flex; flex-direction: column; gap: 8px; }
.update-stamp { font-size: 11px; color: #aaa; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
.update-stamp strong { color: #888; }

/* ── Item Card (swipe walkthrough) ── */
.item-card-wrap { display:flex; flex-direction:column; height:100%; padding:0; }
.item-card-nav { display:flex; align-items:center; gap:10px; padding:10px 16px 6px; }
.item-nav-btn { width:40px; height:40px; border-radius:50%; border:2px solid #dde; background:white; font-size:22px; line-height:1; color:#1d4ed8; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.item-nav-btn:disabled { opacity:.25; cursor:default; }
.item-nav-btn:not(:disabled):active { background:#e8f0fb; }
.item-view-toggle { width:36px; height:36px; border-radius:10px; border:2px solid #dde; background:white; font-size:16px; color:#1d4ed8; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
.item-view-toggle.active { background:#1d4ed8; color:white; border-color:#1d4ed8; }
.item-card-info { flex:1; text-align:center; }
.item-card-title { font-size:18px; font-weight:800; color:white; display:block; line-height:1.2; text-shadow:0 1px 4px rgba(0,0,0,.4); }
.item-card-count { font-size:12px; color:rgba(255,255,255,.55); font-weight:600; }
.item-progress-bar { height:4px; background:#eee; margin:0 16px 12px; border-radius:2px; }
.item-progress-fill { height:100%; background:#1d4ed8; border-radius:2px; transition:width .3s; }
.item-card-body { flex:1; overflow-y:auto; padding:0 16px 16px; }
.item-status-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.item-status-btn { padding:16px 8px; border-radius:14px; border:2px solid #dde; background:#f8f9fa; font-size:16px; font-weight:700; cursor:pointer; transition:all .15s; color:#444; }
.item-status-btn.sel-keep { background:#d4edda; border-color:#28a745; color:#155724; }
.item-status-btn.sel-replace { background:#f8d7da; border-color:#dc3545; color:#721c24; }
.item-status-btn.sel-maybe { background:#fff3cd; border-color:#d4a017; color:#856404; }
.item-dots-row { display:flex; justify-content:center; flex-wrap:wrap; gap:6px; padding:10px 16px 6px; }
.item-dot { width:10px; height:10px; border-radius:50%; background:#dde; cursor:pointer; transition:all .15s; flex-shrink:0; }
.item-dot.active { background:#1d4ed8; transform:scale(1.3); }
.item-dot.filled { background:#aac4e8; }
/* ── Overview grid ── */
.item-overview { flex:1; overflow-y:auto; padding:12px 16px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; align-content:start; }
.item-overview-card { border-radius:14px; border:2px solid #eee; background:white; padding:12px; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; gap:6px; }
.item-overview-card:active { transform:scale(.97); }
.item-overview-card.ov-keep { border-color:#28a745; background:#f0faf2; }
.item-overview-card.ov-replace { border-color:#dc3545; background:#fff5f5; }
.item-overview-card.ov-maybe { border-color:#d4a017; background:#fffbf0; }
.item-overview-card.ov-notes { border-color:#aac4e8; background:#f0f4ff; }
.item-ov-name { font-size:13px; font-weight:700; color:#1a1a2e; line-height:1.3; }
.item-ov-badge { font-size:11px; font-weight:700; border-radius:20px; padding:2px 8px; align-self:flex-start; }
.ov-keep .item-ov-badge { background:#d4edda; color:#155724; }
.ov-replace .item-ov-badge { background:#f8d7da; color:#721c24; }
.ov-maybe .item-ov-badge { background:#fff3cd; color:#856404; }
.item-ov-note { font-size:11px; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mic-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 700; background: #f0f2f5; color: #444; transition: all .2s; }
.mic-btn:hover { background: #e0e4eb; }
.mic-btn.recording { background: #dc3545; color: white; animation: pulse 1s infinite; }
.mic-btn.unsupported { opacity: .35; cursor: not-allowed; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,.4); } 50% { box-shadow: 0 0 0 10px rgba(220,53,69,0); } }
.recording-hint { font-size: 12px; color: #dc3545; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
.recording-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc3545; animation: blink .8s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }

.photos-section { margin-top: 14px; }
.photos-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.photo-slot { border: 2px dashed #ddd; border-radius: 10px; overflow: hidden; background: #fafafa; }
.photo-slot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; padding: 8px 10px 4px; display: flex; align-items: center; justify-content: space-between; }
.photo-slot-label .add-btns { display: flex; gap: 4px; }
.add-btn { background: #1d4ed8; color: white; border: none; border-radius: 5px; font-size: 10px; font-weight: 700; padding: 2px 7px; cursor: pointer; }
.add-btn.gold { background: #f59e0b; color: #1a1a2e; }
.photo-empty { display: flex; }
.photo-empty-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px 8px; gap: 4px; cursor: pointer; }
.photo-empty-half:first-child { border-right: 1px solid #eee; }
.photo-empty-third { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 4px; gap: 4px; cursor: pointer; border-right: 1px solid #eee; }
.photo-empty-third:last-child { border-right: none; }
.photo-empty-icon { font-size: 22px; }
.photo-empty-text { font-size: 11px; color: #bbb; text-align: center; }
.photo-input { display: none; }
/* Carousel */
.photo-carousel { position: relative; background: #000; }
.carousel-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: pointer; }
.carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.45); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
.carousel-nav.prev { left: 6px; }
.carousel-nav.next { right: 6px; }
.carousel-footer { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px 7px; background: #fafafa; }
.carousel-dots { display: flex; gap: 4px; }
.carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; transition: background .15s; }
.carousel-dot.active { background: #1d4ed8; }
.carousel-count { font-size: 11px; color: #aaa; }
.carousel-del { background: none; border: none; color: #ccc; font-size: 15px; cursor: pointer; padding: 2px; }
.carousel-del:hover { color: #dc3545; }
/* Video section */
.video-upload-btn { width: 100%; border: 2px dashed #ddd; border-radius: 10px; padding: 18px; background: #fafafa; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all .2s; }
.video-upload-btn:hover { border-color: #1d4ed8; background: #f4f7fb; }
.video-upload-btn span:first-child { font-size: 28px; }
.video-upload-btn span:last-child { font-size: 13px; color: #aaa; }
.video-progress { background: #f0f0f0; border-radius: 100px; height: 6px; margin: 8px 0; overflow: hidden; }
.video-progress-fill { height: 6px; background: linear-gradient(90deg, #1d4ed8, #f59e0b); border-radius: 100px; transition: width .3s; }
.video-item { background: #f8f9fa; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
.video-item video { width: 100%; display: block; max-height: 220px; background: #000; }
.video-item-footer { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; }
.video-item-meta { font-size: 11px; color: #aaa; }
.video-del-btn { background: none; border: none; color: #ccc; font-size: 15px; cursor: pointer; }
.video-del-btn:hover { color: #dc3545; }

.progress-bar-wrap { background: white; margin: 0 12px 10px; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
.progress-label span:last-child { font-weight: 700; color: #1d4ed8; }
.progress-track { background: #f0f2f5; border-radius: 100px; height: 6px; }
.progress-fill { background: linear-gradient(90deg, #1d4ed8, #f59e0b); border-radius: 100px; height: 6px; transition: width .4s; }

/* ── Project stage ── */
.stage-bar { display:flex; gap:8px; padding:12px 14px 0; }
.stage-pill { flex:1; border:2px solid rgba(255,255,255,.15); border-radius:12px; padding:10px 8px; font-size:11px; font-weight:700; cursor:pointer; background:rgba(255,255,255,.06); color:rgba(255,255,255,.5); white-space:nowrap; transition:all .15s; text-align:center; display:flex; align-items:center; justify-content:center; gap:5px; letter-spacing:.3px; text-transform:uppercase; }
.stage-pill.active-walkthrough { background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.4); color:white; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.stage-pill.active-contract { background:#1a6b63; border-color:#5bbfb5; color:white; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.stage-pill.active-renovation { background:#2d5c1a; border-color:#7aac5e; color:white; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.stage-badge { display:inline-block; font-size:10px; font-weight:800; border-radius:20px; padding:2px 8px; margin-top:4px; }
.stage-badge.walkthrough { background:rgba(255,255,255,.15); color:white; }
.stage-badge.contract { background:#5bbfb5; color:white; }
.stage-badge.renovation { background:#7aac5e; color:white; }
/* walkthrough card: use dark glass style from above */
/* ── Tasks ── */
.tasks-page { padding: 12px; }
.tasks-add-row { display:flex; gap:8px; margin-bottom:14px; }
.tasks-add-input { flex:1; border:2px solid #dde; border-radius:10px; padding:12px 14px; font-size:15px; outline:none; }
.tasks-add-input:focus { border-color:#1d4ed8; }
.tasks-add-btn { background:#1d4ed8; color:white; border:none; border-radius:10px; padding:12px 18px; font-size:18px; font-weight:700; cursor:pointer; flex-shrink:0; }
.task-add-fab { display:flex; align-items:center; gap:8px; width:100%; padding:13px 16px; background:#1d4ed8; color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:14px; justify-content:center; letter-spacing:.2px; }
.tasks-filters { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:2px; }
.task-filter { border:none; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; background:#f0f2f5; color:#666; white-space:nowrap; }
.task-filter.active { background:#1d4ed8; color:white; }
.task-card { background:white; border-radius:14px; border:1px solid #eef0f4; margin-bottom:8px; overflow:hidden; transition:all .15s; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.task-card:active { background:#f8f9fa; }
.task-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); border-color:#dde; }
.task-card.urgent { border-color:#dc3545; background:#fff5f5; border-radius:14px; box-shadow:0 2px 8px rgba(220,53,69,.2); }
.task-card.status-done { border-color:#d4edda; background:#f9fffe; }
.task-card-top { display:flex; align-items:center; gap:10px; padding:12px 14px; }
.task-done-check { width:22px; height:22px; border-radius:50%; border:2px solid #ccc; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; cursor:pointer; flex-shrink:0; color:white; background:white; transition:all .15s; }
.task-done-check.checked { background:#28a745; border-color:#28a745; }
.task-title { flex:1; font-size:15px; font-weight:600; color:#1a1a2e; line-height:1.4; min-width:0; }

.task-title-input { width:100%; font-size:15px; font-weight:600; color:#1a1a2e; line-height:1.4; border:none; outline:none; background:transparent; padding:0; font-family:inherit; }
.task-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:3px; }
.task-toast { display:flex; align-items:center; justify-content:space-between; background:#1a1a2e; color:white; border-radius:10px; padding:10px 14px; margin-bottom:10px; font-size:14px; font-weight:600; animation:fadeIn .2s ease; }
.task-toast-undo { background:white; color:#1a1a2e; border:none; border-radius:6px; padding:4px 12px; font-size:13px; font-weight:700; cursor:pointer; }
.task-urgent-pip { width:8px; height:8px; border-radius:50%; background:#dc3545; flex-shrink:0; }
.task-assignee { font-size:11px; background:rgba(29,78,216,.12); color:#1d4ed8; border-radius:20px; padding:2px 8px; font-weight:600; border:1px solid rgba(29,78,216,.2); }
.task-tag { font-size:11px; background:#fff3cd; color:#856404; border-radius:20px; padding:2px 8px; font-weight:700; }
.task-due-overdue { font-size:11px; color:#dc3545; font-weight:700; }
.task-due-soon { font-size:11px; color:#d4a017; font-weight:700; }
.task-due-ok { font-size:11px; color:#aaa; }
.task-date { font-size:11px; color:#aaa; }
.task-notes-input { width:100%; border:1.5px solid #eee; border-radius:8px; padding:8px 10px; font-size:13px; resize:none; outline:none; min-height:60px; font-family:inherit; }
.task-notes-input:focus { border-color:#1d4ed8; }
.task-assign-select { flex:1; border:1.5px solid #eee; border-radius:8px; padding:7px 10px; font-size:13px; outline:none; background:white; }
.task-delete-btn { background:none; border:none; color:#ddd; font-size:18px; cursor:pointer; padding:4px; }
.task-delete-btn:hover { color:#dc3545; }
.tasks-empty { text-align:center; padding:40px 20px; color:#aaa; font-size:14px; }
.drawer-field-label { font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.drawer-section { margin-bottom:18px; }
.drawer-assignee-chips { display:flex; flex-wrap:wrap; gap:6px; }
.drawer-assignee-chip { border:2px solid #dde; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:700; background:white; color:#666; cursor:pointer; transition:all .15s; }

.drawer-tag-chip { display:inline-flex; align-items:center; gap:4px; background:#e8f0fb; border:1.5px solid #aac4e8; border-radius:20px; padding:4px 10px; font-size:12px; font-weight:700; color:#1d4ed8; cursor:pointer; }
.drawer-due-input { width:100%; padding:9px 12px; border-radius:10px; border:1.5px solid #e0e0e0; font-size:14px; background:white; outline:none; }
.drawer-due-input:focus { border-color:#1d4ed8; }
.drawer-delete-row { display:flex; justify-content:center; margin-top:8px; }
.drawer-delete-link { background:none; border:none; color:#dc3545; font-size:13px; font-weight:600; cursor:pointer; padding:8px; opacity:.7; }
.drawer-delete-link:hover { opacity:1; }
.summary-page { padding: 12px; }
.summary-card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.summary-card h3 { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
.budget-section-title { font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:.5px; margin:16px 0 8px; }
.budget-section-title:first-of-type { margin-top:4px; }
.budget-top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.budget-total-budget-label { font-size:13px; color:#666; }
.budget-total-budget-val { font-size:15px; font-weight:700; color:#1a1a2e; }
.budget-amount-input { width:110px; border:1.5px solid #e0e0e0; border-radius:8px; padding:6px 10px; font-size:14px; font-weight:600; color:#1a1a2e; outline:none; background:white; font-family:inherit; text-align:right; }
.budget-amount-input:focus { border-color:#1d4ed8; }
.budget-payment-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f4f4f4; }
.budget-payment-desc { flex:1; border:1.5px solid #e0e0e0; border-radius:8px; padding:6px 10px; font-size:13px; color:#1a1a2e; outline:none; background:white; font-family:inherit; }
.budget-payment-desc:focus { border-color:#1d4ed8; }
.budget-add-btn { background:none; border:1.5px dashed #ccc; border-radius:8px; padding:7px 14px; font-size:13px; color:#888; cursor:pointer; width:100%; margin-top:6px; }
.budget-add-btn:hover { border-color:#1d4ed8; color:#1d4ed8; }
.budget-del-btn { background:none; border:none; color:#ddd; font-size:16px; cursor:pointer; padding:2px 6px; flex-shrink:0; }
.budget-del-btn:hover { color:#dc3545; }
.budget-subtotal { display:flex; justify-content:space-between; align-items:center; padding:8px 0 0; font-size:13px; color:#666; }
.budget-subtotal strong { color:#1a1a2e; }
.budget-divider { border:none; border-top:2px solid #eee; margin:16px 0; }
.budget-summary-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:14px; }
.budget-summary-row.total { font-weight:800; font-size:15px; border-top:2px solid #1a1a2e; margin-top:4px; padding-top:10px; }
.budget-remaining-ok { color:#28a745; font-weight:700; }
.budget-remaining-warn { color:#d4a017; font-weight:700; }
.budget-remaining-over { color:#dc3545; font-weight:700; }
.summary-textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; color: #1a1a2e; }
.summary-textarea:focus { outline: none; border-color: #1d4ed8; }
.summary-textarea::placeholder { color: #bbb; }
.priority-list { display: flex; flex-direction: column; gap: 6px; }
.priority-item { display: flex; gap: 8px; align-items: flex-start; }
.priority-item input[type=text] { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.priority-item input[type=text]:focus { outline: none; border-color: #1d4ed8; }
.priority-num { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; background: #f59e0b; color: #1a1a2e; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 8px; }
.priority-remove { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px; margin-top: 4px; }
.priority-remove:hover { color: #e55; }
.btn-add-priority { background: none; border: 2px dashed #ddd; border-radius: 8px; padding: 8px; font-size: 13px; color: #aaa; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-add-priority:hover { border-color: #1d4ed8; color: #1d4ed8; }
.budget-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.budget-field { display: flex; flex-direction: column; gap: 4px; }
.budget-field label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.budget-field input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.budget-field input:focus { outline: none; border-color: #1d4ed8; }

.participants-page { padding: 12px; }
.activity-feed { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 10px; }
.activity-feed h3 { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px 10px; border-bottom: 1px solid #f0f0f0; }
.activity-item { display: flex; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f8f8f8; align-items: flex-start; }
.activity-item:last-child { border-bottom: none; }
.activity-text { font-size: 13px; color: #444; line-height: 1.4; flex: 1; }
.activity-text strong { color: #1a1a2e; }
.activity-time { font-size: 11px; color: #bbb; white-space: nowrap; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
.modal { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 480px; box-shadow: 0 24px 80px rgba(0,0,0,.4); }
.modal h2 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.6; }
.modal-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.modal-field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.modal-field input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.modal-field input:focus { outline: none; border-color: #1d4ed8; }
.modal-field small { font-size: 11px; color: #aaa; line-height: 1.4; }
.modal-btns { display: flex; gap: 10px; flex-direction: column; margin-top: 6px; }
.btn-primary { background: #1d4ed8; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; letter-spacing: .1px; transition: all .2s; box-shadow: 0 4px 12px rgba(29,78,216,.3); }
.btn-primary:hover { background: #1e40af; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(29,78,216,.4); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: #f0f0f0; color: #444; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: all .2s; }
.btn-secondary:hover { background: #e4e4e4; }
.btn-gold { background: #f59e0b; color: #1a1a2e; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; letter-spacing: .1px; transition: all .2s; box-shadow: 0 4px 12px rgba(245,158,11,.3); }
.btn-gold:hover { background: #d97706; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,158,11,.4); }
.btn-danger { background: #dc3545; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: all .2s; }
.setup-step { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: #444; line-height: 1.5; }
.setup-step strong { color: #1d4ed8; }

.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 300; display: flex; align-items: center; justify-content: center; }
.lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: fixed; top: 16px; right: 16px; background: rgba(255,255,255,.15); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }

/* ── Auth ── */
.auth-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; background: linear-gradient(160deg, #1a1a2e 0%, #1d4ed8 70%); }
.auth-card { background: white; border-radius: 28px; padding: 40px 32px 32px; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,.4); }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo img { width: 72px; height: 72px; border-radius: 18px; }
.auth-logo h1 { font-size: 26px; font-weight: 900; color: #1a1a2e; margin-top: 10px; letter-spacing: -.4px; }
.auth-logo p { font-size: 13px; color: #aaa; margin-top: 4px; }
.auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.auth-field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .6px; }
.auth-field input { border: 1.5px solid #e0e0e0; border-radius: 14px; padding: 14px 16px; font-size: 15px; font-family: inherit; color: #1a1a2e; transition: border-color .15s; }
.auth-field input:focus { outline: none; border-color: #1d4ed8; }
.auth-error { background: #fff5f5; color: #dc3545; border: 1px solid #f5c6cb; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; line-height: 1.5; }
.auth-switch { text-align: center; margin-top: 18px; font-size: 13px; color: #aaa; }
.auth-switch button { background: none; border: none; color: #1d4ed8; font-weight: 700; cursor: pointer; font-size: 13px; text-decoration: underline; }
.invite-banner { background: linear-gradient(135deg, #1d4ed8, #1a5276); color: white; border-radius: 14px; padding: 16px; margin-bottom: 22px; }
.invite-banner h3 { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
.invite-banner p { font-size: 13px; opacity: .8; line-height: 1.5; }

/* Spinner */
.spinner-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
.spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #1d4ed8; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Team / members */
.team-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.team-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid #f0f0f0; }

async function extractVideoFrames(file, count=8){
  return new Promise((resolve,reject)=>{
    const video=document.createElement('video');
    video.muted=true; video.playsInline=true;
    video.src=URL.createObjectURL(file);
    video.onloadedmetadata=async()=>{
      const dur=video.duration;
      const canvas=document.createElement('canvas');
      const scale=Math.min(1,512/Math.max(video.videoWidth,video.videoHeight));
      canvas.width=Math.round(video.videoWidth*scale);
      canvas.height=Math.round(video.videoHeight*scale);
      const ctx=canvas.getContext('2d');
      const frames=[];
      for(let i=0;i<count;i++){
        video.currentTime=(i+0.5)*dur/count;
        await new Promise(r=>{video.onseeked=r;});
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        frames.push(canvas.toDataURL('image/jpeg',0.6).split(',')[1]);
      }
      URL.revokeObjectURL(video.src);
      resolve(frames);
    };
    video.onerror=reject;
    video.load();
  });
}

async function callGemini(frames){
  const key=await getGeminiKey();
  if(!key) throw new Error('NO_KEY');
  const parts=[
    {text:GEMINI_PROMPT},
    ...frames.map(data=>({inline_data:{mime_type:'image/jpeg',data}}))
  ];
  const resp=await fetch(GEMINI_URL_FOR(key),{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts}]})
  });
  if(!resp.ok) throw new Error(`Gemini error ${resp.status}: ${await resp.text()}`);
  const json=await resp.json();
  const text=json.candidates?.[0]?.content?.parts?.[0]?.text||'';
  const match=text.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('No JSON in response: '+text.slice(0,200));
  return JSON.parse(match[0]);
}

/* ── Reusable drag-to-reorder list ── */
function SortableList({items, onReorder, renderItem, keyFn, gap=8, style={}}){
  const dragIdx=React.useRef(null);
  const [overIdx,setOverIdx]=React.useState(null);

  function reorder(from,to){
    if(from===to)return;
    const next=[...items];
    const[moved]=next.splice(from,1);
    next.splice(to,0,moved);
    onReorder(next);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap,...style}}>
      {items.map((item,i)=>(
        <div
          key={keyFn?keyFn(item):i}
          draggable
          onDragStart={e=>{dragIdx.current=i;e.dataTransfer.effectAllowed='move';}}
          onDragOver={e=>{e.preventDefault();setOverIdx(i);}}
          onDrop={e=>{e.preventDefault();reorder(dragIdx.current,i);dragIdx.current=null;setOverIdx(null);}}
          onDragEnd={()=>{dragIdx.current=null;setOverIdx(null);}}
          style={{opacity:overIdx===i&&dragIdx.current!==i?.45:1,transition:'opacity .15s'}}
        >
          {renderItem(item,i)}
        </div>
      ))}
    </div>
  );
}

    const img=new Image();
    img.onload=()=>{
      const MAX=1200,Q=0.78;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',Q));
    };
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}

// ── Speech hook ──────────────────────────────────────────────────────
function useSpeech(onResult){
  const[recording,setRecording]=React.useState(false);
  const[interim,setInterim]=React.useState('');
  const[errMsg,setErrMsg]=React.useState('');
  const recRef=React.useRef(null);
  const onResultRef=React.useRef(onResult);
  React.useEffect(()=>{onResultRef.current=onResult;});
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const supported=!!SR;
  function start(){
    if(!supported||recRef.current)return;
    setErrMsg('');
    try{
      const rec=new SR();
      rec.lang='en-US';rec.interimResults=true;rec.maxAlternatives=1;rec.continuous=false;
      rec.onresult=e=>{const last=e.results[e.results.length-1];if(last.isFinal){const t=last[0].transcript.trim();if(t)onResultRef.current(t);setInterim('');}else setInterim(last[0].transcript);};
      rec.onerror=e=>{setInterim('');setErrMsg(e.error==='not-allowed'||e.error==='service-not-allowed'?'Mic blocked — allow microphone in settings.':'Mic error: '+e.error);setRecording(false);recRef.current=null;};
      rec.onend=()=>{setInterim('');setRecording(false);recRef.current=null;};
      rec.start();
      recRef.current=rec;
      setRecording(true);
    }catch(e){setErrMsg('Could not start mic.');setRecording(false);recRef.current=null;}
  }
  function stop(){if(recRef.current){try{recRef.current.stop();}catch(e){}recRef.current=null;}setRecording(false);setInterim('');}
  React.useEffect(()=>()=>{if(recRef.current)try{recRef.current.stop();}catch(e){};},[]);
  return{recording,interim,errMsg,toggle:()=>recording?stop():start(),supported};
}

// ── PhotoSlot ────────────────────────────────────────────────────────
function PhotoSlot({label,photos,onAdd,onAddBatch,onRemove,onView}){
  const[idx,setIdx]=React.useState(0);
  const[uploading,setUploading]=React.useState(null);
  const fileRef=React.useRef();
  const camRef=React.useRef();
  const startX=React.useRef(null);
  const pendingFiles=React.useRef([]);
  const pendingTimer=React.useRef(null);
  const has=photos&&photos.length>0;
  const safeIdx=has?Math.min(idx,photos.length-1):0;

  React.useEffect(()=>{if(has)setIdx(photos.length-1);},[photos.length]);

  function handleFiles(e){
    const newFiles=Array.from(e.target.files||[]);
    e.target.value='';
    if(!newFiles.length)return;
    pendingFiles.current.push(...newFiles);
    clearTimeout(pendingTimer.current);
    pendingTimer.current=setTimeout(async()=>{
      const files=pendingFiles.current.splice(0);
      if(!files.length)return;
      setUploading({done:0,total:files.length});
      const results=[];
      for(let i=0;i<files.length;i++){
        const src=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=async ev=>{try{res(await compressImage(ev.target.result));}catch(err){rej(err);}};
          r.onerror=rej;
          r.readAsDataURL(files[i]);
        });
        results.push(src);
        setUploading({done:i+1,total:files.length});
      }
      setUploading(null);
      if(results.length===1&&onAdd){onAdd(results[0]);}
      else if(onAddBatch){onAddBatch(results);}
      else{results.forEach(src=>onAdd&&onAdd(src));}
    },80);
  }

  function onTouchStart(e){startX.current=e.touches[0].clientX;}
  function onTouchEnd(e){
    if(startX.current===null)return;
    const dx=e.changedTouches[0].clientX-startX.current;
    if(dx<-40)setIdx(i=>Math.min(i+1,photos.length-1));
    else if(dx>40)setIdx(i=>Math.max(i-1,0));
    startX.current=null;
  }

  return(
    <div className="photo-slot">
      <div className="photo-slot-label">
        <span>{label}</span>
        <div className="add-btns">
          <button className="add-btn gold" onClick={()=>camRef.current.click()}>📷</button>
          <button className="add-btn" onClick={()=>fileRef.current.click()}>＋ Add</button>
        </div>
      </div>
      {uploading&&(
        <div style={{background:'#f0f4ff',borderRadius:10,padding:'10px 14px',marginBottom:8,fontSize:13,color:'#1d4ed8',textAlign:'center'}}>
          ⏳ Processing {uploading.done}/{uploading.total} photo{uploading.total>1?'s':''}…
        </div>
      )}
      {!has&&!uploading&&(
        <div className="photo-empty">
          <div className="photo-empty-half" onClick={()=>camRef.current.click()}><span className="photo-empty-icon">📷</span><span className="photo-empty-text">Camera</span></div>
          <div className="photo-empty-half" onClick={()=>fileRef.current.click()}><span className="photo-empty-icon">🖼️</span><span className="photo-empty-text">Add Photos</span></div>
        </div>
      )}
      {has&&(
        <div>
          <div className="photo-carousel" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            <img className="carousel-img" src={photos[safeIdx]} alt="" onClick={()=>onView(photos[safeIdx])}/>
            {photos.length>1&&<>
              <button className="carousel-nav prev" onClick={()=>setIdx(i=>Math.max(i-1,0))}>‹</button>
              <button className="carousel-nav next" onClick={()=>setIdx(i=>Math.min(i+1,photos.length-1))}>›</button>
            </>}
          </div>
          <div className="carousel-footer">
            <div className="carousel-dots">
              {photos.map((_,i)=><div key={i} className={`carousel-dot${i===safeIdx?' active':''}`}/>)}
            </div>
            <span className="carousel-count">{safeIdx+1} / {photos.length}</span>
            <button className="carousel-del" onClick={()=>{onRemove(safeIdx);setIdx(i=>Math.max(0,i-1));}}>🗑</button>
          </div>
        </div>
      )}
      {/* Single input with multiple — iOS lets you pick multiple from Photos app */}
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFiles}/>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleFiles}/>
    </div>
  );
}

function ItemCardView({propId,cat,data,mergedRef,updateItem,setLightbox,username,onPrevCat,onNextCat}){
  const[idx,setIdx]=React.useState(0);
  const[overview,setOverview]=React.useState(false);
  React.useEffect(()=>{setIdx(0);setOverview(false);},[cat.id]);
  const items=cat.items;
  const item=items[idx];
  const d=(data[cat.id]||{})[item.id]||{};
  const startX=React.useRef(null);
  const startY=React.useRef(null);

  function onChange(itemId,val){updateItem(cat.id,itemId,val);}
  function go(n){
    const next=idx+n;
    if(next<0){onPrevCat&&onPrevCat();}
    else if(next>=items.length){onNextCat&&onNextCat();}
    else setIdx(next);
  }
  function jumpTo(i){setIdx(i);setOverview(false);}

  function onTouchStart(e){startX.current=e.touches[0].clientX;startY.current=e.touches[0].clientY;}
  function onTouchEnd(e){
    if(startX.current===null)return;
    const dx=e.changedTouches[0].clientX-startX.current;
    const dy=Math.abs(e.changedTouches[0].clientY-startY.current);
    startX.current=null;startY.current=null;
    if(dy>40)return;
    if(Math.abs(dx)>50)dx<0?go(1):go(-1);
  }

  const filledCount=items.filter(it=>{const id=(data[cat.id]||{})[it.id];return id?.status||id?.notes;}).length;

  return(
    <div className="item-card-wrap">
      <div className="item-card-nav">
        {!overview&&<button className="item-nav-btn" onClick={()=>go(-1)}>‹</button>}
        <div className="item-card-info">
          {overview
            ?<><span className="item-card-title">{cat.icon} {cat.label}</span><span className="item-card-count">{filledCount} of {items.length} filled</span></>
            :<><span className="item-card-title">{item.label}</span><span className="item-card-count">{idx+1} of {items.length}</span></>
          }
        </div>
        {!overview&&<button className="item-nav-btn" onClick={()=>go(1)}>›</button>}
        <button className={`item-view-toggle${overview?' active':''}`} onClick={()=>setOverview(v=>!v)} title={overview?'Swipe view':'Overview'}>
          {overview?'↔':'⊞'}
        </button>
      </div>
      {!overview&&<div className="item-progress-bar"><div className="item-progress-fill" style={{width:`${((idx+1)/items.length)*100}%`}}/></div>}

      {overview?(
        <div className="item-overview">
          {items.map((it,i)=>{
            const id=(data[cat.id]||{})[it.id]||{};
            const cls=id.status==='keep'?'ov-keep':id.status==='replace'?'ov-replace':id.status==='maybe'?'ov-maybe':id.notes?'ov-notes':'';
            return(
              <div key={it.id} className={`item-overview-card ${cls}`} onClick={()=>jumpTo(i)}>
                <div className="item-ov-name">{it.label}</div>
                {id.status&&<span className="item-ov-badge">{STATUS_LABELS[id.status]}</span>}
                {id.notes&&<div className="item-ov-note">{id.notes}</div>}
                {!id.status&&!id.notes&&<div className="item-ov-note" style={{color:'#bbb'}}>Not filled</div>}
              </div>
            );
          })}
        </div>
      ):(
        <>
          <div className="item-card-body" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            <div className="item-status-row">
              {STATUSES.map(s=>(
                <button key={s.id} className={`item-status-btn${d.status===s.id?' sel-'+s.cls:''}`}
                  onClick={()=>onChange(item.id,{...d,status:d.status===s.id?null:s.id})}>{s.label}</button>
              ))}
            </div>
            <VoiceTextarea value={d.notes} onChange={v=>onChange(item.id,{...d,notes:v})} placeholder="Describe what you see…" minHeight={80}/>
            <div className="photos-row" style={{marginTop:12}}>
              <PhotoSlot label="📸 Before" photos={d.photosBefore||[]}
                onAdd={src=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosBefore:[...(cur.photosBefore||[]),src]});}}
                onAddBatch={srcs=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosBefore:[...(cur.photosBefore||[]),...srcs]});}}
                onRemove={i=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosBefore:(cur.photosBefore||[]).filter((_,j)=>j!==i)});}}
                onView={setLightbox}/>
              <PhotoSlot label="✨ Vision" photos={d.photosVision||[]}
                onAdd={src=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosVision:[...(cur.photosVision||[]),src]});}}
                onAddBatch={srcs=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosVision:[...(cur.photosVision||[]),...srcs]});}}
                onRemove={i=>{const cur=(mergedRef.current[cat.id]||{})[item.id]||{};onChange(item.id,{...cur,photosVision:(cur.photosVision||[]).filter((_,j)=>j!==i)});}}

            </div>

            {items.map((it,i)=>{
              const filled=!!((data[cat.id]||{})[it.id]?.status||(data[cat.id]||{})[it.id]?.notes);

function Swipeable({children,onLeft,onRight}){

         onTouchEnd={e=>{if(startX.current===null)return;const dx=e.changedTouches[0].clientX-startX.current;if(Math.abs(dx)>50)dx<0?onLeft():onRight();startX.current=null;}}>

// ── VideoSection ─────────────────────────────────────────────────────
function VideoSection({propId,videos,onChange,uploadedBy}){
  const[progress,setProgress]=React.useState(null);
  const[err,setErr]=React.useState('');
  const inputRef=React.useRef();

  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    if(file.size>200*1024*1024){setErr('Video must be under 200 MB.');return;}
    setErr('');setProgress(0);
    try{
      const storage=firebase.storage();
      const ref=storage.ref(`projects/${propId}/videos/${uid()}_${file.name}`);
      const task=ref.put(file);
      task.on('state_changed',snap=>{
        setProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100));
      });
      await task;
      const url=await ref.getDownloadURL();
      const entry={url,name:file.name,uploadedBy,uploadedAt:Date.now()};
      onChange([...(videos||[]),entry]);
    }catch(ex){setErr('Upload failed: '+ex.message);}
    setProgress(null);
  }

  return(
    <div>
      {(videos||[]).map((v,i)=>(
        <div key={i} className="video-item">
          <video src={v.url} controls playsInline/>
          <div className="video-item-footer">
            <span className="video-item-meta">📹 {v.name} · {v.uploadedBy}</span>
            <button className="video-del-btn" onClick={()=>onChange((videos||[]).filter((_,idx)=>idx!==i))}>🗑</button>
          </div>
        </div>
      ))}
      {progress!==null&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12,color:'#1d4ed8',marginBottom:4}}>Uploading… {progress}%</div>
          <div className="video-progress"><div className="video-progress-fill" style={{width:progress+'%'}}/></div>
        </div>
      )}
      {err&&<div style={{fontSize:12,color:'#dc3545',marginBottom:8}}>⚠️ {err}</div>}
      <div className="video-upload-btn" onClick={()=>inputRef.current.click()}>
        <span>🎥</span>
        <span>Tap to upload a walkthrough video</span>
      </div>
      <input ref={inputRef} type="file" accept="video/*" style={{display:'none'}} onChange={handleFile}/>
    </div>
  );
}

// ── VideoAnalyzer ────────────────────────────────────────────────────
function VideoAnalyzer({onApply,onClose,isOwner}){
  const[step,setStep]=React.useState('pick'); // pick|extracting|analyzing|review
  const[progress,setProgress]=React.useState(0);
  const[statusMsg,setStatusMsg]=React.useState('');
  const[result,setResult]=React.useState(null);
  const[err,setErr]=React.useState('');
  const[keyInput,setKeyInput]=React.useState('');
  const[savingKey,setSavingKey]=React.useState(false);
  const inputRef=React.useRef();

  async function saveKey(){
    if(!keyInput.trim())return;
    setSavingKey(true);
    await dbSet('config/geminiKey',keyInput.trim());
    setSavingKey(false); setErr(''); setKeyInput('');
  }

  async function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    setErr('');
    try{
      setStep('extracting'); setStatusMsg('Extracting frames…'); setProgress(20);
      const frames=await extractVideoFrames(file,8);
      setStep('analyzing'); setStatusMsg(`Analyzing ${frames.length} frames with AI…`); setProgress(55);
      const ai=await callGemini(frames);
      setProgress(100); setResult(ai); setStep('review');
    }catch(ex){
      if(ex.message==='NO_KEY'){
        setErr('NO_KEY'); setStep('pick');
      } else {
        setErr(ex.message); setStep('pick');
      }
    }
  }

  // Flatten result into display items
  function getItems(){
    if(!result)return[];
    const items=[];
    CATEGORIES.forEach(cat=>{
      const catData=result[cat.id]||{};
      cat.items.forEach(item=>{
        const note=catData[item.id];
        if(note) items.push({catLabel:cat.label,catIcon:cat.icon,itemLabel:item.label,note,catId:cat.id,itemId:item.id});
      });
    });
    return items;
  }

  const items=getItems();

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <h2>🤖 AI Scope of Work</h2>

        {step==='pick'&&(
          <>
            <div className="ai-step">
              <div className="ai-icon">🎥</div>
              <p>Upload a walkthrough video and AI will automatically fill in your scope of work checklist based on what it sees.</p>
            </div>
            {err==='NO_KEY'?(
              <div style={{background:'#fff8e6',border:'1px solid #f59e0b',borderRadius:10,padding:14,marginBottom:14}}>
                <p style={{fontSize:13,fontWeight:700,color:'#b8860b',marginBottom:8}}>⚠️ Gemini API key not set</p>
                {isOwner?(
                  <>
                    <p style={{fontSize:12,color:'#666',marginBottom:10}}>Get a free key at <strong>aistudio.google.com</strong> → Get API Key</p>
                    <div className="invite-input-row">

                      <button className="btn-sms" onClick={saveKey} disabled={savingKey}>{savingKey?'…':'Save'}</button>
                    </div>
                  </>
                ):(
                  <p style={{fontSize:12,color:'#666'}}>Ask the project owner to add the Gemini API key in Settings.</p>
                )}
              </div>
            ):err?(
              <div style={{fontSize:12,color:'#dc3545',marginBottom:12,lineHeight:1.5}}>⚠️ {err}</div>
            ):null}
            <button className="ai-analyze-btn" onClick={()=>inputRef.current.click()}>Choose Video to Analyze</button>

            <button className="btn-secondary" style={{width:'100%'}} onClick={onClose}>Cancel</button>
          </>
        )}

        {(step==='extracting'||step==='analyzing')&&(
          <div className="ai-step">
            <div className="ai-icon">⏳</div>
            <div className="ai-progress">
              <div className="ai-progress-bar"><div className="ai-progress-fill" style={{width:progress+'%'}}/></div>
              <div className="ai-progress-label">{statusMsg}</div>
            </div>
            <p>This takes about 15–30 seconds.</p>
          </div>
        )}

        {step==='review'&&(
          <>
            <p style={{fontSize:13,color:'#555',marginBottom:14}}>
              Found <strong>{items.length} items</strong> that need work. Review below then tap Apply to fill your checklist.
            </p>
            {result?.summary?.overview&&(
              <div style={{background:'#f8f9fa',borderRadius:10,padding:12,marginBottom:14,fontSize:13,color:'#444',lineHeight:1.5}}>
                <strong>Overview:</strong> {result.summary.overview}
              </div>
            )}
            {items.map((it,i)=>(
              <div key={i} className="ai-result-item">
                <span className="ai-result-cat">{it.catIcon} {it.catLabel}</span>
                <div className="ai-result-text"><span className="ai-result-label">{it.itemLabel}:</span> {it.note}</div>
              </div>
            ))}
            {items.length===0&&<p style={{color:'#aaa',textAlign:'center'}}>No issues detected in this video.</p>}
            <div className="modal-btns" style={{marginTop:20}}>
              <button className="btn-primary" onClick={()=>{onApply(result);onClose();}}>✅ Apply to Scope ({items.length} items)</button>
              <button className="btn-secondary" onClick={onClose}>Cancel</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Report builder ───────────────────────────────────────────────────
function buildReport(prop,data){
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const sum=data._summary||{};
  const{done,total}=totalProgress(data);
  const prioritiesHtml=(sum.priorities||[]).filter(Boolean).map((p,i)=>
    `<tr><td style="width:32px;padding:5px 0"><div style="width:22px;height:22px;border-radius:50%;background:#f59e0b;color:#1a1a2e;font-size:11px;font-weight:800;text-align:center;line-height:22px">${i+1}</div></td><td style="padding:5px 0 5px 10px;font-size:14px;color:#333">${p}</td></tr>`
  ).join('');
  function photoGrid(arr,label){
    if(!arr?.length)return'';
    return`<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${label}</div><div style="display:flex;gap:8px;flex-wrap:wrap">${arr.map(p=>`<img src="${p}" style="width:180px;height:135px;object-fit:cover;border-radius:8px;border:1px solid #eee">`).join('')}</div></div>`;
  }
  let catSections='';
  CATEGORIES.forEach(cat=>{
    let rows='';
    cat.items.forEach(item=>{
      const d=(data[cat.id]||{})[item.id]||{};
      if(!d.status&&!d.notes&&!d.photosBefore?.length&&!d.photosVision?.length)return;
      const bg=STATUS_COLORS[d.status]||'#f5f5f5';
      const sl=STATUS_LABELS[d.status]||'—';
      const photos=(photoGrid(d.photosBefore,'📸 Before / Existing')+photoGrid(d.photosVision,'✨ Vision / Reference'));
      const stamp=d.updatedBy?`<div style="font-size:11px;color:#aaa;margin-top:8px">Updated by <strong>${d.updatedBy}</strong> · ${timeAgo(d.updatedAt)}</div>`:'';
      rows+=`<div style="break-inside:avoid;margin-bottom:12px;background:white;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafafa;border-bottom:1px solid #eee"><span style="font-weight:700;font-size:14px">${item.label}</span><span style="background:${bg};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${sl}</span></div>
        ${(d.notes||photos)?`<div style="padding:12px 14px">${d.notes?`<p style="font-size:13px;color:#333;line-height:1.6;margin:0">${d.notes.replace(/\n/g,'<br>')}</p>`:''}${photos}${stamp}</div>`:''}
      </div>`;
    });
    if(!rows)return;
    catSections+=`<div style="margin-bottom:30px;page-break-inside:avoid"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:3px solid #f59e0b"><span style="font-size:20px">${cat.icon}</span><h2 style="font-size:18px;font-weight:800;color:#1a1a2e;margin:0">${cat.label}</h2></div>${rows}</div>`;
  });
  // Summary photos section
  let summaryPhotos='';
  if(sum.photos?.length||sum.aiVision?.length||sum.floorPlan?.length){
    summaryPhotos=`<div style="margin-bottom:30px"><h2 style="font-size:18px;font-weight:800;color:#1a1a2e;margin:0 0 12px;padding-bottom:8px;border-bottom:3px solid #f59e0b">📸 Property Photos</h2>`;
    if(sum.photos?.length)summaryPhotos+=photoGrid(sum.photos,'Overview Photos');
    if(sum.aiVision?.length)summaryPhotos+=photoGrid(sum.aiVision,'AI Vision Renderings');
    if(sum.floorPlan?.length)summaryPhotos+=photoGrid(sum.floorPlan,'Floor Plan');
    summaryPhotos+=`</div>`;
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Scope of Work — ${prop.address||'Property'}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e}.page{max-width:860px;margin:0 auto;padding:24px 20px 60px}@media print{body{background:white}.page{padding:0}.no-print{display:none!important}.cover{page-break-after:always}}</style></head><body><div class="page">
<div class="no-print" style="text-align:right;margin-bottom:16px"><button onclick="window.print()" style="background:#1d4ed8;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer">🖨 Print / Save as PDF</button></div>
<div class="cover" style="background:linear-gradient(135deg,#1a1a2e,#1d4ed8);color:white;border-radius:16px;padding:40px;margin-bottom:24px">
  <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-bottom:12px">Scope of Work</div>
  <h1 style="font-size:28px;font-weight:900;margin-bottom:8px">${prop.address||'Property'}</h1>
  <div style="opacity:.6;font-size:14px;margin-bottom:24px">${prop.sqft?prop.sqft+' sq ft  ·  ':''}${date}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px">
    ${sum.budget?`<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Budget</div><div style="font-size:20px;font-weight:800">${sum.budget}</div></div>`:''}
    ${sum.timeline?`<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Timeline</div><div style="font-size:20px;font-weight:800">${sum.timeline}</div></div>`:''}
    <div style="background:rgba(245,158,11,.2);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Items Documented</div><div style="font-size:20px;font-weight:800">${done} / ${total}</div></div>
  </div>
  ${sum.overview?`<div style="background:rgba(255,255,255,.08);border-radius:10px;padding:16px;margin-top:20px"><p style="font-size:14px;line-height:1.7;opacity:.9">${sum.overview.replace(/\n/g,'<br>')}</p></div>`:''}
</div>
${prioritiesHtml?`<div style="background:white;border-radius:12px;padding:20px;margin-bottom:24px;border:1px solid #e8e8e8"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:12px">Top Priorities</div><table style="width:100%;border-collapse:collapse">${prioritiesHtml}</table></div>`:''}
<div style="border-top:3px solid #1a1a2e;margin-bottom:28px"></div>
${summaryPhotos}
${catSections||'<p style="color:#888;text-align:center;padding:40px">No items documented yet.</p>'}
</div></body></html>`;
}

// ── Invite Modal ─────────────────────────────────────────────────────
const INVITE_ROLES=['Member','GC','Realtor','Lender'];

function InviteModal({prop,properties,currentUser,onClose}){
  const[tab,setTab]=React.useState('sms');
  const[value,setValue]=React.useState('');
  const[role,setRole]=React.useState('Member');
  const[selectedPropId,setSelectedPropId]=React.useState(prop?.id||(properties?.[0]?.id||''));
  const[sent,setSent]=React.useState([]);
  const[teamMap,setTeamMap]=React.useState({});// uid→{name,email,role}
  const[propMembers,setPropMembers]=React.useState({});
  const[addedFromRoster,setAddedFromRoster]=React.useState({});
  const senderName=currentUser.displayName||currentUser.email;

  // resolve the active project object
  const activeProp=prop||(properties||[]).find(p=>p.id===selectedPropId)||null;

  // Build team from roster + all properties the owner has
  React.useEffect(()=>{
    let cancelled=false;
    async function load(){
      // Start with roster
      const rosterData=await dbGet(`roster/${currentUser.uid}`)||{};
      const merged={};
      Object.entries(rosterData).forEach(([id,m])=>{
        if(m.name&&id!==currentUser.uid) merged[id]=m;
      });
      // Also pull members from all properties this user owns
      const projectIds=await dbGet(`userProjects/${currentUser.uid}`)||{};
      await Promise.all(Object.keys(projectIds).map(async projId=>{
        const mems=await dbGet(`projects/${projId}/members`)||{};
        Object.entries(mems).forEach(([uid,m])=>{
          if(uid!==currentUser.uid&&m.name&&!merged[uid]){
            merged[uid]={id:uid,name:m.name,email:m.email||'',role:m.role||'Member'};
          }
        });
      }));
      if(!cancelled) setTeamMap(merged);
    }
    load();
    return()=>{cancelled=true;};
  },[currentUser.uid]);

  React.useEffect(()=>{
    if(!activeProp)return;
    return dbListen(`projects/${activeProp.id}/members`,d=>setPropMembers(d||{}));
  },[activeProp?.id]);

  async function addFromRoster(m){
    if(!activeProp)return;
    await dbSet(`projects/${activeProp.id}/members/${m.id}`,{name:m.name,email:m.email,role:m.role,addedAt:Date.now()});
    // Give them access on their home screen
    await dbSet(`userProjects/${m.id}/${activeProp.id}`,true);
    // Also save to roster so they appear in future
    await dbSet(`roster/${currentUser.uid}/${m.id}`,{id:m.id,name:m.name,email:m.email,role:m.role,addedAt:Date.now()});
    setAddedFromRoster(s=>({...s,[m.id]:true}));
    if(m.email){
      fetch('/.netlify/functions/notify-property-added',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({memberEmail:m.email,address:activeProp.address,adderName:senderName}),
      }).catch(e=>console.warn('notify failed:',e));
    }
  }

  const rosterList=Object.values(teamMap).sort((a,b)=>a.name.localeCompare(b.name));
  // Members already on this property (by uid key or by name)
  const alreadyOn=new Set([
    ...Object.keys(propMembers),
    ...Object.values(propMembers).map(m=>m.name),
  ]);

  async function generateInvite(){
    if(!activeProp)return null;
    const token=uid();
    await dbSet(`invites/${token}`,{
      projectId:activeProp.id, projectAddress:activeProp.address,
      createdBy:currentUser.uid, createdByName:senderName,
      role, createdAt:Date.now()
    });
    return token;
  }

  async function sendSMS(){
    const p=value.trim();if(!p||!activeProp)return;
    const token=await generateInvite();
    const link=`${window.location.origin}${window.location.pathname}?join=${token}`;
    const msg=`${senderName} invited you as ${role} to the Scope of Work for ${activeProp.address}. Tap to join: ${link}`;
    window.open(`sms:${p}${navigator.platform.includes('iPhone')?'&':'?'}body=${encodeURIComponent(msg)}`,'_self');
    setSent(s=>[...s,{type:'sms',to:p}]);setValue('');
  }

  async function sendEmail(){
    const e=value.trim();if(!e||!activeProp)return;
    const token=await generateInvite();
    const link=`${window.location.origin}${window.location.pathname}?join=${token}`;
    const subject=`You've been invited to join ${activeProp.address} on Zanco`;
    const body=`Hi,\n\n${senderName} has invited you as ${role} to the Scope of Work for ${activeProp.address}.\n\nTap the link below to create your account and join the project:\n${link}\n\nSee you on Zanco!`;
    window.open(`mailto:${e}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,'_self');
    setSent(s=>[...s,{type:'email',to:e}]);setValue('');
  }

  return(

// ── TasksPage ─────────────────────────────────────────────────────────
function TasksPage({propId,address,currentUser,members,inline}){
  const[tasks,setTasks]=React.useState({});
  const[filter,setFilter]=React.useState('all');
  const[drawerTask,setDrawerTask]=React.useState(null); // task object or 'new'
  const username=currentUser.displayName||currentUser.email;

  React.useEffect(()=>dbListen(`projects/${propId}/tasks`,t=>setTasks(t||{})),[propId]);

  const FILTERS=[{id:'all',label:'All'},{id:'todo',label:'To Do'},{id:'done',label:'Done'}];
  const memberList=Object.values(members||{}).sort((a,b)=>a.name.localeCompare(b.name));

  const list=Object.values(tasks)
    .filter(t=>filter==='all'||t.status===filter)
    .sort((a,b)=>{
      if(!!b.urgent!==!!a.urgent)return b.urgent?1:-1;
      if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
      if(a.dueDate)return -1;if(b.dueDate)return 1;
      return(a.createdAt-b.createdAt);
    });

  const counts={todo:0,done:0};
  Object.values(tasks).forEach(t=>{if(counts[t.status]!==undefined)counts[t.status]++;});

  function dueBadge(dueDate){
    if(!dueDate)return null;
    const today=new Date().toISOString().slice(0,10);
    const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
    if(dueDate<today)return<span className="task-due-overdue">⚠ Overdue</span>;
    if(dueDate===today)return<span className="task-due-overdue">Due today</span>;
    if(dueDate===tomorrow)return<span className="task-due-soon">Due tomorrow</span>;
    return<span className="task-due-ok">📅 {dueDate}</span>;
  }

  const inner=(
    <>
      {drawerTask&&(
        <TaskEditDrawer
          task={drawerTask==='new'?null:drawerTask}
          propId={propId}
          address={address}
          currentUser={currentUser}
          members={members}
          onClose={()=>setDrawerTask(null)}
        />
      )}
      <button className="task-add-fab" onClick={()=>setDrawerTask('new')}>＋ Add Task</button>
      <div className="tasks-filters">
        {FILTERS.map(f=>(
          <button key={f.id} className={`task-filter${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>
            {f.label}{f.id!=='all'&&counts[f.id]>0?` (${counts[f.id]})`:f.id==='all'&&Object.keys(tasks).length>0?` (${Object.keys(tasks).length})`:''}
          </button>
        ))}
      </div>
      {list.length===0&&<div className="tasks-empty">{Object.keys(tasks).length===0?'No tasks yet — tap Add Task to get started.':'No tasks in this filter.'}</div>}
      {list.length>1&&(
        <button onClick={async()=>{
          if(!confirm(`Mark all ${list.length} tasks as done?`)) return;
          await Promise.all(list.map(t=>dbRemove(`projects/${propId}/tasks/${t.id}`)));
        }} style={{width:'100%',background:'rgba(40,167,69,.1)',border:'1px solid rgba(40,167,69,.3)',borderRadius:10,padding:'9px',color:'#28a745',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:10}}>
          ✓ Mark all {list.length} tasks done
        </button>
      )}
      {list.map(task=>{
        const tagged=Object.keys(task.tagged||{});
        const photos=task.photos||[];
        return(
          <div key={task.id} className={`task-card status-${task.status}${task.urgent?' urgent':''}`}
            onClick={()=>setDrawerTask(task)}>
            <div className="task-card-top">
              <div className={`task-done-check${task.status==='done'?' checked':''}`}
                onClick={e=>{e.stopPropagation();/* handled in drawer */}}>
                {task.status==='done'&&'✓'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className={`task-title${task.status==='done'?' done':''}`}
                  style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {task.title||'Untitled task'}
                </div>
                <div className="task-meta">
                  {task.urgent&&<span className="task-urgent-pip"/>}
                  {task.assignedTo&&<span className="task-assignee">👤 {task.assignedTo}</span>}
                  {tagged.map(n=><span key={n} className="task-tag">@{n}</span>)}
                  {dueBadge(task.dueDate)}
                  {photos.length>0&&<span style={{fontSize:11,color:'#888'}}>📷 {photos.length}</span>}
                </div>
              </div>
              <span style={{fontSize:13,color:'#ccc',marginLeft:4}}>›</span>
            </div>
          </div>
        );
      })}
    </>
  );

  if(inline) return(
    <div className="summary-card" style={{marginBottom:16}}>
      <h3>✅ Tasks</h3>
      {inner}
    </div>
  );
  return <div className="tasks-page">{inner}</div>;
}

function ParticipantsPage({prop,data,currentUser,isOwner}){
  const[members,setMembers]=React.useState({});
  const[showInvite,setShowInvite]=React.useState(false);

  React.useEffect(()=>{
    return dbListen(`projects/${prop.id}/members`,v=>setMembers(v||{}));
  },[prop.id]);

  async function removeMember(uid){
    if(!window.confirm('Remove this team member from the project?'))return;
    await dbRemove(`projects/${prop.id}/members/${uid}`);
    await dbRemove(`userProjects/${uid}/${prop.id}`);
  }

  const activity=React.useMemo(()=>{
    const items=[];
    CATEGORIES.forEach(cat=>{
      cat.items.forEach(item=>{
        const d=(data[cat.id]||{})[item.id];
        if(d?.updatedAt&&d?.updatedBy)items.push({catLabel:cat.label,itemLabel:item.label,user:d.updatedBy,ts:d.updatedAt,status:d.status});
      });
    });
    return items.sort((a,b)=>b.ts-a.ts).slice(0,20);
  },[data]);

  return(
    <div className="participants-page">
      <div className="team-card">

          {isOwner&&<button className="btn-invite" onClick={()=>setShowInvite(true)}>+ Invite</button>}
