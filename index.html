        {Object.keys(members).length===0?(
          <div style={{padding:'20px 16px',color:'#aaa',fontSize:13,textAlign:'center'}}>No team members yet — invite someone!</div>
        ):Object.entries(members).map(([uid,m])=>(
          <div key={uid} className="member-row">
            <div className="member-avatar" style={{background:avatarColor(m.name)}}>{initials(m.name)}</div>
            <div className="member-info">
              <div className="member-name">
                {m.name}
                {uid===currentUser.uid&&<span className="badge-you">You</span>}
                {m.role==='owner'&&<span className="badge-owner">Owner</span>}
              </div>
              <div className="member-meta">{m.email}</div>
            </div>
            {isOwner&&uid!==currentUser.uid&&(
              <button className="btn-remove-member" onClick={()=>removeMember(uid)} title="Remove member">×</button>
            )}
          </div>
        ))}
      </div>

      <div className="activity-feed">
        <h3>Recent Activity</h3>
        {activity.length===0?(
          <div style={{padding:'16px',color:'#aaa',fontSize:13,textAlign:'center'}}>No activity yet</div>
        ):activity.map((a,i)=>(
          <div key={i} className="activity-item">
            <div style={{width:24,height:24,borderRadius:'50%',background:avatarColor(a.user),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'white',fontWeight:800,flexShrink:0}}>
              {initials(a.user)}
            </div>
            <div className="activity-text">
              <strong>{a.user}</strong> updated <strong>{a.catLabel} › {a.itemLabel}</strong>
              {a.status&&<span style={{marginLeft:6,background:STATUS_COLORS[a.status]||'#f0f0f0',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:600}}>{STATUS_LABELS[a.status]||a.status}</span>}
            </div>
            <div className="activity-time">{timeAgo(a.ts)}</div>
          </div>
        ))}
      </div>

      {showInvite&&<InviteModal prop={prop} currentUser={currentUser} onClose={()=>setShowInvite(false)}/>}
    </div>
  );
}

// ── Team Roster Modal ────────────────────────────────────────────────
function TeamModal({currentUser,onClose}){
  const[roster,setRoster]=React.useState(null);
  const[showAdd,setShowAdd]=React.useState(false);
  const[editingId,setEditingId]=React.useState(null);
  const[name,setName]=React.useState('');
  const[email,setEmail]=React.useState('');
  const[phone,setPhone]=React.useState('');
  const[role,setRole]=React.useState('Member');

  React.useEffect(()=>{
    return dbListen(`roster/${currentUser.uid}`,data=>setRoster(data||{}));
  },[currentUser.uid]);

  async function addMember(){
    if(!name.trim())return;
    const id=uid();
    await dbSet(`roster/${currentUser.uid}/${id}`,{id,name:name.trim(),email:email.trim(),phone:phone.trim(),role,addedAt:Date.now()});
    setName('');setEmail('');setPhone('');setRole('Member');setShowAdd(false);
  }

  function startEdit(m){
    setEditingId(m.id);setName(m.name);setEmail(m.email||'');setPhone(m.phone||'');setRole(m.role||'Member');setShowAdd(false);
  }

  async function cascadeName(targetId,newName,matchNames){
    // matchNames: array of strings to match against (old names + email variants)
    const projectIds=await dbGet(`userProjects/${currentUser.uid}`)||{};
    await Promise.all(Object.keys(projectIds).map(async projId=>{
      const [mems,tasks]=await Promise.all([
        dbGet(`projects/${projId}/members`)||{},
        dbGet(`projects/${projId}/tasks`)||{},
      ]);
      // Update member record — match by id or by any of the old names
      const memEntry=Object.entries(mems||{}).find(([uid,m])=>uid===targetId||matchNames.includes(m.name));
      if(memEntry) await dbSet(`projects/${projId}/members/${memEntry[0]}/name`,newName);
      // Update tasks
      await Promise.all(Object.entries(tasks||{})
        .filter(([,t])=>matchNames.includes(t.assignedTo))
        .map(([tid])=>dbSet(`projects/${projId}/tasks/${tid}/assignedTo`,newName))
      );
    }));
  }

  async function saveEdit(){
    if(!name.trim())return;
    const oldName=roster[editingId]?.name||'';
    const oldEmail=roster[editingId]?.email||'';
    const newName=name.trim();
    await dbSet(`roster/${currentUser.uid}/${editingId}`,{id:editingId,name:newName,email:email.trim(),phone:phone.trim(),role,addedAt:(roster[editingId]?.addedAt||Date.now())});
    // Match by old name AND old email (handles email-as-name case)
    const matchNames=[...new Set([oldName,oldEmail].filter(Boolean))];
    if(matchNames.length) await cascadeName(editingId,newName,matchNames);
    setEditingId(null);setName('');setEmail('');setPhone('');setRole('Member');
  }

  const[syncing,setSyncing]=React.useState(null);
  const[syncOldName,setSyncOldName]=React.useState('');
  async function syncTasks(m){
    const searchFor=syncOldName.trim()||m.email||'';
    if(!searchFor){setSyncOldName('__prompt__');return;}
    setSyncing(m.id);
    const matchNames=[...new Set([searchFor,m.email,m.name].filter(Boolean))];
    await cascadeName(m.id,m.name,matchNames);
    setSyncing(null);setSyncOldName('');
  }

  async function removeMember(id){
    await dbRemove(`roster/${currentUser.uid}/${id}`);
    if(editingId===id)setEditingId(null);
  }

  const members=Object.values(roster||{}).sort((a,b)=>a.name.localeCompare(b.name));
  const editForm=(id)=>(
    <div style={{padding:'12px',background:'#f8f9fa',borderRadius:10,marginTop:4}}>
      <div className="role-pills" style={{marginBottom:10}}>
        {INVITE_ROLES.map(r=><button key={r} className={`role-pill${role===r?' active':''}`} onClick={()=>setRole(r)}>{r}</button>)}
      </div>
      <div className="modal-field"><label>Name *</label><input autoFocus value={name} onChange={e=>setName(e.target.value)}/></div>
      <div className="modal-field"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)}/></div>
      <div className="modal-field"><label>Phone</label><input type="tel" value={phone} onChange={e=>setPhone(e.target.value)}/></div>
      <div className="modal-btns" style={{marginTop:8}}>
        <button className="btn-primary" onClick={id?saveEdit:addMember}>Save</button>
        <button className="btn-secondary" onClick={()=>{setEditingId(null);setShowAdd(false);}}>Cancel</button>
        {id&&<button className="btn-danger" style={{marginLeft:'auto'}} onClick={()=>removeMember(id)}>Delete</button>}
      </div>
      {id&&(
        <div style={{marginTop:10,padding:'10px 12px',background:'#fff3cd',borderRadius:8,border:'1px solid #ffc107'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#856404',marginBottom:6}}>↺ Rename tasks assigned to old name</div>
          <div style={{display:'flex',gap:6}}>
            <input value={syncOldName==='__prompt__'?'':syncOldName} onChange={e=>setSyncOldName(e.target.value)}
              placeholder="Old name or email on tasks…"
              style={{flex:1,border:'1px solid #ffc107',borderRadius:6,padding:'6px 10px',fontSize:13,background:'white'}}/>
            <button onClick={()=>syncTasks(roster[id])} disabled={!!syncing}
              style={{background:'#f59e0b',border:'none',borderRadius:6,color:'white',fontWeight:700,fontSize:13,padding:'6px 14px',cursor:'pointer',whiteSpace:'nowrap'}}>
              {syncing===id?'Syncing…':'Update'}
            </button>
          </div>
          {syncOldName==='__prompt__'&&<div style={{fontSize:11,color:'#856404',marginTop:4}}>Enter the old name/email that was on the tasks</div>}
        </div>
      )}
    </div>
  );

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>👥 My Team</h2>
        {members.length===0&&!showAdd&&<p style={{color:'#aaa',fontSize:13}}>No team members saved yet. Add people you work with regularly.</p>}
        {members.map(m=>(
          <div key={m.id}>
            <div className="roster-member" style={{cursor:'pointer'}} onClick={()=>editingId===m.id?setEditingId(null):startEdit(m)}>
              <div className="roster-avatar">{m.name[0].toUpperCase()}</div>
              <div className="roster-info">
                <div className="roster-name">{m.name}</div>
                <div className="roster-sub">{m.email}{m.phone?' · '+m.phone:''}</div>
              </div>
              <span className="roster-role-badge">{m.role}</span>
              <span style={{fontSize:13,color:'#bbb',marginLeft:4}}>✎</span>
            </div>
            {editingId===m.id&&editForm(m.id)}
          </div>
        ))}

        {showAdd?editForm(null):(
          <button className="btn-add-prop" style={{marginTop:14}} onClick={()=>{setShowAdd(true);setName('');setEmail('');setPhone('');setRole('Member');setEditingId(null);}}>＋ Add Team Member</button>
        )}

        <div className="modal-btns" style={{marginTop:16}}>
          <button className="btn-secondary" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

// ── Profile Modal ────────────────────────────────────────────────────
function ProfileModal({currentUser,onClose}){
  const[name,setName]=React.useState(currentUser.displayName||'');
  const[phone,setPhone]=React.useState('');
  const[title,setTitle]=React.useState('');
  const[company,setCompany]=React.useState('');
  const[saving,setSaving]=React.useState(false);
  const[saved,setSaved]=React.useState(false);

  React.useEffect(()=>{
    dbGet(`users/${currentUser.uid}/profile`).then(p=>{
      if(!p)return;
      if(p.phone)setPhone(p.phone);
      if(p.title)setTitle(p.title);
      if(p.company)setCompany(p.company);
    });
  },[currentUser.uid]);

  async function save(){
    if(!name.trim())return;
    setSaving(true);
    await getAuth().currentUser.updateProfile({displayName:name.trim()});
    await dbSet(`users/${currentUser.uid}/profile`,{name:name.trim(),phone:phone.trim(),title:title.trim(),company:company.trim(),updatedAt:Date.now()});
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>👤 My Profile</h2>

        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20,padding:'14px',background:'#f8f9fa',borderRadius:12}}>
          <div style={{width:54,height:54,borderRadius:'50%',background:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'white',flexShrink:0}}>
            {(name||currentUser.email||'?')[0].toUpperCase()}
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:'#1a1a2e'}}>{name||'(no name set)'}</div>
            <div style={{fontSize:12,color:'#888'}}>{currentUser.email}</div>
          </div>
        </div>

        <div className="modal-field"><label>Display Name *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your full name"/></div>
        <div className="modal-field"><label>Email</label><input value={currentUser.email} disabled style={{background:'#f5f5f5',color:'#aaa'}}/></div>
        <div className="modal-field"><label>Phone</label><input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1 (555) 000-0000"/></div>
        <div className="modal-field"><label>Title / Role</label><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Property Investor, GC, Realtor"/></div>
        <div className="modal-field"><label>Company</label><input value={company} onChange={e=>setCompany(e.target.value)} placeholder="e.g. ABC Real Estate LLC"/></div>

        <div className="modal-btns" style={{marginTop:16}}>
          <button className="btn-primary" onClick={save} disabled={saving}>
            {saving?'Saving…':saved?'✓ Saved!':'Save Profile'}
          </button>
          <button className="btn-secondary" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

  const[sqft,setSqft]=React.useState('');

  const[selected,setSelected]=React.useState({});// id→true
  const[notified,setNotified]=React.useState(false);

  React.useEffect(()=>{
    return dbListen(`roster/${currentUser.uid}`,data=>setRoster(data||{}));
  },[currentUser.uid]);

  function goToStep2(){if(!address.trim())return;setStep(2);}

  function toggle(id){setSelected(s=>s[id]?{...s,[id]:undefined}:{...s,[id]:true});}

    const prop={id:uid(),address:address.trim(),sqft:sqft.trim(),date,curBed,curBath,futBed,futBath,createdAt:Date.now()};

        }).catch(e=>console.warn('notify-property-added failed:',e));
      });
    }

    // Write assigned members to the project
    await Promise.all(assignedMembers.map(m=>
      dbSet(`projects/${prop.id}/members/${m.id}`,{name:m.name,email:m.email,role:m.role,addedAt:Date.now()})
    ));
    onAdd(prop);

  const members=Object.values(roster).sort((a,b)=>a.name.localeCompare(b.name));

  return(
    <div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>

      {step===1?(
        <>
          <h2>Add Property</h2><p>Enter the property details to start a new walkthrough.</p>
          <div className="modal-field"><label>Property Address *</label><input autoFocus placeholder="123 Main St, City, ST" value={address} onChange={e=>setAddress(e.target.value)} onKeyDown={e=>e.key==='Enter'&&goToStep2()}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="modal-field"><label>Total Sq Ft</label><input placeholder="e.g. 1,800" value={sqft} onChange={e=>setSqft(e.target.value)}/></div>
            <div className="modal-field"><label>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          </div>
          <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.5px',margin:'8px 0 4px'}}>Current Layout</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="modal-field"><label>Bedrooms</label><input type="number" min="0" placeholder="3" value={curBed} onChange={e=>setCurBed(e.target.value)}/></div>
            <div className="modal-field"><label>Bathrooms</label><input type="number" min="0" placeholder="1" value={curBath} onChange={e=>setCurBath(e.target.value)}/></div>
          </div>
          <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.5px',margin:'8px 0 4px'}}>Future Layout</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="modal-field"><label>Bedrooms</label><input type="number" min="0" placeholder="4" value={futBed} onChange={e=>setFutBed(e.target.value)}/></div>
            <div className="modal-field"><label>Bathrooms</label><input type="number" min="0" placeholder="2" value={futBath} onChange={e=>setFutBath(e.target.value)}/></div>

// ── Migration Modal ──────────────────────────────────────────────────
function MigrationModal({currentUser,onDone}){
  const[migrating,setMigrating]=React.useState(false);
  const[done,setDone]=React.useState(false);
  const[err,setErr]=React.useState('');
  const[progress,setProgress]=React.useState('');
  let oldProps=[];
  try{oldProps=JSON.parse(localStorage.getItem('flip_properties')||'[]');}catch{}

  // Firebase rejects undefined values — strip them by round-tripping through JSON
  const clean=obj=>JSON.parse(JSON.stringify(obj,(_,v)=>v===undefined?null:v));

  async function migrate(){
    setMigrating(true);setErr('');
    const myUid=currentUser.uid;
    const now=Date.now();
    try{
      for(const prop of oldProps){
        setProgress(`Importing ${prop.address}…`);
        const data=JSON.parse(localStorage.getItem(`flip_data_${prop.id}`)||'{}');
        const lightweight={};
        CATEGORIES.forEach(cat=>{
          if(!data[cat.id])return;
          lightweight[cat.id]={};
          Object.entries(data[cat.id]).forEach(([k,v])=>{
            lightweight[cat.id][k]={status:v.status,notes:v.notes,updatedAt:v.updatedAt,updatedBy:v.updatedBy};
          });
        });
        if(data._summary){
          lightweight._summary={overview:data._summary.overview,priorities:data._summary.priorities,budget:data._summary.budget,timeline:data._summary.timeline};
        }
        // Write all paths for this property in parallel
        await Promise.all([
          dbSet(`projects/${prop.id}/meta`,clean({...prop,ownerId:myUid,ownerName:currentUser.displayName||currentUser.email,updatedAt:now})),
          dbSet(`projects/${prop.id}/members/${myUid}`,clean({name:currentUser.displayName||currentUser.email,email:currentUser.email,role:'owner',addedAt:now})),
          dbSet(`userProjects/${myUid}/${prop.id}`,true),
          Object.keys(lightweight).length ? dbSet(`projects/${prop.id}/data`,clean(lightweight)) : Promise.resolve(),
        ]);
      }
      setProgress('');
      localStorage.removeItem('flip_properties');
      oldProps.forEach(p=>localStorage.removeItem(`flip_data_${p.id}`));
      setMigrating(false);setDone(true);
    }catch(e){
      setProgress('');
      setErr('Error: '+e.message+' — Check that your Firebase Database rules allow writes (see the Rebuild Guide).');
      setMigrating(false);
    }
  }

  if(done)return(
    <div className="modal-overlay"><div className="modal">
      <h2>✅ Migration Complete</h2>
      <p>{oldProps.length} {oldProps.length===1?'property':'properties'} imported to your account successfully.</p>
      <div className="modal-btns"><button className="btn-primary" onClick={onDone}>Continue to App</button></div>
    </div></div>
  );

  return(
    <div className="modal-overlay"><div className="modal">
      <h2>📦 Import Existing Data</h2>
      <p>We found {oldProps.length} {oldProps.length===1?'property':'properties'} saved locally. Checklists, notes, and project details will be imported. Photos stay on this device (re-upload from the app to share with your team).</p>
      {oldProps.map(p=><div key={p.id} className="migration-item">🏠 {p.address}</div>)}
      {progress&&<div style={{fontSize:13,color:'#1d4ed8',margin:'10px 0'}}>⏳ {progress}</div>}
      {err&&<div style={{fontSize:12,color:'#dc3545',margin:'10px 0',lineHeight:1.5}}>⚠️ {err}</div>}
      <div className="modal-btns" style={{marginTop:16}}>
        <button className="btn-primary" onClick={migrate} disabled={migrating}>{migrating?'Importing…':'Import to My Account'}</button>
        <button className="btn-secondary" onClick={onDone}>Skip</button>
      </div>
    </div></div>
  );
}

function PropBudgetBar({propId}){
  const[b,setB]=React.useState(null);
  React.useEffect(()=>dbListen(`projects/${propId}/budget`,v=>setB(v||null)),[propId]);
  if(!b||!b.totalBudget)return null;
  const total=parseFloat(b.totalBudget)||0;
  const gcSpent=Object.values(b.gcPayments||{}).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const extraSpent=Object.values(b.extraPayments||{}).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const spent=gcSpent+extraSpent+(parseFloat(b.materialsSpent)||0);
  const pct=Math.min(100,Math.round((spent/total)*100));
  const remaining=total-spent;
  const fillColor=remaining<0?'#dc3545':pct>90?'#d4a017':'#4ade80';
  const fmt=n=>'$'+Math.round(n).toLocaleString();
  return(
    <div className="prop-budget-bar">
      <div className="prop-budget-track">
        <div className="prop-budget-fill" style={{width:pct+'%',background:fillColor}}/>
      </div>
      <div className="prop-budget-nums">
        <span>Budget: <strong>{fmt(total)}</strong></span>
        <span>Spent: <strong>{fmt(spent)}</strong></span>
        <span style={{color:remaining<0?'#f87171':'rgba(255,255,255,.55)'}}>
          {remaining<0?<strong>Over {fmt(Math.abs(remaining))}</strong>:<><strong>{fmt(remaining)}</strong> left</>}
        </span>
      </div>
    </div>
  );
}

function BudgetSection({propId}){
  const base=`projects/${propId}/budget`;
  const[totalBudget,setTotalBudget]=React.useState('');
  const[gcBudget,setGcBudget]=React.useState('');
  const[gcPayments,setGcPayments]=React.useState({});
  const[extraPayments,setExtraPayments]=React.useState({});
  const[materialsSpent,setMaterialsSpent]=React.useState('');
  const[otherSpent,setOtherSpent]=React.useState('');
  const[startDate,setStartDate]=React.useState('');
  const[endDate,setEndDate]=React.useState('');
  const[sheetId,setSheetId]=React.useState('');
  const[sheetTab,setSheetTab]=React.useState('');
  const[lastSync,setLastSync]=React.useState(null);
  const[syncing,setSyncing]=React.useState(false);
  const[syncError,setSyncError]=React.useState('');
  const[showSync,setShowSync]=React.useState(false);

  React.useEffect(()=>{
    return dbListen(base,b=>{
      if(!b)return;
      setTotalBudget(b.totalBudget||'');
      setGcBudget(b.gcBudget||'');
      setGcPayments(b.gcPayments||{});
      setExtraPayments(b.extraPayments||{});
      setMaterialsSpent(b.materialsSpent||'');
      setOtherSpent(b.otherSpent||'');
      setStartDate(b.startDate||'');
      setEndDate(b.endDate||'');
      setSheetId(b.sheetId||'');
      setSheetTab(b.sheetTab||'');
      setLastSync(b.lastSync||null);
    });
  },[propId]);

  const fmt=n=>(!n&&n!==0)?'—':'$'+Number(n).toLocaleString();
  const sumPayments=p=>Object.values(p||{}).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);

  const gcList=Object.values(gcPayments).sort((a,b)=>(a.id||'').localeCompare(b.id||''));
  const extraList=Object.values(extraPayments).sort((a,b)=>(a.id||'').localeCompare(b.id||''));
  const laborSpent=sumPayments(gcPayments)+sumPayments(extraPayments);
  const matSpent=parseFloat(materialsSpent)||0;
  const otherSpentNum=parseFloat(otherSpent)||0;
  const totalSpent=laborSpent+matSpent+otherSpentNum;
  const budget=parseFloat(totalBudget)||0;
  const remaining=budget-totalSpent;
  const remCls=remaining<0?'budget-remaining-over':remaining<budget*0.1?'budget-remaining-warn':'budget-remaining-ok';

  // schedule calcs
  const today=new Date(); today.setHours(0,0,0,0);
  const end=endDate?new Date(endDate+'T00:00:00'):null;
  const start=startDate?new Date(startDate+'T00:00:00'):null;
  const daysLeft=end?Math.ceil((end-today)/(1000*60*60*24)):null;
  const totalDays=(start&&end)?Math.ceil((end-start)/(1000*60*60*24)):null;
  const elapsedDays=(start&&end)?Math.ceil((today-start)/(1000*60*60*24)):null;
  const schedulePct=totalDays>0?Math.min(100,Math.max(0,Math.round((elapsedDays/totalDays)*100))):0;

  // donut chart
  function DonutChart(){
    const r=38, cx=50, cy=50, circ=2*Math.PI*r;
    const hasData=budget>0||totalSpent>0;
    if(!hasData) return(
      <svg viewBox="0 0 100 100" width="110" height="110">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0f0f0" strokeWidth="14"/>
        <text x="50" y="54" textAnchor="middle" fontSize="10" fill="#bbb">No data</text>
      </svg>
    );
    // segments: labor, materials, remaining (or over)
    const segs=[];
    const total=budget>0?budget:totalSpent;
    let offset=0;
    function addSeg(val,color){
      const pct=Math.min(val/total,1);
      const dash=pct*circ;
      segs.push({dash,offset,color});
      offset+=dash;
    }
    if(laborSpent>0) addSeg(laborSpent,'#1d4ed8');
    if(matSpent>0) addSeg(matSpent,'#f59e0b');
    if(otherSpentNum>0) addSeg(otherSpentNum,'#28a745');
    if(remaining>0) addSeg(remaining,'#e8f0fb');
    if(remaining<0) addSeg(Math.abs(remaining),'#dc3545');

    const pctSpent=budget>0?Math.round((totalSpent/budget)*100):100;
    return(
      <svg viewBox="0 0 100 100" width="110" height="110" style={{transform:'rotate(-90deg)'}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0f0f0" strokeWidth="14"/>
        {segs.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth="14"
            strokeDasharray={`${s.dash} ${circ-s.dash}`}
            strokeDashoffset={-s.offset}/>
        ))}
        <text x="50" y="46" textAnchor="middle" fontSize="14" fontWeight="800" fill="#1a1a2e"
          style={{transform:'rotate(90deg)',transformOrigin:'50px 50px'}}>
          {pctSpent}%
        </text>
        <text x="50" y="60" textAnchor="middle" fontSize="8" fill="#888"
          style={{transform:'rotate(90deg)',transformOrigin:'50px 50px'}}>
          spent

    );
  }

  function BudgetField(){
    const[local,setLocal]=React.useState(totalBudget);

      <input className="budget-amount-input" type="number" min="0" placeholder="0"

          onChange={e=>dbUpdate(base,{[field]:e.target.value})}

      </div>
    );
  }

  return(
    <div className="summary-card" style={{marginBottom:12}}>
      <h3>💰 Project Budget</h3>

        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Total Project Budget</div>
          <div style={{fontSize:11,color:'#bbb'}}>All calculations flow from this</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{fontSize:16,fontWeight:700,color:'#888'}}>$</span>
          <BudgetField/>
        </div>

      {/* ── Chart + Schedule ── */}

        {/* Donut */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
          <DonutChart/>
          <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:6}}>

          <div className="budget-summary-row"><span>Materials</span><span style={{fontWeight:600}}>{fmt(matSpent)}</span></div>

                {remaining<0?`$${Math.abs(remaining).toLocaleString()} over budget`:`$${remaining.toLocaleString()} remaining`}

              <input placeholder="e.g. 1135 S Bell" value={sheetTab}

            <button disabled={!sheetId||!sheetTab||syncing} onClick={async()=>{
              setSyncing(true);setSyncError('');

              {syncing?'Syncing…':'⟳ Sync Now'}

              <pre style={{background:'#f0f0f0',borderRadius:6,padding:'8px',marginTop:6,fontSize:10,overflowX:'auto',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{`function onEdit(e) {
  if (e.source.getActiveSheet().getName() !== "${sheetTab||'YOUR TAB NAME'}") return;
  UrlFetchApp.fetch("https://zanco.netlify.app/.netlify/functions/sync-budget", {
    method: "post",
    contentType: "application/json",
    payload: JSON.stringify({
      propId: "${propId}",
      sheetId: "${sheetId||'YOUR SHEET ID'}",
      tabName: "${sheetTab||'YOUR TAB NAME'}"
    })
  });
}`}</pre>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TaskEditDrawer({task, propId, basePath: basePathProp, address, currentUser, members: membersProp, onClose}){
  const isNew=!task;
  const username=currentUser.displayName||currentUser.email;
  // basePath can be passed directly (for general tasks) or derived from propId
  const basePath=basePathProp||(propId?`projects/${propId}/tasks`:null);

  const[fetchedMembers,setFetchedMembers]=React.useState(null);
  React.useEffect(()=>{
    if(!membersProp){
      if(propId) dbGet(`projects/${propId}/members`).then(m=>setFetchedMembers(m||{}));
      else setFetchedMembers({});
    }
  },[propId,membersProp]);
  const membersObj=membersProp||(fetchedMembers||{});
  const memberList=React.useMemo(()=>Object.entries(membersObj).sort((a,b)=>a[1].name.localeCompare(b[1].name)),[membersObj]);

  const[t,setT]=React.useState(()=>task||{title:'',status:'todo',notes:'',assignedTo:'',tagged:{},urgent:false,dueDate:''});
  const[toast,setToast]=React.useState(false);
  const[saving,setSaving]=React.useState(false);
  const toastTimer=React.useRef(null);

  React.useEffect(()=>{if(task)setT(task);},[task]);

  async function save(patch){
    if(isNew)return;
    const updated={...t,...patch,updatedAt:Date.now(),updatedBy:username};
    setT(updated);
    await dbUpdate(`${basePath}/${task.id}`,{...patch,updatedAt:Date.now(),updatedBy:username});
  }

  async function create(){
    if(!t.title.trim())return;
    setSaving(true);
    const id=uid();
    const now=Date.now();
    await dbSet(`${basePath}/${id}`,{
      id,title:t.title.trim(),status:'todo',notes:t.notes||'',
      assignedTo:t.assignedTo||'',tagged:t.tagged||{},urgent:!!t.urgent,
      dueDate:t.dueDate||'',createdBy:username,createdAt:now,updatedAt:now,updatedBy:username,
    });
    if(t.assignedTo&&propId){
      const entry=memberList.find(([,m])=>m.name===t.assignedTo);
      if(entry) fetch('/.netlify/functions/notify-assignment',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({assigneeUid:entry[0],taskTitle:t.title,address,assignerName:username}),
      }).catch(()=>{});
    }
    onClose();
  }

  async function markDone(){
    await save({status:'done'});
    clearTimeout(toastTimer.current);
    setToast(true);
    toastTimer.current=setTimeout(async()=>{
      await dbRemove(`${basePath}/${task.id}`);
      setToast(false);onClose();
    },800);
  }

  async function undo(){
    clearTimeout(toastTimer.current);
    setToast(false);
    await save({status:'todo'});
  }

  async function deleteTask(){
    if(!window.confirm('Delete this task?'))return;
    await dbRemove(`${basePath}/${task.id}`);
    onClose();
  }

  async function addPhoto(file){
    const src=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async ev=>{try{res(await compressImage(ev.target.result));}catch(err){rej(err);}};
      r.onerror=rej;r.readAsDataURL(file);
    });
    const cur=isNew?t:(await dbGet(`${basePath}/${task.id}`))||t;
    const photos=[...(cur.photos||[]),src];
    if(isNew){setT(p=>({...p,photos}));}else{save({photos});}
  }

  function toggleTag(name){
    const tagged={...(t.tagged||{})};
    if(tagged[name])delete tagged[name];else tagged[name]=true;
    setT(p=>({...p,tagged}));
    if(!isNew)save({tagged});
  }

  function setAssignee(name){
    const newVal=t.assignedTo===name?'':name;
    setT(p=>({...p,assignedTo:newVal}));
    if(!isNew){
      save({assignedTo:newVal});
      if(newVal){
        const entry=memberList.find(([,m])=>m.name===newVal);
        if(entry) fetch('/.netlify/functions/notify-assignment',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({assigneeUid:entry[0],taskTitle:t.title,address,assignerName:username}),
        }).catch(()=>{});
      }
    }
  }

  const tagged=Object.keys(t.tagged||{});
  const photos=t.photos||[];

  return(
    <div className="task-drawer-overlay" onClick={onClose}>
      <div className="task-drawer" onClick={e=>e.stopPropagation()}>
        <div className="task-drawer-handle"/>
        <div className="task-drawer-header">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div className="task-drawer-prop">{isNew?'New Task':'📍 '+address}</div>
            <button
              onClick={()=>{const u=!t.urgent;setT(p=>({...p,urgent:u}));if(!isNew)save({urgent:u});}}
              style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:20,border:'2px solid',borderColor:t.urgent?'#dc3545':'#dde',background:t.urgent?'#dc3545':'white',color:t.urgent?'white':'#aaa',fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .15s'}}>
              ! {t.urgent?'Urgent':'Mark Urgent'}
            </button>
          </div>
          <input
            className="task-title-input"
            style={{fontSize:17,fontWeight:700,width:'100%',border:'none',outline:'none',padding:0,background:'transparent',color:'#1a1a2e'}}
            value={t.title||''}
            placeholder="Task title…"
            autoFocus={isNew}
            onChange={e=>setT(p=>({...p,title:e.target.value}))}
            onBlur={e=>{if(!isNew)save({title:e.target.value.trim()});}}
            onKeyDown={e=>e.key==='Enter'&&isNew&&create()}
          />
        </div>

        <div className="task-drawer-body">
          {toast&&(
            <div style={{background:'#d4edda',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
              <span style={{flex:1,fontSize:13,color:'#155724',fontWeight:600}}>✅ Marked as done</span>
              <button onClick={undo} style={{background:'none',border:'1.5px solid #155724',borderRadius:8,padding:'4px 10px',fontSize:12,fontWeight:700,color:'#155724',cursor:'pointer'}}>Undo</button>
            </div>
          )}

          {/* Assign to */}
          {memberList.length>0&&(
            <div className="drawer-section">
              <div className="drawer-field-label">Assign to</div>
              <div className="drawer-assignee-chips">
                {memberList.map(([,m])=>(
                  <button key={m.name} className={`drawer-assignee-chip${t.assignedTo===m.name?' on':''}`}
                    onClick={()=>setAssignee(m.name)}>
                    {t.assignedTo===m.name?'✓ ':''}{m.name}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Due date */}
          <div className="drawer-section">
            <div className="drawer-field-label">Due date</div>
            <input type="date" className="drawer-due-input"
              value={t.dueDate||''}
              onChange={e=>{setT(p=>({...p,dueDate:e.target.value}));if(!isNew)save({dueDate:e.target.value});}}
            />
          </div>

          {/* Tags */}
          {memberList.length>0&&(
            <div className="drawer-section">
              <div className="drawer-field-label">@ Tag for attention</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {memberList.map(([,m])=>{
                  const on=!!(t.tagged||{})[m.name];
                  return(
                    <button key={m.name} onClick={()=>toggleTag(m.name)}
                      style={{border:'2px solid',borderColor:on?'#856404':'#dde',borderRadius:20,padding:'5px 12px',fontSize:12,fontWeight:700,background:on?'#fff3cd':'white',color:on?'#856404':'#666',cursor:'pointer',transition:'all .15s'}}>
                      {on?'@ ':''}{m.name}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Notes */}
          <div className="drawer-section">
            <div className="drawer-field-label">Notes</div>
            <textarea className="notes-input" style={{width:'100%'}}
              value={t.notes||''}
              placeholder="Add notes…"
              onChange={e=>setT(p=>({...p,notes:e.target.value}))}
              onBlur={e=>{if(!isNew)save({notes:e.target.value});}}
            />
          </div>

          {/* Photos */}
          <div className="drawer-section">
            <div className="drawer-field-label">Photos</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
              {photos.map((src,i)=>(
                <div key={i} style={{position:'relative'}}>
                  <img src={src} style={{width:72,height:72,objectFit:'cover',borderRadius:10,border:'1px solid #eee'}}/>
                  <button onClick={()=>{
                    const p=photos.filter((_,j)=>j!==i);
                    setT(prev=>({...prev,photos:p}));
                    if(!isNew)save({photos:p});
                  }} style={{position:'absolute',top:-6,right:-6,background:'#dc3545',color:'white',border:'none',borderRadius:'50%',width:18,height:18,fontSize:11,cursor:'pointer',lineHeight:'18px',padding:0}}>×</button>
                </div>
              ))}
              <label style={{width:72,height:72,borderRadius:10,border:'2px dashed #dde',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#aaa',fontSize:22}}>
                +
                <input type="file" accept="image/*" multiple style={{display:'none'}}
                  onChange={e=>{Array.from(e.target.files).forEach(f=>addPhoto(f));e.target.value='';}}/>
              </label>
            </div>
          </div>

          {/* CTA */}
          {isNew?(
            <button onClick={create} disabled={saving||!t.title.trim()}
              style={{width:'100%',padding:'14px',background:t.title.trim()?'#1d4ed8':'#ccc',color:'white',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:t.title.trim()?'pointer':'default',marginBottom:8}}>
              {saving?'Adding…':'Add Task'}
            </button>
          ):(
            <>
              {t.status!=='done'?(
                <button onClick={markDone} style={{width:'100%',padding:'14px',background:'#1d4ed8',color:'white',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:8}}>
                  ✅ Mark as Done
                </button>
              ):(
                <div style={{textAlign:'center',padding:'12px',background:'#f0faf2',borderRadius:12,color:'#28a745',fontWeight:700,fontSize:14,marginBottom:8}}>✅ Completed</div>
              )}
              <div className="drawer-delete-row">
                <button className="drawer-delete-link" onClick={deleteTask}>Delete task</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function AllTasksPage({currentUser,properties,onOpenProp}){
  const[allTasks,setAllTasks]=React.useState({});
  const[allMembers,setAllMembers]=React.useState({});
  const[generalTasks,setGeneralTasks]=React.useState({});
  const[roster,setRoster]=React.useState({});
  const[loading,setLoading]=React.useState(true);
  const[editingTask,setEditingTask]=React.useState(null);
  const[addingForProp,setAddingForProp]=React.useState(null);
  const[showPropPicker,setShowPropPicker]=React.useState(false);
  const[addingGeneral,setAddingGeneral]=React.useState(false);
  const[editingGeneral,setEditingGeneral]=React.useState(null);

  const generalBasePath=`users/${currentUser.uid}/generalTasks`;

  React.useEffect(()=>{
    // listen to general tasks
    const unsub=dbListen(generalBasePath,t=>setGeneralTasks(t||{}));
    // fetch roster for assignee chips on general tasks
    dbGet(`roster/${currentUser.uid}`).then(r=>setRoster(r||{}));
    return unsub;
  },[currentUser.uid]);

  React.useEffect(()=>{
    if(!properties.length){setLoading(false);return;}
    const unsubs=[];
    let loaded=0;
    const result={};
    properties.forEach(prop=>{
      result[prop.id]={tasks:{},address:prop.address,stage:prop.stage||'walkthrough'};
      const unsub=dbListen(`projects/${prop.id}/tasks`,tasks=>{
        result[prop.id].tasks=tasks||{};
        setAllTasks(prev=>({...prev,[prop.id]:{...result[prop.id]}}));
        loaded++;
        if(loaded>=properties.length)setLoading(false);
      });
      unsubs.push(unsub);
      dbGet(`projects/${prop.id}/members`).then(m=>
        setAllMembers(prev=>({...prev,[prop.id]:m||{}}))
      );
    });
    return()=>unsubs.forEach(u=>u());
  },[properties]);

  if(loading)return<div className="spinner-page"><div className="spinner"/></div>;

  const stageBadgeColor={walkthrough:'#888',contract:'#5bbfb5',renovation:'#7aac5e'};

  // Build list: only props with open tasks
  const propsWithTasks=properties.map(prop=>{
    const entry=allTasks[prop.id]||{tasks:{},address:prop.address,stage:prop.stage||'walkthrough'};
    const open=Object.values(entry.tasks).filter(t=>t.status!=='done');
    return{...prop,openTasks:open};
  }).filter(p=>p.openTasks.length>0);

  const totalOpen=propsWithTasks.reduce((s,p)=>s+p.openTasks.length,0);

  function startAdd(){
    if(properties.length===1){setAddingForProp({propId:properties[0].id,address:properties[0].address});}
    else{setShowPropPicker(true);}
  }

  const openGeneralTasks=Object.values(generalTasks).filter(t=>t.status!=='done')
    .sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0)||(a.createdAt-b.createdAt));

  const generalSection=(
    <div className="all-tasks-prop" style={{marginBottom:16}}>
      <div className="all-tasks-prop-header" style={{cursor:'default'}}>
        <div style={{flex:1}}>
          <div className="all-tasks-prop-address">📋 General</div>
          <div style={{fontSize:12,color:'#888',fontWeight:600,marginTop:2}}>Not tied to a property</div>
        </div>
        <button onClick={()=>setAddingGeneral(true)}
          style={{background:'#1d4ed8',color:'white',border:'none',borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
          + Add
        </button>
      </div>
      {openGeneralTasks.length===0?(
        <div style={{padding:'10px 14px',color:'#bbb',fontSize:13}}>No general tasks yet.</div>
      ):openGeneralTasks.map(task=>(
        <div key={task.id} className={`all-tasks-row${task.urgent?' urgent':''}`}
          onClick={()=>setEditingGeneral(task)}>
          <button className={`all-tasks-urgent-btn${task.urgent?' on':''}`}
            onClick={e=>{e.stopPropagation();dbUpdate(`${generalBasePath}/${task.id}`,{urgent:!task.urgent,updatedAt:Date.now()});}}>!</button>
          <div className="all-tasks-dot" style={{background:task.urgent?'#dc3545':task.assignedTo?'#1d4ed8':'#ddd'}}/>
          <span className="all-tasks-title">{task.title}</span>
          {task.assignedTo&&<span className="all-tasks-assignee">👤 {task.assignedTo}</span>}
          <span style={{color:'#ccc',fontSize:14,flexShrink:0}}>✎</span>
        </div>
      ))}
    </div>
  );

  const pickerAndDrawer=(
    <>
      {editingTask&&(
        <TaskEditDrawer
          task={editingTask.task}
          propId={editingTask.propId}
          address={editingTask.address}
          currentUser={currentUser}
          members={allMembers[editingTask.propId]}
          onClose={()=>setEditingTask(null)}
        />
      )}
      {addingForProp&&(
        <TaskEditDrawer
          task={null}
          propId={addingForProp.propId}
          address={addingForProp.address}
          currentUser={currentUser}
          members={allMembers[addingForProp.propId]}
          onClose={()=>setAddingForProp(null)}
        />
      )}
      {addingGeneral&&(
        <TaskEditDrawer
          task={null}
          basePath={generalBasePath}
          address="General"
          currentUser={currentUser}
          members={roster}
          onClose={()=>setAddingGeneral(false)}
        />
      )}
      {editingGeneral&&(
        <TaskEditDrawer
          task={editingGeneral}
          basePath={generalBasePath}
          address="General"
          currentUser={currentUser}
          members={roster}
          onClose={()=>setEditingGeneral(null)}
        />
      )}
      {showPropPicker&&(
        <div className="modal-overlay" onClick={()=>setShowPropPicker(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h2>Add Task — Which Property?</h2>
            {properties.map(p=>(

            <button onClick={startAdd}
              style={{background:'#1d4ed8',color:'white',border:'none',borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
              + Add
            </button>
          </div>

            <div key={prop.id} className="all-tasks-prop">
              <div className="all-tasks-prop-header" onClick={()=>onOpenProp(prop)}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="all-tasks-prop-address">{prop.address}</div>
                  <div style={{fontSize:12,color:stageBadgeColor[prop.stage||'walkthrough'],fontWeight:600,marginTop:2}}>
                    {prop.stage==='contract'?'📝 Under Contract':prop.stage==='renovation'?'🔨 Renovation':'🔍 Walkthrough'}
                  </div>
                </div>
                <span className="all-tasks-prop-count">{prop.openTasks.length} open</span>
                <span style={{color:'#ccc',fontSize:16}}>›</span>
              </div>
              {prop.openTasks.sort((a,b)=>((b.urgent?1:0)-(a.urgent?1:0))).map(task=>(
                <div key={task.id} className={`all-tasks-row${task.urgent?' urgent':''}`} onClick={()=>setEditingTask({task,propId:prop.id,address:prop.address})}>
                  <button className={`all-tasks-urgent-btn${task.urgent?' on':''}`}
                    onClick={e=>{e.stopPropagation();dbUpdate(`projects/${prop.id}/tasks/${task.id}`,{urgent:!task.urgent,updatedAt:Date.now()});}}>!</button>
                  <div className="all-tasks-dot" style={{background:task.urgent?'#dc3545':task.assignedTo?'#1d4ed8':'#ddd'}}/>
                  <span className="all-tasks-title">{task.title}</span>
                  {task.assignedTo&&<span className="all-tasks-assignee">👤 {task.assignedTo}</span>}
                  <span style={{color:'#ccc',fontSize:14,flexShrink:0}}>✎</span>
                </div>
              ))}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function GlobalOwnerPage({currentUser}){
  const[tasks,setTasks]=React.useState({});
  const[notes,setNotes]=React.useState('');
  const[roster,setRoster]=React.useState({});
  const[drawerTask,setDrawerTask]=React.useState(null);
  const basePath=`users/${currentUser.uid}/privateTasks`;
  const notesPath=`users/${currentUser.uid}/privateNotes`;

  React.useEffect(()=>{
    const unsub=dbListen(basePath,t=>setTasks(t||{}));
    dbGet(notesPath).then(v=>setNotes(v||''));
    dbGet(`roster/${currentUser.uid}`).then(r=>setRoster(r||{}));
    return unsub;
  },[currentUser.uid]);

  const list=Object.values(tasks).sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0)||(a.createdAt||0)-(b.createdAt||0));
  const now=Date.now();
  function dueBadge(due){
    if(!due)return null;
    const d=new Date(due),diff=d-now;
    if(diff<0)return <span className="task-due-overdue">Overdue</span>;
    if(diff<172800000)return <span className="task-due-soon">{d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>;
    return <span style={{fontSize:11,color:'#aaa'}}>{d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>;
  }

  return(
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{background:'rgba(220,53,69,.08)',border:'1px solid rgba(220,53,69,.2)',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:18}}>🔒</span>
        <span style={{fontSize:13,color:'#c0392b',fontWeight:600}}>Private — only visible to you</span>
      </div>

      <div className="budget-section-title">Private Tasks</div>
      <button className="task-add-fab" onClick={()=>setDrawerTask('new')}>＋ Add Private Task</button>
      {list.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,.3)',fontSize:14,padding:'12px 0'}}>No private tasks yet</div>}
      {list.map(task=>(
        <div key={task.id} className="task-card" onClick={()=>setDrawerTask(task)}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px'}}>
            {task.urgent&&<span className="task-urgent-pip"/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,color:'#111',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{task.title}</div>
              {(task.assignedTo||task.dueDate)&&(
                <div style={{display:'flex',gap:8,marginTop:3,flexWrap:'wrap'}}>
                  {task.assignedTo&&<span style={{fontSize:12,color:'#555'}}>{task.assignedTo}</span>}
                  {dueBadge(task.dueDate)}
                </div>
              )}
            </div>
          </div>
        </div>
      ))}

      <div className="budget-section-title" style={{marginTop:20}}>Private Notes</div>
      <textarea
        value={notes}
        onChange={e=>setNotes(e.target.value)}
        onBlur={()=>dbSet(notesPath,notes)}
        placeholder="Employee info, sensitive notes, private details…"
        style={{width:'100%',minHeight:140,border:'1.5px solid #2a3a5e',borderRadius:10,padding:'10px 12px',fontSize:14,color:'rgba(255,255,255,.85)',background:'rgba(255,255,255,.05)',resize:'vertical',boxSizing:'border-box',fontFamily:'inherit',lineHeight:1.5}}
      />

      {drawerTask!==null&&(
        <TaskEditDrawer
          task={drawerTask==='new'?null:drawerTask}
          basePath={basePath}
          address="Private"
          currentUser={currentUser}
          members={roster}
          onClose={()=>setDrawerTask(null)}
        />
      )}
    </div>
  );
}

function KanbanCard({prop, onOpen, onMoveStage}){
  const[taskCount,setTaskCount]=React.useState(null);
  const[budget,setBudget]=React.useState(null);
  React.useEffect(()=>{
    dbGet(`projects/${prop.id}/tasks`).then(t=>setTaskCount(t?Object.values(t).filter(x=>x.status!=='done').length:0));
    dbGet(`projects/${prop.id}/budget`).then(b=>setBudget(b||null));
  },[prop.id]);

  const STAGES=['walkthrough','contract','renovation'];
  const stageIdx=STAGES.indexOf(prop.stage||'walkthrough');
  const nextStage=STAGES[stageIdx+1];
  const nextLabel=nextStage==='contract'?'Under Contract':nextStage==='renovation'?'Renovation':null;

  const sumPay=obj=>obj?Object.values(obj).reduce((s,p)=>s+(parseFloat(p.amount)||0),0):0;
  const totalBudget=parseFloat(budget?.totalBudget)||0;
  const laborSpent=sumPay(budget?.gcPayments)+sumPay(budget?.extraPayments);
  const matSpent=parseFloat(budget?.materialsSpent)||0;
  const otherSpent=parseFloat(budget?.otherSpent)||0;
  const totalSpent=laborSpent+matSpent+otherSpent;
  const pct=totalBudget>0?totalSpent/totalBudget:0;
  const budgetChip=totalBudget>0?(
    pct>1?<span className="kanban-chip kanban-chip-over">⚠ Over budget</span>:
    pct>0.8?<span className="kanban-chip kanban-chip-warn">⚡ {Math.round(pct*100)}% spent</span>:
    totalSpent>0?<span className="kanban-chip kanban-chip-ok">✓ {Math.round(pct*100)}% spent</span>:null
  ):null;

  return(
    <div className="kanban-card" onClick={()=>onOpen(prop)}>
      <div className="kanban-card-address">{prop.address}</div>
      <div className="kanban-card-date">{prop.date||new Date(prop.createdAt||Date.now()).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
      <div className="kanban-card-meta">
        {taskCount>0&&<span className="kanban-chip kanban-chip-tasks">✅ {taskCount} task{taskCount!==1?'s':''}</span>}
        {taskCount===0&&<span style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>No open tasks</span>}
        {budgetChip}
      </div>
      {nextLabel&&(
        <button className="kanban-move-btn" onClick={e=>{e.stopPropagation();onMoveStage(prop,nextStage);}}>
          Move to {nextLabel} →
        </button>
      )}
    </div>
  );
}

function KanbanView({properties, onOpen, onMoveStage}){
  const COLS=[
    {id:'walkthrough', icon:'🔍', label:'Walkthrough', bg:'rgba(30,50,90,0.7)'},

function SchedulePage({currentUser}){
  const today = new Date();
  const [year, setYear] = React.useState(today.getFullYear());
  const [month, setMonth] = React.useState(today.getMonth());
  const [events, setEvents] = React.useState([]);
  const [properties, setProperties] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(null); // 'YYYY-MM-DD'
  const [showAdd, setShowAdd] = React.useState(false);
  const [form, setForm] = React.useState({title:'', date:'', notes:'', propId:''});
  const [editId, setEditId] = React.useState(null);

  React.useEffect(()=>{
    return dbListen(`schedule/${currentUser.uid}`, val=>{
      if(!val) return setEvents([]);
      setEvents(Object.values(val).sort((a,b)=>a.date.localeCompare(b.date)));
    });
  },[currentUser.uid]);

  React.useEffect(()=>{
    return dbListen(`userProjects/${currentUser.uid}`, async ids=>{
      if(!ids){setProperties([]);return;}
      const list=await Promise.all(Object.keys(ids).map(id=>dbGet(`projects/${id}/meta`).then(m=>m?{id,...m}:null)));
      setProperties(list.filter(Boolean).sort((a,b)=>(a.address||'').localeCompare(b.address||'')));
    });
  },[currentUser.uid]);

  function pad(n){return String(n).padStart(2,'0');}
  function dateKey(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
  function firstDay(){return new Date(year,month,1).getDay();}
  function daysInMonth(){return new Date(year,month+1,0).getDate();}

  function calDays(){
    const days=[];
    for(let i=0;i<firstDay();i++) days.push(null);
    for(let i=1;i<=daysInMonth();i++) days.push(i);
    while(days.length%7!==0) days.push(null);
    return days;
  }

  function prevMonth(){if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);setSelectedDate(null);}
  function nextMonth(){if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);setSelectedDate(null);}

  const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];

  function eventsForDate(dk){ return events.filter(e=>e.date===dk); }

  function openAdd(dk){
    setForm({title:'',date:dk||selectedDate||dateKey(year,month,today.getDate()),notes:'',propId:''});
    setEditId(null);
    setShowAdd(true);
  }

  function openEdit(ev){
    setForm({title:ev.title||'',date:ev.date||'',notes:ev.notes||'',propId:ev.propId||''});
    setEditId(ev.id);
    setShowAdd(true);
  }

  async function save(){
    if(!form.title.trim()||!form.date) return;
    const id=editId||uid();
    const propAddress=properties.find(p=>p.id===form.propId)?.address||'';
    const eventData={id,title:form.title.trim(),date:form.date,notes:form.notes.trim(),propId:form.propId||null,propAddress:propAddress||null,createdAt:editId?(events.find(e=>e.id===editId)?.createdAt||Date.now()):Date.now()};
    const writes=[dbSet(`schedule/${currentUser.uid}/${id}`,eventData)];
    if(form.propId) writes.push(dbSet(`projects/${form.propId}/events/${id}`,eventData));
    // if propId changed on edit, remove from old project
    if(editId){
      const old=events.find(e=>e.id===editId);
      if(old?.propId&&old.propId!==form.propId) writes.push(dbRemove(`projects/${old.propId}/events/${id}`));
    }
    await Promise.all(writes);
    setShowAdd(false);setEditId(null);
  }

  async function del(id){
    if(!confirm('Delete this event?')) return;
    const ev=events.find(e=>e.id===id);
    const writes=[dbRemove(`schedule/${currentUser.uid}/${id}`)];
    if(ev?.propId) writes.push(dbRemove(`projects/${ev.propId}/events/${id}`));
    await Promise.all(writes);
  }

  const selectedEvents = selectedDate ? eventsForDate(selectedDate) : [];
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  const inputStyle={width:'100%',background:'rgba(0,0,0,.04)',border:'1px solid #e5e7eb',borderRadius:8,padding:'9px 12px',color:'#111',fontSize:14,boxSizing:'border-box'};
  const labelStyle={fontSize:12,fontWeight:600,color:'#666',marginBottom:4,display:'block'};

  return(
    <div style={{paddingBottom:90}}>
      {/* Google Calendar-style white card */}
      <div style={{margin:'12px 12px 0',background:'white',borderRadius:20,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,.25)'}}>

        {/* Month header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px 10px'}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:'#1a1a2e'}}>{MONTH_NAMES[month]}</div>
            <div style={{fontSize:13,color:'#888',marginTop:1}}>{year}</div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <button onClick={prevMonth} style={{background:'#f5f5f5',border:'none',borderRadius:10,width:36,height:36,color:'#444',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:300}}>‹</button>
            <button onClick={nextMonth} style={{background:'#f5f5f5',border:'none',borderRadius:10,width:36,height:36,color:'#444',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:300}}>›</button>
          </div>
        </div>

        {/* Day-of-week headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 8px',borderBottom:'1px solid #f0f0f0'}}>
          {DOW.map(d=>(
            <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:600,color:'#aaa',padding:'4px 0 8px',textTransform:'uppercase',letterSpacing:'.5px'}}>{d}</div>
          ))}
        </div>

        {/* Calendar grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {calDays().map((day,i)=>{
            if(!day) return <div key={i} style={{borderRight:'1px solid #f8f8f8',borderBottom:'1px solid #f8f8f8',minHeight:72}}/>;
            const dk=dateKey(year,month,day);
            const evs=eventsForDate(dk);
            const isToday=dk===todayKey;
            const isSelected=dk===selectedDate;
            return(
              <div key={i} onClick={()=>setSelectedDate(isSelected?null:dk)}
                style={{borderRight:'1px solid #f0f0f0',borderBottom:'1px solid #f0f0f0',minHeight:72,padding:'6px 4px 4px',cursor:'pointer',background:isSelected?'#fffbf0':'white',transition:'background .1s'}}>
                {/* Day number */}
                <div style={{display:'flex',justifyContent:'center',marginBottom:3}}>
                  <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:isToday?'#f59e0b':isSelected?'rgba(245,158,11,.15)':'transparent',color:isToday?'white':isSelected?'#f59e0b':'#333',fontSize:13,fontWeight:isToday?700:400}}>
                    {day}
                  </div>
                </div>
                {/* Event chips */}
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  {evs.slice(0,2).map((ev,j)=>(
                    <div key={j} style={{background:ev.propId?'#dbeafe':'#fef3c7',borderLeft:`3px solid ${ev.propId?'#3b82f6':'#f59e0b'}`,borderRadius:'0 4px 4px 0',padding:'1px 4px',fontSize:10,fontWeight:600,color:ev.propId?'#1d4ed8':'#92400e',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',lineHeight:1.5}}>
                      {ev.title}
                    </div>
                  ))}
                  {evs.length>2&&<div style={{fontSize:9,color:'#999',paddingLeft:4,fontWeight:600}}>+{evs.length-2} more</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Day detail / Upcoming section */}
      <div style={{padding:'16px 14px 0'}}>
        {selectedDate?(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:'white'}}>
                  {new Date(selectedDate+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
                </div>
                {selectedEvents.length>0&&<div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2}}>{selectedEvents.length} event{selectedEvents.length!==1?'s':''}</div>}
              </div>
              <button onClick={()=>openAdd(selectedDate)} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>+ Add</button>
            </div>
            {selectedEvents.length===0?(
              <div style={{textAlign:'center',padding:'28px 0',color:'rgba(255,255,255,.3)',fontSize:13}}>
                <div style={{fontSize:28,marginBottom:8}}>📅</div>
                Nothing scheduled — tap Add to create an event
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {selectedEvents.map(ev=>(
                  <div key={ev.id} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:14,padding:'14px 16px',display:'flex',alignItems:'flex-start',gap:12}}>
                    <div style={{width:4,alignSelf:'stretch',borderRadius:2,background:ev.propId?'#3b82f6':'#f59e0b',flexShrink:0,marginTop:2}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:'white'}}>{ev.title}</div>
                      {ev.propAddress&&<div style={{fontSize:12,color:'#60a5fa',fontWeight:600,marginTop:3}}>📍 {ev.propAddress}</div>}
                      {ev.notes&&<div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginTop:5,lineHeight:1.4}}>{ev.notes}</div>}
                    </div>
                    <div style={{display:'flex',gap:4,flexShrink:0}}>
                      <button onClick={()=>openEdit(ev)} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:8,padding:'6px 10px',color:'rgba(255,255,255,.6)',fontSize:12,cursor:'pointer'}}>Edit</button>
                      <button onClick={()=>del(ev.id)} style={{background:'rgba(239,68,68,.1)',border:'none',borderRadius:8,padding:'6px 10px',color:'#ef4444',fontSize:12,cursor:'pointer'}}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        ):(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.5px'}}>Upcoming Events</div>
              <button onClick={()=>openAdd(null)} style={{background:'#f59e0b',color:'#000',border:'none',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>+ Add Event</button>
            </div>
            {events.filter(e=>e.date>=todayKey).length===0?(
              <div style={{textAlign:'center',padding:'28px 0',color:'rgba(255,255,255,.3)',fontSize:13}}>
                <div style={{fontSize:28,marginBottom:8}}>📆</div>
                No upcoming events
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {events.filter(e=>e.date>=todayKey).slice(0,10).map(ev=>{
                  const d=new Date(ev.date+'T12:00');
                  const isToday=ev.date===todayKey;
                  return(
                    <div key={ev.id} onClick={()=>setSelectedDate(ev.date)} style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:14,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
                      <div style={{textAlign:'center',background:isToday?'#f59e0b':'rgba(255,255,255,.08)',borderRadius:12,padding:'6px 10px',flexShrink:0,minWidth:42}}>
                        <div style={{fontSize:18,fontWeight:800,color:isToday?'#000':'white',lineHeight:1}}>{d.getDate()}</div>
                        <div style={{fontSize:9,color:isToday?'#000':'rgba(255,255,255,.5)',fontWeight:700,textTransform:'uppercase',marginTop:1}}>{MONTH_NAMES[d.getMonth()].slice(0,3)}</div>
                      </div>
                      <div style={{width:3,alignSelf:'stretch',borderRadius:2,background:ev.propId?'#3b82f6':'#f59e0b',flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:600,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</div>
                        {ev.propAddress&&<div style={{fontSize:11,color:'#60a5fa',fontWeight:600,marginTop:2}}>📍 {ev.propAddress}</div>}
                        {ev.notes&&<div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.notes}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}
      </div>

      {/* Add / Edit modal */}
      {showAdd&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:9000,display:'flex',alignItems:'flex-end'}} onClick={()=>setShowAdd(false)}>
          <div style={{background:'white',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:500,padding:'24px 20px 40px'}} onClick={e=>e.stopPropagation()}>

              <h2 style={{fontSize:18,fontWeight:800,color:'#111',margin:0}}>{editId?'Edit Event':'New Event'}</h2>

            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={labelStyle}>Title</label>
                <input autoFocus value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&save()} placeholder="e.g. Door delivery, contractor walkthrough…" style={inputStyle}/>
              </div>
              <div>
                <label style={labelStyle}>Assign to Property</label>
                <select value={form.propId} onChange={e=>setForm(f=>({...f,propId:e.target.value}))} style={{...inputStyle,background:'white',color:form.propId?'#111':'#999'}}>

                  {properties.map(p=><option key={p.id} value={p.id}>{p.address}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Date</label>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inputStyle}/>
              </div>
              <div>
                <label style={labelStyle}>Notes</label>
                <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Optional details…" rows={3} style={{...inputStyle,resize:'vertical'}}/>
              </div>
            </div>
            <button onClick={save} disabled={!form.title.trim()||!form.date} style={{width:'100%',marginTop:20,background:'#f59e0b',color:'#000',border:'none',borderRadius:12,padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer',opacity:form.title.trim()&&form.date?1:.5}}>
              {editId?'Save Changes':'Add Event'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function RentalsPage({currentUser}){

  const [showAdd,setShowAdd]=React.useState(false);
  const [editingId,setEditingId]=React.useState(null);
  const [form,setForm]=React.useState({address:'',tenant:'',rent:'',leaseStart:'',leaseEnd:'',status:'occupied'});

  React.useEffect(()=>{
    return dbListen(`rentals/${currentUser.uid}`,val=>{
      if(!val) return setRentals([]);
      setRentals(Object.values(val).sort((a,b)=>a.createdAt-b.createdAt));
    });
  },[currentUser.uid]);

  function openAdd(){setForm({address:'',tenant:'',rent:'',leaseStart:'',leaseEnd:'',status:'occupied'});setEditingId(null);setShowAdd(true);}

  async function save(){
    const id=editingId||uid();
    await dbSet(`rentals/${currentUser.uid}/${id}`,{id,...form,rent:parseFloat(form.rent)||0,createdAt:editingId?(rentals.find(r=>r.id===editingId)?.createdAt||Date.now()):Date.now()});

function PropertyList({currentUser,onOpen}){
  const[properties,setProperties]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[showAdd,setShowAdd]=React.useState(false);
  const[showInvite,setShowInvite]=React.useState(false);
  const[showTeam,setShowTeam]=React.useState(false);
  const[showProfile,setShowProfile]=React.useState(false);
  const[deleteId,setDeleteId]=React.useState(null);
  const[showMigration,setShowMigration]=React.useState(false);
  const[notifBanner,setNotifBanner]=React.useState(false);
  const[homeTab,setHomeTab]=React.useState('properties'); // 'properties' | 'tasks' | 'owner'
  const[viewMode,setViewMode]=React.useState(()=>localStorage.getItem('zanco_view')||'list'); // 'list' | 'kanban'
  const[openTasksTotal,setOpenTasksTotal]=React.useState(null);
  const[portfolioBudget,setPortfolioBudget]=React.useState(0);
  const[search,setSearch]=React.useState('');
  const[fabOpen,setFabOpen]=React.useState(false);
  const[fabPropId,setFabPropId]=React.useState('');
  const[fabTitle,setFabTitle]=React.useState('');
  const[expandedIds,setExpandedIds]=React.useState(new Set());
  const[showMoreSheet,setShowMoreSheet]=React.useState(false);
  const[scheduleEvents,setScheduleEvents]=React.useState([]);
  React.useEffect(()=>{
    return dbListen(`schedule/${currentUser.uid}`,val=>{
      if(!val) return setScheduleEvents([]);
      setScheduleEvents(Object.values(val));
    });
  },[currentUser.uid]);
  function toggleExpand(id){setExpandedIds(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});}
  function toggleView(){setViewMode(v=>{const n=v==='list'?'kanban':'list';localStorage.setItem('zanco_view',n);return n;});}

  React.useEffect(()=>{
    if(!('Notification' in window)||VAPID_KEY.startsWith('REPLACE_'))return;
    if(Notification.permission==='default') setNotifBanner(true);
  },[]);

  async function enableNotifications(){
    setNotifBanner(false);
    await setupPushNotifications(currentUser.uid, currentUser.email);
  }

  React.useEffect(()=>{
    // Check if old local data exists
    const old=localStorage.getItem('flip_properties');
    if(old){try{const p=JSON.parse(old);if(p.length>0)setShowMigration(true);}catch{}}

    // Listen for user's project list
    const unsub=dbListen(`userProjects/${currentUser.uid}`,async ids=>{
      if(!ids){setProperties([]);setLoading(false);return;}
      const projectIds=Object.keys(ids);
      const metas=await Promise.all(projectIds.map(id=>dbGet(`projects/${id}/meta`)));
      const list=metas.filter(Boolean).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
      setProperties(list);setLoading(false);
    });
    return unsub;
  },[currentUser.uid]);

  React.useEffect(()=>{
    if(!properties.length){setOpenTasksTotal(0);setPortfolioBudget(0);return;}
    Promise.all(properties.map(p=>dbGet(`projects/${p.id}/tasks`))).then(allTasks=>{
      const count=allTasks.reduce((sum,tasks)=>sum+(tasks?Object.values(tasks).filter(t=>t.status!=='done').length:0),0);
      setOpenTasksTotal(count);
    });
    Promise.all(properties.map(p=>dbGet(`projects/${p.id}/budget`))).then(allBudgets=>{
      const total=allBudgets.reduce((sum,b)=>sum+(parseFloat(b?.totalBudget)||0),0);
      setPortfolioBudget(total);
    });
  },[properties]);

  async function fabAddTask(){
    const title=fabTitle.trim();
    if(!title||!fabPropId) return;
    const id=uid();
    const username=currentUser.displayName||currentUser.email?.split('@')[0]||'Unknown';
    await dbSet(`projects/${fabPropId}/tasks/${id}`,{id,title,status:'todo',notes:'',assignedTo:'',urgent:false,createdBy:username,createdAt:Date.now(),updatedAt:Date.now(),updatedBy:username});
    setFabTitle('');setFabOpen(false);
  }

  async function addProperty(prop){
    const meta={...prop,ownerId:currentUser.uid,ownerName:currentUser.displayName||currentUser.email,updatedAt:Date.now()};
    await dbSet(`projects/${prop.id}/meta`,meta);
    await dbSet(`projects/${prop.id}/members/${currentUser.uid}`,{
      name:currentUser.displayName||currentUser.email,email:currentUser.email,role:'owner',addedAt:Date.now()
    });
    await dbSet(`userProjects/${currentUser.uid}/${prop.id}`,true);
    setShowAdd(false);onOpen(meta);
  }

  async function deleteProperty(id){
    // Read members BEFORE removing so we can clean up userProjects
    const members=await dbGet(`projects/${id}/members`)||{};
    await Promise.all([
      dbRemove(`projects/${id}/meta`),
      dbRemove(`projects/${id}/data`),
      dbRemove(`projects/${id}/photos`),
      dbRemove(`projects/${id}/tasks`),
      dbRemove(`projects/${id}/budget`),
      dbRemove(`projects/${id}/events`),
      dbRemove(`projects/${id}/handoff`),
      dbRemove(`projects/${id}/aiPictures`),
      dbRemove(`projects/${id}/members`),
      dbRemove(`userProjects/${currentUser.uid}/${id}`),
      ...Object.keys(members).map(uid=>dbRemove(`userProjects/${uid}/${id}`)),
    ]);
    setDeleteId(null);
  }

  function signOut(){getAuth().signOut();}

  async function moveStage(prop, newStage){
    await dbUpdate(`projects/${prop.id}/meta`,{stage:newStage,updatedAt:Date.now()});
  }

  if(loading)return<div className="spinner-page"><div className="spinner"/></div>;

  const STAGES=[
    {id:'walkthrough', label:'Walkthroughs', sub:'Scoping & estimating', icon:'🔍', dot:'#5b8dd9'},
    {id:'contract',    label:'Under Contract', sub:'Deals signed, preparing to build', icon:'📝', dot:'#5bbfb5'},
    {id:'renovation',  label:'Renovation', sub:'Active projects under construction', icon:'🔨', dot:'#7aac5e'},
  ];

  function PropCard({prop}){
    const stage=prop.stage||'walkthrough';
    const s=STAGES.find(x=>x.id===stage)||STAGES[0];
    const dateStr=prop.date?new Date(prop.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    const expanded=expandedIds.has(prop.id);

    // Next 5 days events for this property
    const now=new Date();
    function pad2(n){return String(n).padStart(2,'0');}
    function dk(d){return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;}
    const todayDk=dk(now);
    const end=new Date(now); end.setDate(now.getDate()+4);
    const endDk=dk(end);
    const upcomingEvents=scheduleEvents
      .filter(e=>e.propId===prop.id&&e.date>=todayDk&&e.date<=endDk)
      .sort((a,b)=>a.date.localeCompare(b.date));
    return(
      <div className={`prop-card stage-${stage}`}>
        {/* Always-visible header row — click opens property */}
        <div className="prop-card-body" onClick={()=>onOpen(prop)} style={{cursor:'pointer'}}>
          <div className="prop-thumb">
            {stage==='renovation'?(
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ):stage==='contract'?(
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/><path d="M18 21l2-2-2-2" strokeWidth="1.2"/></svg>
            ):(
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><circle cx="15" cy="15" r="2"/></svg>
            )}
          </div>
          <div className="prop-info">
            <div className="prop-address">{prop.address}</div>
            <div className="prop-meta">
              <span style={{background:s.dot,width:6,height:6,borderRadius:3,display:'inline-block',marginRight:5,verticalAlign:'middle'}}/>
              {s.label}{prop.sqft?'  ·  '+prop.sqft+' sq ft':''}{dateStr?'  ·  '+dateStr:''}
            </div>

function ScopeOverviewPage({data,onOpenCat}){
  const[open,setOpen]=React.useState({});
  function toggle(id){setOpen(s=>({...s,[id]:!s[id]}));}
  function countReviewed(catId){
    const d=data[catId]||{};
    return Object.values(d).filter(v=>v&&v.status&&v.status!=='none').length;
  }
  return(
    <div className="content" style={{paddingTop:12}}>
      {CATEGORIES.map((cat,i)=>{
        const rev=countReviewed(cat.id);
        const total=cat.items.length;
        const isOpen=!!open[cat.id];
        return(
          <div key={cat.id} className="section-card" style={{marginBottom:10,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:14}}>
            <div className="section-header" onClick={()=>toggle(cat.id)} style={{padding:'14px 16px'}}>
              <span className="section-title" style={{color:'white',fontSize:15,fontWeight:700}}>
                {cat.icon} {cat.label}
              </span>
              {rev>0&&<span style={{fontSize:12,color:'rgba(255,255,255,.5)',marginRight:8}}>{rev}/{total}</span>}
              <span style={{color:'rgba(255,255,255,.4)',fontSize:18,lineHeight:1}}>{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen&&(
              <div style={{borderTop:'1px solid rgba(255,255,255,.08)',padding:'8px 0 4px'}}>
                {cat.items.map(item=>{
                  const d=(data[cat.id]||{})[item.id]||{};
                  const s=d.status;
                  const dot=s==='keep'?'#5bbfb5':s==='maybe'?'#f59e0b':s==='replace'?'#dc3545':'rgba(255,255,255,.2)';
                  return(
                    <div key={item.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0}}/>
                      <span style={{flex:1,fontSize:14,color:s?'white':'rgba(255,255,255,.5)'}}>{item.label}</span>
                      {d.notes&&<span style={{fontSize:12,color:'rgba(255,255,255,.35)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.notes}</span>}
                    </div>
                  );
                })}
                <div style={{padding:'10px 16px 6px'}}>
                  <button onClick={()=>onOpenCat(i)} style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:10,color:'white',padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                    Edit {cat.label} →
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function OwnerSection({propId, currentUser, members}){

  const[drawerTask,setDrawerTask]=React.useState(null);
  const basePath=`projects/${propId}/privateTasks`;
  const notesPath=`projects/${propId}/privateNotes`;

  React.useEffect(()=>{
    const unsub=dbListen(basePath,t=>setTasks(t||{}));
    dbGet(notesPath).then(v=>setNotes(v||''));

  },[propId]);

  const list=Object.values(tasks).sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0)||(a.createdAt||0)-(b.createdAt||0));

        <TaskEditDrawer
