<!DOCTYPE html>
<html lang="en">
<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

.list-page { max-width: 700px; margin: 0 auto; padding: 0 0 80px; }
.list-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 28px 20px 20px; }
.list-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.list-header p { font-size: 13px; opacity: .6; }
.list-header-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-header-sm { background: rgba(255,255,255,.12); border: none; color: white; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-header-sm:hover { background: rgba(255,255,255,.2); }
.list-content { padding: 16px; }
.prop-card { background: white; border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.08); cursor: pointer; transition: box-shadow .2s, transform .1s; }
.prop-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); transform: translateY(-1px); }
.prop-card-body { display: flex; align-items: center; gap: 14px; padding: 16px; }
.prop-thumb { width: 60px; height: 60px; border-radius: 10px; flex-shrink: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; font-size: 26px; position: relative; }
.prop-info { flex: 1; min-width: 0; }
.prop-address { font-size: 15px; font-weight: 700; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prop-meta { font-size: 12px; color: #888; margin-top: 3px; }
.prop-progress { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
.prop-progress-bar { flex: 1; height: 5px; background: #f0f0f0; border-radius: 100px; }
.prop-progress-fill { height: 5px; background: linear-gradient(90deg, #0f3460, #e2b04a); border-radius: 100px; }
.prop-progress-label { font-size: 11px; color: #aaa; white-space: nowrap; }
.prop-arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }
.prop-actions { display: flex; border-top: 1px solid #f5f5f5; }
.prop-action-btn { flex: 1; background: none; border: none; padding: 10px; font-size: 12px; font-weight: 600; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; }
.prop-action-btn:hover { background: #f8f8f8; color: #444; }
.prop-action-btn.danger:hover { color: #dc3545; background: #fff5f5; }
.btn-add-prop { width: 100%; background: white; border: 2px dashed #d0d0d0; border-radius: 14px; padding: 18px; font-size: 14px; font-weight: 700; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; }
.btn-add-prop:hover { border-color: #0f3460; color: #0f3460; background: #f4f7fb; }
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h2 { font-size: 18px; color: #666; margin-bottom: 6px; }
.notif-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff6b35; display: inline-block; flex-shrink: 0; }
.notif-badge { background: #ff6b35; color: white; border-radius: 10px; font-size: 10px; font-weight: 800; padding: 1px 6px; margin-left: 4px; display: inline-block; }

.app { max-width: 900px; margin: 0 auto; padding: 0 0 80px; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.btn-back { background: rgba(255,255,255,.12); border: none; color: white; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-back:hover { background: rgba(255,255,255,.2); }
.header-title { flex: 1; min-width: 0; }
.header-title h1 { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-title p { font-size: 11px; opacity: .6; margin-top: 1px; }
.btn-share { background: #e2b04a; color: #1a1a2e; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.btn-share:hover { background: #d4a03a; }

.sqft-bar { background: #0f3460; padding: 8px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.sqft-field { display: flex; align-items: center; gap: 6px; }
.sqft-field label { font-size: 10px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.sqft-field input { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 6px; padding: 4px 8px; color: white; font-size: 13px; width: 70px; }
.sqft-field input::placeholder { color: rgba(255,255,255,.3); }
.sqft-field input:focus { outline: none; border-color: #e2b04a; }
.sqft-divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); flex-shrink: 0; }
.sqft-group-label { font-size: 9px; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: .7px; }

.tabs { display: flex; overflow-x: auto; padding: 0 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 10px 14px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5); cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.tab.active { color: #e2b04a; border-bottom-color: #e2b04a; }
.tab:hover:not(.active) { color: rgba(255,255,255,.8); }
.tab-count { background: rgba(255,255,255,.15); border-radius: 10px; font-size: 10px; padding: 1px 5px; }
.tab.active .tab-count { background: rgba(226,176,74,.25); color: #e2b04a; }
.content { padding: 12px 12px 0; }

.section-card { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.section-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; }
.section-title { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
.quick-status { display: flex; gap: 5px; flex-shrink: 0; }
.qs-btn { border: none; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; opacity: .4; transition: opacity .15s, transform .1s; white-space: nowrap; }
.qs-btn.active { opacity: 1; }
.qs-btn:active { transform: scale(.93); }
.qs-keep { background: #d4edda; color: #155724; }
.qs-replace { background: #f8d7da; color: #721c24; }
.chevron { transition: transform .2s; font-size: 14px; color: #aaa; flex-shrink: 0; }
.chevron.open { transform: rotate(180deg); }
.section-body { border-top: 1px solid #f0f0f0; padding: 16px; }

.status-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.status-btn { padding: 5px 12px; border-radius: 20px; border: 2px solid #e0e0e0; font-size: 12px; font-weight: 600; cursor: pointer; background: white; transition: all .15s; }
.status-btn.sel-keep { border-color: #28a745; background: #d4edda; color: #155724; }
.status-btn.sel-replace { border-color: #dc3545; background: #f8d7da; color: #721c24; }

.notes-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.notes-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; color: #1a1a2e; transition: border-color .15s; }
.notes-input:focus { outline: none; border-color: #0f3460; }
.notes-input::placeholder { color: #bbb; }
.notes-row { display: flex; flex-direction: column; gap: 8px; }
.update-stamp { font-size: 11px; color: #aaa; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
.update-stamp strong { color: #888; }

.mic-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 700; background: #f0f2f5; color: #444; transition: all .2s; }
.mic-btn:hover { background: #e0e4eb; }
.mic-btn.recording { background: #dc3545; color: white; animation: pulse 1s infinite; }
.mic-btn.unsupported { opacity: .35; cursor: not-allowed; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,.4); } 50% { box-shadow: 0 0 0 10px rgba(220,53,69,0); } }
.recording-hint { font-size: 12px; color: #dc3545; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
.recording-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc3545; animation: blink .8s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }

.photos-section { margin-top: 14px; }
.photos-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.photo-slot { border: 2px dashed #ddd; border-radius: 10px; overflow: hidden; background: #fafafa; }
.photo-slot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; padding: 8px 10px 4px; display: flex; align-items: center; justify-content: space-between; }
.photo-slot-label .add-btns { display: flex; gap: 4px; }
.add-btn { background: #0f3460; color: white; border: none; border-radius: 5px; font-size: 10px; font-weight: 700; padding: 2px 7px; cursor: pointer; }
.add-btn.gold { background: #e2b04a; color: #1a1a2e; }
.photo-empty { display: flex; }
.photo-empty-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px 8px; gap: 4px; cursor: pointer; }
.photo-empty-half:first-child { border-right: 1px solid #eee; }
.photo-empty-icon { font-size: 22px; }
.photo-empty-text { font-size: 11px; color: #bbb; text-align: center; }
.photo-input { display: none; }
/* Carousel */
.photo-carousel { position: relative; background: #000; }
.carousel-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: pointer; }
.carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.45); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
.carousel-nav.prev { left: 6px; }
.carousel-nav.next { right: 6px; }
.carousel-footer { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px 7px; background: #fafafa; }
.carousel-dots { display: flex; gap: 4px; }
.carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; transition: background .15s; }
.carousel-dot.active { background: #0f3460; }
.carousel-count { font-size: 11px; color: #aaa; }
.carousel-del { background: none; border: none; color: #ccc; font-size: 15px; cursor: pointer; padding: 2px; }
.carousel-del:hover { color: #dc3545; }

.progress-bar-wrap { background: white; margin: 0 12px 10px; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
.progress-label span:last-child { font-weight: 700; color: #0f3460; }
.progress-track { background: #f0f0f0; border-radius: 100px; height: 8px; }
.progress-fill { background: linear-gradient(90deg, #0f3460, #e2b04a); border-radius: 100px; height: 8px; transition: width .4s; }

.summary-page { padding: 12px; }
.summary-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.summary-card h3 { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
.summary-textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; color: #1a1a2e; }
.summary-textarea:focus { outline: none; border-color: #0f3460; }
.summary-textarea::placeholder { color: #bbb; }
.priority-list { display: flex; flex-direction: column; gap: 6px; }
.priority-item { display: flex; gap: 8px; align-items: flex-start; }
.priority-item input[type=text] { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.priority-item input[type=text]:focus { outline: none; border-color: #0f3460; }
.priority-num { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; background: #e2b04a; color: #1a1a2e; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 8px; }
.priority-remove { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px; margin-top: 4px; }
.priority-remove:hover { color: #e55; }
.btn-add-priority { background: none; border: 2px dashed #ddd; border-radius: 8px; padding: 8px; font-size: 13px; color: #aaa; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-add-priority:hover { border-color: #0f3460; color: #0f3460; }
.budget-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.budget-field { display: flex; flex-direction: column; gap: 4px; }
.budget-field label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.budget-field input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.budget-field input:focus { outline: none; border-color: #0f3460; }

.participants-page { padding: 12px; }
.activity-feed { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 10px; }
.activity-feed h3 { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px 10px; border-bottom: 1px solid #f0f0f0; }
.activity-item { display: flex; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f8f8f8; align-items: flex-start; }
.activity-item:last-child { border-bottom: none; }
.activity-text { font-size: 13px; color: #444; line-height: 1.4; flex: 1; }
.activity-text strong { color: #1a1a2e; }
.activity-time { font-size: 11px; color: #bbb; white-space: nowrap; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal h2 { font-size: 18px; margin-bottom: 6px; }
.modal p { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.6; }
.modal-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.modal-field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.modal-field input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
.modal-field input:focus { outline: none; border-color: #0f3460; }
.modal-field small { font-size: 11px; color: #aaa; line-height: 1.4; }
.modal-btns { display: flex; gap: 10px; flex-direction: column; margin-top: 6px; }
.btn-primary { background: #0f3460; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-primary:hover { background: #0d2d52; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #f0f0f0; color: #444; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
.btn-secondary:hover { background: #e4e4e4; }
.btn-gold { background: #e2b04a; color: #1a1a2e; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-gold:hover { background: #d4a03a; }
.btn-danger { background: #dc3545; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.setup-step { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: #444; line-height: 1.5; }
.setup-step strong { color: #0f3460; }

.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 300; display: flex; align-items: center; justify-content: center; }
.lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: fixed; top: 16px; right: 16px; background: rgba(255,255,255,.15); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }

/* ── Auth ── */
.auth-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 70%); }
.auth-card { background: white; border-radius: 24px; padding: 36px 28px 28px; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,.4); }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo img { width: 72px; height: 72px; border-radius: 18px; }
.auth-logo h1 { font-size: 24px; font-weight: 900; color: #1a1a2e; margin-top: 10px; }
.auth-logo p { font-size: 13px; color: #aaa; margin-top: 4px; }
.auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.auth-field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .6px; }
.auth-field input { border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 13px 14px; font-size: 15px; font-family: inherit; color: #1a1a2e; transition: border-color .15s; }
.auth-field input:focus { outline: none; border-color: #0f3460; }
.auth-error { background: #fff5f5; color: #dc3545; border: 1px solid #f5c6cb; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; line-height: 1.5; }
.auth-switch { text-align: center; margin-top: 18px; font-size: 13px; color: #aaa; }
.auth-switch button { background: none; border: none; color: #0f3460; font-weight: 700; cursor: pointer; font-size: 13px; text-decoration: underline; }
.invite-banner { background: linear-gradient(135deg, #0f3460, #1a5276); color: white; border-radius: 14px; padding: 16px; margin-bottom: 22px; }
.invite-banner h3 { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
.invite-banner p { font-size: 13px; opacity: .8; line-height: 1.5; }

/* Spinner */
.spinner-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
.spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #0f3460; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Team / members */
.team-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.team-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid #f0f0f0; }
.team-card-header h3 { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.btn-invite { background: #0f3460; color: white; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-invite:hover { background: #0d2d52; }
.member-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f8f8f8; }
.member-row:last-child { border-bottom: none; }
.member-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; flex-shrink: 0; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 700; color: #1a1a2e; display: flex; align-items: center; gap: 5px; }
.member-meta { font-size: 11px; color: #aaa; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

function avatarColor(name){let h=0;for(let c of(name||'?'))h=c.charCodeAt(0)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function timeAgo(ts){if(!ts)return'';const d=(Date.now()-ts)/1000;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}

// ── Progress helpers ─────────────────────────────────────────────────
function countReviewed(data,catId){return Object.values(data[catId]||{}).filter(v=>v.status||v.notes).length;}
function totalProgress(data){
  const total=CATEGORIES.reduce((s,c)=>s+c.items.length,0);
  const done=CATEGORIES.reduce((s,c)=>s+countReviewed(data,c.id),0);
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function getViewed(propId,catId,itemId){return parseInt(localStorage.getItem(`v_${propId}_${catId}_${itemId}`)||'0');}
function markViewed(propId,catId,itemId){localStorage.setItem(`v_${propId}_${catId}_${itemId}`,Date.now().toString());}

// ── Image compression ─────────────────────────────────────────────────
function compressImage(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1200,Q=0.78;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',Q));
    };
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}

// ── Speech hook ──────────────────────────────────────────────────────
function useSpeech(onResult){
  const[recording,setRecording]=React.useState(false);
  const[interim,setInterim]=React.useState('');
  const[errMsg,setErrMsg]=React.useState('');
  const shouldRec=React.useRef(false);
  const onResultRef=React.useRef(onResult);
  React.useEffect(()=>{onResultRef.current=onResult;});
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const supported=!!SR;
  function startInstance(){
    if(!shouldRec.current)return;
    try{
      const rec=new SR();rec.lang='en-US';rec.interimResults=true;rec.maxAlternatives=1;
      rec.onresult=e=>{const last=e.results[e.results.length-1];if(last.isFinal){const t=last[0].transcript.trim();if(t)onResultRef.current(t);setInterim('');}else setInterim(last[0].transcript);};
      rec.onerror=e=>{setInterim('');if(e.error==='not-allowed'||e.error==='service-not-allowed'){setErrMsg('Mic blocked — allow microphone in browser settings.');shouldRec.current=false;setRecording(false);}};
      rec.onend=()=>{setInterim('');if(shouldRec.current)setTimeout(startInstance,100);else setRecording(false);};
      rec.start();
    }catch(e){setErrMsg('Could not start mic.');shouldRec.current=false;setRecording(false);}
  }
  async function start(){if(!supported)return;setErrMsg('');try{await navigator.mediaDevices.getUserMedia({audio:true});}catch{setErrMsg('Mic access denied.');return;}shouldRec.current=true;setRecording(true);startInstance();}
  function stop(){shouldRec.current=false;setRecording(false);setInterim('');}
  React.useEffect(()=>()=>{shouldRec.current=false;},[]);
  return{recording,interim,errMsg,toggle:()=>recording?stop():start(),supported};
}

// ── VoiceTextarea ────────────────────────────────────────────────────
function VoiceTextarea({value,onChange,placeholder,minHeight=100}){
  const{recording,interim,errMsg,toggle,supported}=useSpeech(t=>onChange((value?value+' ':'')+t));
  return(
    <div className="notes-row">
      <textarea className="summary-textarea" style={{minHeight}} placeholder={placeholder} value={value||''} onChange={e=>onChange(e.target.value)}/>
      <button className={`mic-btn${recording?' recording':''}${!supported?' unsupported':''}`} onClick={toggle} disabled={!supported}>
        {recording?'⏹ Stop Recording':'🎙 Tap to Speak'}
      </button>
      {recording&&<div className="recording-hint"><div className="recording-dot"/>{interim||'Listening…'}</div>}
      {errMsg&&<div style={{fontSize:12,color:'#dc3545',marginTop:6,background:'#fff5f5',borderRadius:8,padding:'8px 10px'}}>⚠️ {errMsg}</div>}
    </div>
  );
}

// ── PhotoSlot ────────────────────────────────────────────────────────
function PhotoSlot({label,photos,onAdd,onRemove,onView}){
  const[idx,setIdx]=React.useState(0);
  const cameraRef=React.useRef();const libraryRef=React.useRef();
  const startX=React.useRef(null);
  const has=photos&&photos.length>0;
  const safeIdx=has?Math.min(idx,photos.length-1):0;

  React.useEffect(()=>{if(has)setIdx(photos.length-1);},[photos.length]);

  async function handleFiles(e){
    for(const file of Array.from(e.target.files)){
      const r=new FileReader();
      await new Promise(res=>{r.onload=async ev=>{onAdd(await compressImage(ev.target.result));res();};r.readAsDataURL(file);});
    }
    e.target.value='';
  }
  function onTouchStart(e){startX.current=e.touches[0].clientX;}
  function onTouchEnd(e){
    if(startX.current===null)return;
    const dx=e.changedTouches[0].clientX-startX.current;
    if(dx<-40)setIdx(i=>Math.min(i+1,photos.length-1));
    else if(dx>40)setIdx(i=>Math.max(i-1,0));
    startX.current=null;
  }
  return(
    <div className="photo-slot">
      <div className="photo-slot-label">
        <span>{label}</span>
        <div className="add-btns">
          <button className="add-btn gold" onClick={()=>cameraRef.current.click()}>📷</button>
          <button className="add-btn" onClick={()=>libraryRef.current.click()}>+ Add</button>
        </div>
      </div>
      {!has?(
        <div className="photo-empty">
          <div className="photo-empty-half" onClick={()=>cameraRef.current.click()}><span className="photo-empty-icon">📷</span><span className="photo-empty-text">Take Photo</span></div>
          <div className="photo-empty-half" onClick={()=>libraryRef.current.click()}><span className="photo-empty-icon">🖼️</span><span className="photo-empty-text">Library</span></div>
        </div>
      ):(
        <div>
          <div className="photo-carousel" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            <img className="carousel-img" src={photos[safeIdx]} alt="" onClick={()=>onView(photos[safeIdx])}/>
            {photos.length>1&&<>
              <button className="carousel-nav prev" onClick={()=>setIdx(i=>Math.max(i-1,0))}>‹</button>
              <button className="carousel-nav next" onClick={()=>setIdx(i=>Math.min(i+1,photos.length-1))}>›</button>
            </>}
          </div>
          <div className="carousel-footer">
            <div className="carousel-dots">
              {photos.map((_,i)=><div key={i} className={`carousel-dot${i===safeIdx?' active':''}`}/>)}
            </div>
            <span className="carousel-count">{safeIdx+1} / {photos.length}</span>
            <button className="carousel-del" onClick={()=>{onRemove(safeIdx);setIdx(i=>Math.max(0,i-1));}}>🗑</button>
          </div>
        </div>
      )}
      <input ref={cameraRef} type="file" accept="image/*" capture="environment" className="photo-input" onChange={handleFiles}/>
      <input ref={libraryRef} type="file" accept="image/*" multiple className="photo-input" onChange={handleFiles}/>
    </div>
  );
}

// ── SectionCard ──────────────────────────────────────────────────────
function SectionCard({propId,item,catId,data,onChange,onView,isOpen,onToggle,username}){
  const d=data[item.id]||{};
  const hasNotif=d.updatedAt&&d.updatedBy&&d.updatedBy!==username&&d.updatedAt>getViewed(propId,catId,item.id);
  function handleToggle(){if(!isOpen)markViewed(propId,catId,item.id);onToggle();}
  const{recording,interim,errMsg,toggle,supported}=useSpeech(text=>{const cur=(data[item.id]||{}).notes||'';onChange(item.id,{...(data[item.id]||{}),notes:cur?cur+' '+text:text});});
  function setStatus(e,sid){e.stopPropagation();onChange(item.id,{...d,status:d.status===sid?null:sid});}
  return(
    <div className="section-card">
      <div className="section-header" onClick={handleToggle}>
        <span className="section-title">
          {hasNotif&&<span className="notif-dot" title="New update"/>}
          {item.label}
        </span>
        <div className="quick-status">
          <button className={`qs-btn qs-keep${d.status==='keep'?' active':''}`} onClick={e=>setStatus(e,'keep')}>✓ Keep</button>
          <button className={`qs-btn qs-replace${d.status==='replace'?' active':''}`} onClick={e=>setStatus(e,'replace')}>↺ Replace</button>
        </div>
        <span className={`chevron${isOpen?' open':''}`}>▾</span>
      </div>
      {isOpen&&(
        <div className="section-body">
          <div className="notes-label" style={{marginBottom:6}}>Condition</div>
          <div className="status-row">
            {STATUSES.map(s=>(
              <button key={s.id} className={`status-btn${d.status===s.id?' sel-'+s.cls:''}`}
                onClick={()=>onChange(item.id,{...d,status:d.status===s.id?null:s.id})}>{s.label}</button>
            ))}
          </div>
          <div className="notes-label" style={{marginTop:12}}>Notes</div>
          <div className="notes-row">
            <textarea className="notes-input" placeholder="Describe what you see…" value={d.notes||''} onChange={e=>onChange(item.id,{...d,notes:e.target.value})}/>
            <button className={`mic-btn${recording?' recording':''}${!supported?' unsupported':''}`} onClick={toggle} disabled={!supported}>
              {recording?'⏹ Stop Recording':'🎙 Tap to Speak Notes'}
            </button>
            {recording&&<div className="recording-hint"><div className="recording-dot"/>{interim||'Listening…'}</div>}
            {errMsg&&<div style={{fontSize:12,color:'#dc3545',background:'#fff5f5',borderRadius:8,padding:'8px 10px'}}>⚠️ {errMsg}</div>}
          </div>
          {d.updatedBy&&(
            <div className="update-stamp">
              <div style={{width:16,height:16,borderRadius:'50%',background:avatarColor(d.updatedBy),display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'white',fontWeight:800}}>{initials(d.updatedBy)}</div>
              <span>Updated by <strong>{d.updatedBy}</strong> · {timeAgo(d.updatedAt)}</span>
            </div>
          )}
          <div className="photos-section">
            <div className="notes-label" style={{marginBottom:8}}>Photos</div>
            <div className="photos-row">
              <PhotoSlot label="📸 Before / Existing" photos={d.photosBefore||[]}
                onAdd={src=>onChange(item.id,{...d,photosBefore:[...(d.photosBefore||[]),src]})}
                onRemove={i=>onChange(item.id,{...d,photosBefore:(d.photosBefore||[]).filter((_,idx)=>idx!==i)})}
                onView={onView}/>
              <PhotoSlot label="✨ Vision / Reference" photos={d.photosVision||[]}
                onAdd={src=>onChange(item.id,{...d,photosVision:[...(d.photosVision||[]),src]})}
                onRemove={i=>onChange(item.id,{...d,photosVision:(d.photosVision||[]).filter((_,idx)=>idx!==i)})}
                onView={onView}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AccordionList({propId,cat,data,updateItem,setLightbox,username}){
  const[openId,setOpenId]=React.useState(null);
  React.useEffect(()=>{setOpenId(null);},[cat.id]);
  return cat.items.map(item=>(
    <SectionCard key={item.id} propId={propId} item={item} catId={cat.id}
      data={data[cat.id]||{}} username={username}
      isOpen={openId===item.id}
      onToggle={()=>setOpenId(id=>id===item.id?null:item.id)}
      onChange={(itemId,val)=>updateItem(cat.id,itemId,val)}
      onView={src=>setLightbox(src)}/>
  ));
}

function Swipeable({children,onLeft,onRight}){
  const startX=React.useRef(null);
  return(
    <div onTouchStart={e=>{startX.current=e.touches[0].clientX;}}
         onTouchEnd={e=>{if(startX.current===null)return;const dx=e.changedTouches[0].clientX-startX.current;if(Math.abs(dx)>50)dx<0?onLeft():onRight();startX.current=null;}}>
      {children}
    </div>
  );
}

        <PhotoSlot label="Final Floor Plan" photos={s.floorPlan||[]}
          onAdd={src=>onChange({...s,floorPlan:[...(s.floorPlan||[]),src]})}
          onRemove={i=>onChange({...s,floorPlan:(s.floorPlan||[]).filter((_,idx)=>idx!==i)})} onView={onView}/>
      </div>
    </div>
  );
}

// ── Report builder ───────────────────────────────────────────────────
function buildReport(prop,data){
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const sum=data._summary||{};
  const{done,total}=totalProgress(data);
  const prioritiesHtml=(sum.priorities||[]).filter(Boolean).map((p,i)=>
    `<tr><td style="width:32px;padding:5px 0"><div style="width:22px;height:22px;border-radius:50%;background:#e2b04a;color:#1a1a2e;font-size:11px;font-weight:800;text-align:center;line-height:22px">${i+1}</div></td><td style="padding:5px 0 5px 10px;font-size:14px;color:#333">${p}</td></tr>`
  ).join('');
  let catSections='';
  CATEGORIES.forEach(cat=>{
    let rows='';
    cat.items.forEach(item=>{
      const d=(data[cat.id]||{})[item.id]||{};
      if(!d.status&&!d.notes&&!d.photosBefore?.length&&!d.photosVision?.length)return;
      const bg=STATUS_COLORS[d.status]||'#f5f5f5';
      const sl=STATUS_LABELS[d.status]||'—';
      let photos='';
      if(d.photosBefore?.length||d.photosVision?.length){
        photos=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">`;
        if(d.photosBefore?.length)photos+=`<div><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:5px">Before</div><div style="display:flex;gap:4px;flex-wrap:wrap">${d.photosBefore.map(p=>`<img src="${p}" style="width:100px;height:75px;object-fit:cover;border-radius:6px">`).join('')}</div></div>`;
        if(d.photosVision?.length)photos+=`<div><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:5px">Vision</div><div style="display:flex;gap:4px;flex-wrap:wrap">${d.photosVision.map(p=>`<img src="${p}" style="width:100px;height:75px;object-fit:cover;border-radius:6px">`).join('')}</div></div>`;
        photos+=`</div>`;
      }
      const stamp=d.updatedBy?`<div style="font-size:11px;color:#aaa;margin-top:6px">Updated by <strong>${d.updatedBy}</strong> · ${timeAgo(d.updatedAt)}</div>`:'';
      rows+=`<div style="break-inside:avoid;margin-bottom:10px;background:white;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafafa;border-bottom:1px solid #eee"><span style="font-weight:700;font-size:14px">${item.label}</span><span style="background:${bg};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${sl}</span></div>
        ${(d.notes||photos)?`<div style="padding:11px 14px">${d.notes?`<p style="font-size:13px;color:#333;line-height:1.6;margin:0 0 ${photos?'8px':'0'}">${d.notes.replace(/\n/g,'<br>')}</p>`:''}${photos}${stamp}</div>`:''}
      </div>`;
    });
    if(!rows)return;
    catSections+=`<div style="break-inside:avoid;margin-bottom:26px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:3px solid #e2b04a"><span style="font-size:20px">${cat.icon}</span><h2 style="font-size:18px;font-weight:800;color:#1a1a2e;margin:0">${cat.label}</h2></div>${rows}</div>`;
  });
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Scope of Work — ${prop.address||'Property'}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e}.page{max-width:860px;margin:0 auto;padding:24px 20px 60px}@media print{body{background:white}.page{padding:0}.no-print{display:none!important}.cover{page-break-after:always}}</style></head><body><div class="page">
<div class="no-print" style="text-align:right;margin-bottom:16px"><button onclick="window.print()" style="background:#0f3460;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer">🖨 Print / Save as PDF</button></div>
<div class="cover" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;border-radius:16px;padding:40px;margin-bottom:24px">
  <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-bottom:12px">Scope of Work</div>
  <h1 style="font-size:28px;font-weight:900;margin-bottom:8px">${prop.address||'Property'}</h1>
  <div style="opacity:.6;font-size:14px;margin-bottom:24px">${prop.sqft?prop.sqft+' sq ft  ·  ':''}${date}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px">
    ${sum.budget?`<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Budget</div><div style="font-size:20px;font-weight:800">${sum.budget}</div></div>`:''}
    ${sum.timeline?`<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Timeline</div><div style="font-size:20px;font-weight:800">${sum.timeline}</div></div>`:''}
    <div style="background:rgba(226,176,74,.2);border-radius:10px;padding:14px"><div style="font-size:10px;text-transform:uppercase;opacity:.6;margin-bottom:4px">Items Documented</div><div style="font-size:20px;font-weight:800">${done} / ${total}</div></div>
  </div>
  ${sum.overview?`<div style="background:rgba(255,255,255,.08);border-radius:10px;padding:16px;margin-top:20px"><p style="font-size:14px;line-height:1.7;opacity:.9">${sum.overview.replace(/\n/g,'<br>')}</p></div>`:''}
</div>
${prioritiesHtml?`<div style="background:white;border-radius:12px;padding:20px;margin-bottom:24px;border:1px solid #e8e8e8"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:12px">Top Priorities</div><table style="width:100%;border-collapse:collapse">${prioritiesHtml}</table></div>`:''}
<div style="border-top:3px solid #1a1a2e;margin-bottom:28px"></div>
${catSections||'<p style="color:#888;text-align:center;padding:40px">No items documented yet.</p>'}
</div></body></html>`;
}

// ── Invite Modal ─────────────────────────────────────────────────────
function InviteModal({prop,currentUser,onClose}){
  const[tab,setTab]=React.useState('sms');
  const[value,setValue]=React.useState('');
  const[sent,setSent]=React.useState([]);
  const senderName=currentUser.displayName||currentUser.email;

  async function generateInvite(){
    const token=uid();
    await dbSet(`invites/${token}`,{
      projectId:prop.id, projectAddress:prop.address,
      createdBy:currentUser.uid, createdByName:senderName,
      createdAt:Date.now()
    });
    return token;
  }

  async function sendSMS(){
    const p=value.trim();if(!p)return;
    const token=await generateInvite();
    const link=`${window.location.origin}${window.location.pathname}?join=${token}`;
    const msg=`${senderName} invited you to the Flip Walkthrough for ${prop.address}. Tap to join: ${link}`;
    window.open(`sms:${p}${navigator.platform.includes('iPhone')?'&':'?'}body=${encodeURIComponent(msg)}`,'_self');
    setSent(s=>[...s,{type:'sms',to:p}]);setValue('');
  }

  async function sendEmail(){
    const e=value.trim();if(!e)return;
    const token=await generateInvite();
    const link=`${window.location.origin}${window.location.pathname}?join=${token}`;
    const subject=`You've been invited to join ${prop.address} on Zanco`;
    const body=`Hi,\n\n${senderName} has invited you to collaborate on the Flip Walkthrough for ${prop.address}.\n\nTap the link below to create your account and join the project:\n${link}\n\nSee you on Zanco!`;
    window.open(`mailto:${e}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,'_self');
    setSent(s=>[...s,{type:'email',to:e}]);setValue('');
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>Invite Team Member</h2>
        <div className="invite-tabs">
          <button className={`invite-tab${tab==='sms'?' active':''}`} onClick={()=>{setTab('sms');setValue('');}}>📲 SMS</button>
          <button className={`invite-tab${tab==='email'?' active':''}`} onClick={()=>{setTab('email');setValue('');}}>✉️ Email</button>
        </div>
        {tab==='sms'?(
          <>
            <p>Opens your Messages app with the invite pre-written — just hit Send.</p>
            <div className="invite-input-row">
              <input type="tel" placeholder="+1 (555) 000-0000" value={value} onChange={e=>setValue(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendSMS()}/>
              <button className="btn-sms" onClick={sendSMS}>Send →</button>
            </div>
          </>
        ):(
          <>
            <p>Opens your Mail app with the invite pre-written — just hit Send.</p>
            <div className="invite-input-row">
              <input type="email" placeholder="teammate@example.com" value={value} onChange={e=>setValue(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendEmail()}/>
              <button className="btn-email-inv" onClick={sendEmail}>Send →</button>
            </div>
          </>
        )}
        {sent.map((s,i)=>(
          <div key={i} className="invite-sent">
            {s.type==='sms'?'📲':'✉️'} Invite sent to {s.to}
          </div>
        ))}
        <div className="modal-btns" style={{marginTop:16}}>
          <button className="btn-secondary" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

              <button className="btn-remove-member" onClick={()=>removeMember(uid)} title="Remove member">×</button>
            )}

      </div>

      <div className="activity-feed">
        <h3>Recent Activity</h3>
        {activity.length===0?(
          <div style={{padding:'16px',color:'#aaa',fontSize:13,textAlign:'center'}}>No activity yet</div>
        ):activity.map((a,i)=>(
          <div key={i} className="activity-item">
            <div style={{width:24,height:24,borderRadius:'50%',background:avatarColor(a.user),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'white',fontWeight:800,flexShrink:0}}>
              {initials(a.user)}
            </div>
            <div className="activity-text">
              <strong>{a.user}</strong> updated <strong>{a.catLabel} › {a.itemLabel}</strong>
              {a.status&&<span style={{marginLeft:6,background:STATUS_COLORS[a.status]||'#f0f0f0',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:600}}>{STATUS_LABELS[a.status]||a.status}</span>}
            </div>
            <div className="activity-time">{timeAgo(a.ts)}</div>
          </div>
        ))}
      </div>

      {showInvite&&<InviteModal prop={prop} currentUser={currentUser} onClose={()=>setShowInvite(false)}/>}

// ── Migration Modal ──────────────────────────────────────────────────
function MigrationModal({currentUser,onDone}){
  const[migrating,setMigrating]=React.useState(false);
  const[done,setDone]=React.useState(false);
  let oldProps=[];
  try{oldProps=JSON.parse(localStorage.getItem('flip_properties')||'[]');}catch{}

  async function migrate(){
    setMigrating(true);
    for(const prop of oldProps){
      const meta={...prop,ownerId:currentUser.uid,ownerName:currentUser.displayName||currentUser.email,updatedAt:Date.now()};
      await dbSet(`projects/${prop.id}/meta`,meta);
      await dbSet(`projects/${prop.id}/members/${currentUser.uid}`,{
        name:currentUser.displayName||currentUser.email,email:currentUser.email,role:'owner',addedAt:Date.now()
      });
      const data=JSON.parse(localStorage.getItem(`flip_data_${prop.id}`)||'{}');
      if(Object.keys(data).length){
        const lightweight={};
        CATEGORIES.forEach(cat=>{
          if(!data[cat.id])return;
          lightweight[cat.id]={};
          Object.entries(data[cat.id]).forEach(([k,v])=>{
            lightweight[cat.id][k]={status:v.status,notes:v.notes,updatedAt:v.updatedAt,updatedBy:v.updatedBy};
          });
          // Copy photos to new photo cache
          const cache=loadPhotoCache(prop.id);
          Object.entries(data[cat.id]).forEach(([k,v])=>{
            if(v.photosBefore?.length||v.photosVision?.length){
              cache[`${cat.id}__${k}__before`]=v.photosBefore||[];
              cache[`${cat.id}__${k}__vision`]=v.photosVision||[];
            }
          });
          savePhotoCache(prop.id,cache);
        });
        if(data._summary){lightweight._summary={overview:data._summary.overview,priorities:data._summary.priorities,budget:data._summary.budget,timeline:data._summary.timeline};}
        await dbUpdate(`projects/${prop.id}/data`,lightweight);
      }
      await dbSet(`userProjects/${currentUser.uid}/${prop.id}`,true);
    }
    // Clear old storage
    localStorage.removeItem('flip_properties');
    oldProps.forEach(p=>localStorage.removeItem(`flip_data_${p.id}`));
    setMigrating(false);setDone(true);
  }

  if(done)return(
    <div className="modal-overlay"><div className="modal">
      <h2>✅ Migration Complete</h2>
      <p>{oldProps.length} {oldProps.length===1?'property':'properties'} imported to your account successfully.</p>
      <div className="modal-btns"><button className="btn-primary" onClick={onDone}>Continue to App</button></div>
    </div></div>
  );

  return(
    <div className="modal-overlay"><div className="modal">
      <h2>📦 Import Existing Data</h2>
      <p>We found {oldProps.length} {oldProps.length===1?'property':'properties'} saved locally on this device. Import them to your account?</p>
      {oldProps.map(p=><div key={p.id} className="migration-item">🏠 {p.address}</div>)}
      <div className="modal-btns" style={{marginTop:16}}>
        <button className="btn-primary" onClick={migrate} disabled={migrating}>{migrating?'Importing…':'Import to My Account'}</button>
        <button className="btn-secondary" onClick={onDone}>Skip</button>
      </div>
    </div></div>
  );
}

// ── Property List ────────────────────────────────────────────────────
function PropertyList({currentUser,onOpen}){
  const[properties,setProperties]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[showAdd,setShowAdd]=React.useState(false);
  const[deleteId,setDeleteId]=React.useState(null);
  const[showMigration,setShowMigration]=React.useState(false);

  React.useEffect(()=>{
    // Check if old local data exists
    const old=localStorage.getItem('flip_properties');
    if(old){try{const p=JSON.parse(old);if(p.length>0)setShowMigration(true);}catch{}}

    // Listen for user's project list
    const unsub=dbListen(`userProjects/${currentUser.uid}`,async ids=>{
      if(!ids){setProperties([]);setLoading(false);return;}
      const projectIds=Object.keys(ids);
      const metas=await Promise.all(projectIds.map(id=>dbGet(`projects/${id}/meta`)));
      const list=metas.filter(Boolean).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
      setProperties(list);setLoading(false);
    });
    return unsub;
  },[currentUser.uid]);

  async function addProperty(prop){
    const meta={...prop,ownerId:currentUser.uid,ownerName:currentUser.displayName||currentUser.email,updatedAt:Date.now()};
    await dbSet(`projects/${prop.id}/meta`,meta);
    await dbSet(`projects/${prop.id}/members/${currentUser.uid}`,{
      name:currentUser.displayName||currentUser.email,email:currentUser.email,role:'owner',addedAt:Date.now()
    });
    await dbSet(`userProjects/${currentUser.uid}/${prop.id}`,true);
    setShowAdd(false);onOpen(meta);
  }

  async function deleteProperty(id){
    // Only owner can delete
    await dbRemove(`projects/${id}/meta`);
    await dbRemove(`projects/${id}/data`);
    await dbRemove(`projects/${id}/members`);
    // Remove from all members' userProjects
    const members=await dbGet(`projects/${id}/members`)||{};
    await Promise.all(Object.keys(members).map(uid=>dbRemove(`userProjects/${uid}/${id}`)));
    setDeleteId(null);
  }

  function signOut(){getAuth().signOut();}

  if(loading)return<div className="spinner-page"><div className="spinner"/></div>;

  return(
    <div className="list-page">
      <div className="list-header">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h1>🏚 Flip Walkthrough</h1>
          <button className="btn-header-sm" onClick={signOut}>Sign Out</button>
        </div>
        <p>Welcome back, {currentUser.displayName||currentUser.email}</p>
      </div>
      <div className="list-content">
        {properties.length===0?(
          <div className="empty-state"><div className="icon">🏠</div><h2>No properties yet</h2><p>Add your first property to get started</p></div>
        ):properties.map(prop=>{
          const{done,total,pct}=totalProgress({});
          return(
            <div key={prop.id} className="prop-card">
              <div className="prop-card-body" onClick={()=>onOpen(prop)}>
                <div className="prop-thumb">🏠</div>
                <div className="prop-info">
                  <div className="prop-address">{prop.address}</div>
                  <div className="prop-meta">{prop.sqft?prop.sqft+' sq ft  ·  ':''}{prop.date?new Date(prop.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
                  <div className="prop-progress">
                    <div className="prop-progress-bar"><div className="prop-progress-fill" style={{width:'0%'}}/></div>
                    <span className="prop-progress-label">tap to view</span>
                  </div>
                </div>
                <div className="prop-arrow">›</div>
              </div>
              <div className="prop-actions">
                <button className="prop-action-btn" onClick={()=>onOpen(prop)}>✏️ Open</button>
                {prop.ownerId===currentUser.uid&&<button className="prop-action-btn danger" onClick={()=>setDeleteId(prop.id)}>🗑 Delete</button>}
              </div>
            </div>
          );
        })}
        <button className="btn-add-prop" onClick={()=>setShowAdd(true)}>＋ Add Property</button>
      </div>
      {showAdd&&<AddPropertyModal onAdd={addProperty} onClose={()=>setShowAdd(false)}/>}
      {showMigration&&<MigrationModal currentUser={currentUser} onDone={()=>setShowMigration(false)}/>}
      {deleteId&&(
        <div className="modal-overlay" onClick={()=>setDeleteId(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
          <h2>Delete Property?</h2><p>This permanently deletes all notes and data for all team members. Cannot be undone.</p>
          <div className="modal-btns">
            <button className="btn-danger" onClick={()=>deleteProperty(deleteId)}>Yes, Delete</button>
            <button className="btn-secondary" onClick={()=>setDeleteId(null)}>Cancel</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ── WalkthroughView ──────────────────────────────────────────────────
function WalkthroughView({prop,currentUser,onBack,onPropUpdate}){
  const TAB_SUMMARY=-1,TAB_TEAM=-2;
  const[activeTab,setActiveTab]=React.useState(TAB_SUMMARY);
  const[data,setData]=React.useState({});
  const[sqft,setSqft]=React.useState(prop.sqft||'');
  const[curBed,setCurBed]=React.useState(prop.curBed||'');
  const[curBath,setCurBath]=React.useState(prop.curBath||'');
  const[futBed,setFutBed]=React.useState(prop.futBed||'');
  const[futBath,setFutBath]=React.useState(prop.futBath||'');
  const[showShare,setShowShare]=React.useState(false);
  const[lightbox,setLightbox]=React.useState(null);
  const[syncStatus,setSyncStatus]=React.useState('syncing');
  const isOwner=prop.ownerId===currentUser.uid;
  const username=currentUser.displayName||currentUser.email;

  // Merge remote data+photos into a single state object
  const photosRef=React.useRef({});
  const dataRef=React.useRef({});

  function buildMerged(d,p){
    const merged={...d};
    CATEGORIES.forEach(cat=>{
      if(!merged[cat.id])merged[cat.id]={};
      cat.items.forEach(item=>{
        const slot=(p[cat.id]||{})[item.id]||{};
        if(slot.before?.length||slot.vision?.length){
          merged[cat.id][item.id]={...(merged[cat.id][item.id]||{}),photosBefore:slot.before||[],photosVision:slot.vision||[]};
        }
      });
    });
    const sp=p._summary||{};
    if(sp.photos?.length||sp.aiVision?.length||sp.floorPlan?.length){
      merged._summary={...(merged._summary||{}),photos:sp.photos||[],aiVision:sp.aiVision||[],floorPlan:sp.floorPlan||[]};
    }
    return merged;
  }

  React.useEffect(()=>{
    const unsubData=dbListen(`projects/${prop.id}/data`,remote=>{
      dataRef.current=remote||{};
      setData(buildMerged(dataRef.current,photosRef.current));
      setSyncStatus('synced');
    });
    const unsubPhotos=dbListen(`projects/${prop.id}/photos`,remote=>{
      photosRef.current=remote||{};
      setData(buildMerged(dataRef.current,photosRef.current));
    });
    return ()=>{unsubData();unsubPhotos();};
  },[prop.id]);

  async function updateItem(catId,itemId,value){
    setSyncStatus('syncing');
    const stamped={...value,updatedAt:Date.now(),updatedBy:username};
    const next={...data,[catId]:{...(data[catId]||{}),[itemId]:stamped}};
    setData(next);
    // Split: lightweight fields to /data, photos to /photos
    const{photosBefore,photosVision,...noPhotos}=stamped;
    const writes=[dbUpdate(`projects/${prop.id}/data/${catId}`,{[itemId]:noPhotos})];
    if(photosBefore!==undefined||photosVision!==undefined){
      writes.push(dbUpdate(`projects/${prop.id}/photos/${catId}/${itemId}`,{
        before:photosBefore||[],vision:photosVision||[]
      }));
    }
    await Promise.all(writes);
    setSyncStatus('synced');
  }

  async function updateSummary(value){
    const next={...data,_summary:value};
    setData(next);
    const{photos,aiVision,floorPlan,...noPhotos}=value;
    await Promise.all([
      dbUpdate(`projects/${prop.id}/data`,{_summary:{...noPhotos,updatedAt:Date.now()}}),
      dbUpdate(`projects/${prop.id}/photos`,{_summary:{photos:photos||[],aiVision:aiVision||[],floorPlan:floorPlan||[]}})
    ]);
  }

  async function savePropFields(){
    const updated={...prop,sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()};
    await dbUpdate(`projects/${prop.id}/meta`,{sqft,curBed,curBath,futBed,futBath,updatedAt:Date.now()});
    onPropUpdate(updated);
  }

  const cat=activeTab>=0?CATEGORIES[activeTab]:null;
  const{done,total,pct}=totalProgress(data);
  const sumFilled=!!(data._summary?.overview||data._summary?.priorities?.filter(Boolean).length||data._summary?.budget);

  function catUnread(catId){
    return CATEGORIES.find(c=>c.id===catId)?.items.filter(item=>{
      const d=(data[catId]||{})[item.id];
      return d?.updatedAt&&d?.updatedBy&&d.updatedBy!==username&&d.updatedAt>getViewed(prop.id,catId,item.id);
    }).length||0;
  }
  const totalUnread=CATEGORIES.reduce((s,c)=>s+catUnread(c.id),0);

  return(
    <div className="app">
      <div className="header">
        <div className="header-top">
          <button className="btn-back" onClick={onBack}>← Back</button>
          <div className="header-title">
            <h1>{prop.address}</h1>
            <p>{sqft?sqft+' sq ft  ·  ':''}{prop.date?new Date(prop.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</p>
          </div>
          <button className="btn-share" onClick={()=>setShowShare(true)}>Share</button>
        </div>
        <div className="sqft-bar">
          <div className="sqft-field"><label>Sq Ft</label><input placeholder="1,800" value={sqft} onChange={e=>setSqft(e.target.value)} onBlur={savePropFields}/></div>
          <div className="sqft-divider"/>
          <span className="sqft-group-label">Current</span>
          <div className="sqft-field"><label>Bed</label><input type="number" min="0" placeholder="3" value={curBed} onChange={e=>setCurBed(e.target.value)} onBlur={savePropFields}/></div>
          <div className="sqft-field"><label>Bath</label><input type="number" min="0" placeholder="1" value={curBath} onChange={e=>setCurBath(e.target.value)} onBlur={savePropFields}/></div>
          <div className="sqft-divider"/>
          <span className="sqft-group-label">Future</span>
          <div className="sqft-field"><label>Bed</label><input type="number" min="0" placeholder="4" value={futBed} onChange={e=>setFutBed(e.target.value)} onBlur={savePropFields}/></div>
          <div className="sqft-field"><label>Bath</label><input type="number" min="0" placeholder="2" value={futBath} onChange={e=>setFutBath(e.target.value)} onBlur={savePropFields}/></div>
        </div>
        <div className="sync-bar">
          <div className={`sync-dot${syncStatus==='syncing'?' syncing':''}`}/>
          {syncStatus==='syncing'?'Syncing…':'All changes saved · Live sync on'}
        </div>
        <div className="tabs">
          <div className={`tab${activeTab===TAB_SUMMARY?' active':''}`} onClick={()=>setActiveTab(TAB_SUMMARY)}>
            📋 Summary{sumFilled&&<span className="tab-count">✓</span>}
          </div>
          {CATEGORIES.map((c,i)=>{
            const unread=catUnread(c.id);
            const rev=countReviewed(data,c.id);
            return(
              <div key={c.id} className={`tab${activeTab===i?' active':''}`} onClick={()=>setActiveTab(i)}>
                {c.icon} {c.label}
                {unread>0?<span className="notif-badge">{unread}</span>:rev>0?<span className="tab-count">{rev}</span>:null}
              </div>
            );
          })}
          <div className={`tab${activeTab===TAB_TEAM?' active':''}`} onClick={()=>setActiveTab(TAB_TEAM)}>
            👥 Team{totalUnread>0&&<span className="notif-badge">{totalUnread}</span>}
          </div>
        </div>
      </div>

      {activeTab>=0&&(
        <div style={{padding:'12px 12px 0'}}>
          <div className="progress-bar-wrap">
            <div className="progress-label"><span>Walkthrough progress</span><span>{done} of {total} items · {pct}%</span></div>
            <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
          </div>
        </div>
      )}

      {activeTab===TAB_SUMMARY&&<SummaryPage summary={data._summary} onChange={updateSummary} onView={src=>setLightbox(src)}/>}
      {activeTab===TAB_TEAM&&<ParticipantsPage prop={prop} data={data} currentUser={currentUser} isOwner={isOwner}/>}
      {activeTab>=0&&cat&&(
        <Swipeable onLeft={()=>setActiveTab(t=>Math.min(t+1,CATEGORIES.length-1))} onRight={()=>setActiveTab(t=>t<=0?TAB_SUMMARY:t-1)}>
          <div className="content">
            <AccordionList propId={prop.id} cat={cat} data={data} username={username} updateItem={updateItem} setLightbox={setLightbox}/>
          </div>
        </Swipeable>
      )}

      {showShare&&<ShareModal prop={{...prop,sqft}} data={data} onClose={()=>setShowShare(false)}/>}
      {lightbox&&(
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <button className="lightbox-close">×</button>
          <img src={lightbox} alt="" onClick={e=>e.stopPropagation()}/>
        </div>
      )}
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=React.useState(undefined); // undefined=loading
  const[currentProp,setCurrentProp]=React.useState(null);
  const[showSignup,setShowSignup]=React.useState(false);
  const[inviteInfo,setInviteInfo]=React.useState(null);
  const[firebaseReady,setFirebaseReady]=React.useState(true);

  // Check for invite token in URL
  const inviteToken=React.useMemo(()=>{
    const p=new URLSearchParams(window.location.search);return p.get('join');
  },[]);

  // Load invite info if token present
  React.useEffect(()=>{
    if(!inviteToken||!firebaseReady)return;
    dbGet(`invites/${inviteToken}`).then(info=>{if(info)setInviteInfo(info);});
  },[inviteToken,firebaseReady]);

  // Auth state listener
  React.useEffect(()=>{
    if(!firebaseReady){setAuthUser(null);return;}
    const unsub=getAuth().onAuthStateChanged(async user=>{
      if(user&&inviteToken&&inviteInfo){
        // Process invite: add user to project
        await dbSet(`projects/${inviteInfo.projectId}/members/${user.uid}`,{
          name:user.displayName||user.email,email:user.email,role:'member',addedAt:Date.now()
        });
        await dbSet(`userProjects/${user.uid}/${inviteInfo.projectId}`,true);
        // Clear token from URL
        const url=new URL(window.location);url.searchParams.delete('join');window.history.replaceState({},'',url);
        setInviteInfo(null);
      }
      setAuthUser(user||null);
    });
    return unsub;
  },[firebaseReady,inviteToken,inviteInfo]);

  if(authUser===undefined)return<div className="spinner-page"><div className="spinner"/></div>;
  if(!authUser){
    return showSignup
      ?<SignupPage onSwitch={()=>setShowSignup(false)} inviteInfo={inviteInfo}/>
      :<LoginPage onSwitch={()=>setShowSignup(true)} inviteInfo={inviteInfo}/>;
  }
  if(currentProp)return<WalkthroughView prop={currentProp} currentUser={authUser} onBack={()=>setCurrentProp(null)} onPropUpdate={p=>{setCurrentProp(p);}}/>;
  return<PropertyList currentUser={authUser} onOpen={setCurrentProp}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
